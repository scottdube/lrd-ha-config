            - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
              not in include_bypass) and (''bypass_enabled_stop'' not in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_on
              match: any
              state: 'on'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
              in include_bypass) and (''bypass_enabled_stop'' not in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_off
              match: any
              state: 'on'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
              not in include_bypass) and (''bypass_enabled_stop'' in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_stop
              match: any
              state: 'on'
        sequence:
        - stop: Stop the automation
      - alias: Check if the manual fan switch option is enabled, manual fan switch
          is on and the trigger is off
        conditions:
        - '{{ (((include_manual_fan_switch == ''enable_manual_fan_switch'') or (include_manual_fan_switch
          == ''enable_manual_fan_switch_auto_off'')) and (is_state(manual_fan_switch,
          ''on''))) }}'
        - '{{ not is_state(entity_trigger, ''on'') }}'
        sequence:
        - choose:
          - alias: Check if the manual fan switch auto off is enabled
            conditions:
            - '{{ include_manual_fan_switch == ''enable_manual_fan_switch_auto_off''
              }}'
            sequence:
            - alias: Turn on the fan
              action: homeassistant.turn_on
              entity_id: !input fan_switch
            - alias: Wait until the manual fan switch is turned off or the time delay
                passes
              wait_for_trigger:
                trigger: state
                entity_id: !input manual_fan_switch
                from: 'on'
                to: 'off'
              timeout:
                minutes: !input manual_fan_switch_time_delay
            - alias: Turn off the manual fan switch
              action: homeassistant.turn_off
              entity_id: !input manual_fan_switch
            - alias: Turn off the fan
              action: homeassistant.turn_off
              entity_id: !input fan_switch
          - alias: Check if the manual fan switch is enabled
            conditions:
            - '{{ include_manual_fan_switch == ''enable_manual_fan_switch'' }}'
            sequence:
            - alias: Turn on the fan
              action: homeassistant.turn_on
              entity_id: !input fan_switch
            - alias: Wait until the manual fan switch is turned off
              wait_for_trigger:
                trigger: state
                entity_id: !input manual_fan_switch
                from: 'on'
                to: 'off'
            - alias: Turn off the fan
              action: homeassistant.turn_off
              entity_id: !input fan_switch
        - stop: Stop the automation
      - alias: Check if the trigger sensor is on
        conditions:
        - '{{ is_state(entity_trigger, ''on'') }}'
        sequence:
        - choose:
          - alias: Set the transition for the lights
            conditions:
            - '{{ (is_state(entity_trigger, ''on'')) and (is_state(manual_fan_switch,
              ''off'')) }}'
            sequence:
            - alias: Wait until trigger is off
              wait_for_trigger:
                trigger: state
                entity_id: !input entity_trigger
                from: 'on'
                to: 'off'
          - alias: Set the transition for the lights
            conditions:
            - '{{ (is_state(entity_trigger, ''on'')) and (is_state(manual_fan_switch,
              ''on'')) }}'
            sequence:
            - delay: 0
  - alias: Safe Guard when HA restarts
    conditions:
    - condition: trigger
      id: t6
    sequence:
    - choose:
      - alias: Check if enabled manual fan switch is enabled and trigger is off
        conditions:
        - '{{ (((include_manual_fan_switch == ''enable_manual_fan_switch'') or (include_manual_fan_switch
          == ''enable_manual_fan_switch_auto_off'')) and (is_state(manual_fan_switch,
          ''on''))) }}'
        - '{{ is_state(entity_trigger, ''off'') }}'
        sequence:
        - choose:
          - alias: Check if the manual fan switch auto off is enabled
            conditions:
            - '{{ include_manual_fan_switch == ''enable_manual_fan_switch_auto_off''
              }}'
            sequence:
            - alias: Turn on the fan
              action: homeassistant.turn_on
              entity_id: !input fan_switch
            - alias: Wait until the manual fan switch is turned off or the time delay
                passes
              wait_for_trigger:
                trigger: state
                entity_id: !input manual_fan_switch
                from: 'on'
                to: 'off'
              timeout:
                minutes: !input manual_fan_switch_time_delay
            - alias: Turn off the manual fan switch
              action: homeassistant.turn_off
              entity_id: !input manual_fan_switch
            - alias: Turn off the fan
              action: homeassistant.turn_off
              entity_id: !input fan_switch
          - alias: Check if the manual fan switch is enabled
            conditions:
            - '{{ include_manual_fan_switch == ''enable_manual_fan_switch'' }}'
            sequence:
            - alias: Turn on the fan
              action: homeassistant.turn_on
              entity_id: !input fan_switch
            - alias: Wait until the manual fan switch is turned off
              wait_for_trigger:
                trigger: state
                entity_id: !input manual_fan_switch
                from: 'on'
                to: 'off'
            - alias: Turn off the fan
              action: homeassistant.turn_off
              entity_id: !input fan_switch
        - stop: Stop the automation
- choose:
  - alias: Default & prefom trigger options
    conditions:
    - condition: trigger
      id:
      - t1
      - t3_on
      - t4_on
      - t4_off
      - t4_stop
      - t5
      - t6
    sequence:
    - choose:
      - alias: Check if night lights are enabled and within conditions
        conditions:
        - condition: and
          conditions:
          - alias: Check if night lights is enabled
            condition: or
            conditions:
            - '{{ include_night_lights == ''night_lights_enabled'' }}'
          - alias: Check if night lights entity state is enabled
            condition: or
            conditions:
            - '{{ (''time_enabled'' in night_lights_conditions) and not (''entity_state_enabled''
              in night_lights_conditions) }}'
            - '{{ (''sun_enabled'' in night_lights_conditions) and not (''entity_state_enabled''
              in night_lights_conditions) }}'
            - condition: and
              conditions:
              - '{{ ''entity_state_enabled'' in night_lights_conditions }}'
              - condition: state
                entity_id: !input night_lights_entity_state
                state: 'on'
                match: any
          - alias: Check if night lights time is enabled
            condition: or
            conditions:
            - '{{ (''entity_state_enabled'' in night_lights_conditions)  and not (''time_enabled''
              in night_lights_conditions) }}'
            - '{{ (''sun_enabled'' in night_lights_conditions)  and not (''time_enabled''
              in night_lights_conditions) }}'
            - condition: and
              conditions:
              - '{{ ''time_enabled'' in night_lights_conditions }}'
              - condition: time
                after: !input night_lights_after_time
                before: !input night_lights_before_time
          - alias: Check if night lights sun is enabled
            condition: or
            conditions:
            - '{{ (''entity_state_enabled'' in night_lights_conditions)  and not (''sun_enabled''
              in night_lights_conditions) }}'
            - '{{ (''time_enabled'' in night_lights_conditions)  and not (''sun_enabled''
              in night_lights_conditions) }}'
            - '{{ (''sun_enabled'' in night_lights_conditions) and (((is_state_attr(''sun.sun'',
              ''rising'', false)) and (state_attr(''sun.sun'',''elevation'') <= night_lights_sun_elevation
              | float(90))) or ((is_state_attr(''sun.sun'', ''rising'', true)) and
              (state_attr(''sun.sun'',''elevation'') <= night_lights_sun_elevation_rising
              | float(90)))) }}'
          - alias: Check not bypass turning ON or HA restart
            condition: not
            conditions:
            - condition: trigger
              id:
              - t3_on
              - t6
        sequence:
        - alias: Turn ON lights
          action: light.turn_on
          target:
            entity_id: '{{ light_entities }}'
          data: '{{ night_light_data }}'
      - alias: Check if night lights are enabled and within conditions
        conditions:
        - '{{ include_lights == ''lights_enabled''}}'
        - alias: Check not bypass turning ON or HA restart
          condition: not
          conditions:
          - condition: trigger
            id:
            - t3_on
            - t6
        sequence:
        - alias: Turn ON lights
          action: light.turn_on
          target:
            entity_id: '{{ light_entities }}'
          data: '{{ light_data }}'
    - choose:
      - alias: Check the Time Restriction Option
        conditions:
        - '{{ include_time == ''time_enabled'' }}'
        - condition: time
          after: !input before_time
          before: !input after_time
          weekday: !input weekday_options
        sequence:
        - choose:
          - alias: Check some triggers
            conditions:
            - condition: not
              conditions:
              - condition: trigger
                id:
                - t3_on
                - t4_on
                - t4_off
                - t4_stop
                - t6
            sequence:
            - stop: Stop the automation
    - choose:
      - alias: Check if a trigger wait option is set
        conditions:
        - condition: template
          value_template: '{{ (trigger_wait_option == ''wait_for_trigger'') or (trigger_wait_option
            == ''turn_on_and_wait_for_trigger'') }}'
        - condition: not
          conditions:
          - condition: trigger
            id: t3_on
        sequence:
        - choose:
          - alias: Check if the trigger is set to normal mode
            conditions:
            - condition: template
              value_template: '{{ trigger_options == ''normal_mode_trigger'' }}'
            sequence:
            - choose:
              - alias: Check if the fan is off
                conditions:
                - '{{ is_state(fan_switch, ''off'') }}'
                sequence:
                - choose:
                  - alias: Check if the trigger wait option is set
                    conditions:
                    - condition: template
                      value_template: '{{ trigger_wait_option == ''wait_for_trigger''
                        }}'
                    sequence:
                    - alias: Wait for the trigger to be on for the trigger wait time
                      wait_for_trigger:
                        trigger: state
                        entity_id: !input entity_trigger
                        from: 'on'
                        to: 'off'
                      timeout:
                        minutes: !input trigger_wait_time
                    - choose:
                      - alias: Check the trigger state
                        conditions:
                        - condition: state
                          entity_id: !input entity_trigger
                          state: 'off'
                        sequence:
                        - stop: Stop the automation
                  - alias: Check if the trigger turn on and wait option is set
                    conditions:
                    - condition: template
                      value_template: '{{ trigger_wait_option == ''turn_on_and_wait_for_trigger''
                        }}'
                    sequence:
                    - alias: Turn on the fan
                      action: homeassistant.turn_on
                      entity_id: !input fan_switch
                    - alias: Wait for the trigger to be on for the trigger wait time
                      wait_for_trigger:
                        trigger: state
                        entity_id: !input entity_trigger
                        from: 'on'
                        to: 'off'
                      timeout:
                        minutes: !input trigger_wait_time
                    - choose:
                      - alias: Check the trigger state
                        conditions:
                        - condition: state
                          entity_id: !input entity_trigger
                          state: 'off'
                        sequence:
                        - alias: Wait for the brief use delay
                          delay:
                            minutes: !input brief_use_delay
                        - alias: Turn off the fan
                          action: homeassistant.turn_off
                          entity_id: !input fan_switch
                        - stop: Stop the automation
        - choose:
          - alias: Check if the trigger is set to inverted trigger
            conditions:
            - condition: template
              value_template: '{{ trigger_options == ''inverted_trigger'' }}'
            sequence:
            - choose:
              - alias: Check the trigger state
                conditions:
                - condition: state
                  entity_id: !input entity_trigger
                  state: 'on'
                sequence:
                - choose:
                  - alias: Check if the trigger wait option is set
                    conditions:
                    - condition: template
                      value_template: '{{ trigger_wait_option == ''wait_for_trigger''
                        }}'
                    sequence:
                    - alias: Wait for the trigger to be on for the trigger wait time
                      wait_for_trigger:
                        trigger: state
                        entity_id: !input entity_trigger
                        from: 'on'
                        to: 'off'
                      timeout:
                        minutes: !input trigger_wait_time
                    - choose:
                      - alias: Check the trigger state
                        conditions:
                        - condition: state
                          entity_id: !input entity_trigger
                          state: 'off'
                        - '{{ is_state(fan_switch, ''off'') }}'
                        sequence:
                        - stop: Stop the automation
                  - alias: Check if the trigger turn on and wait option is set
                    conditions:
                    - condition: template
                      value_template: '{{ trigger_wait_option == ''turn_on_and_wait_for_trigger''
                        }}'
                    sequence:
                    - alias: Wait for the trigger to be on for the trigger wait time
                      wait_for_trigger:
                        trigger: state
                        entity_id: !input entity_trigger
                        from: 'on'
                        to: 'off'
                      timeout:
                        minutes: !input trigger_wait_time
                    - choose:
                      - alias: Check the trigger state
                        conditions:
                        - condition: state
                          entity_id: !input entity_trigger
                          state: 'off'
                        - '{{ is_state(fan_switch, ''off'') }}'
                        sequence:
                        - alias: Turn on the fan
                          action: homeassistant.turn_on
                          entity_id: !input fan_switch
                        - alias: Wait for the brief use delay
                          delay:
                            minutes: !input brief_use_delay
                        - alias: Turn off the fan
                          action: homeassistant.turn_off
                          entity_id: !input fan_switch
                        - stop: Stop the automation
                - choose:
                  - alias: Check the trigger state
                    conditions:
                    - condition: state
                      entity_id: !input entity_trigger
                      state: 'on'
                    sequence:
                    - alias: Wait for the trigger to turn off
                      wait_for_trigger:
                        trigger: state
                        entity_id: !input entity_trigger
                        from: 'on'
                        to: 'off'
    - choose:
      - alias: Check if the trigger is set to inverted and dont use the trigger wait
          time
        conditions:
        - condition: template
          value_template: '{{ trigger_options == ''inverted_trigger'' }}'
        - '{{ trigger_wait_option == ''fire_on_trigger'' }}'
        - condition: not
          conditions:
          - condition: trigger
            id: t3_on
        sequence:
        - alias: Wait for the trigger to turn off
          wait_for_trigger:
            trigger: state
            entity_id: !input entity_trigger
            from: 'on'
            to: 'off'
    - choose:
      - alias: Check the trigger state
        conditions:
        - '{{ is_state(fan_switch, ''off'') }}'
        sequence:
        - alias: Turn on the fan
          action: homeassistant.turn_on
          entity_id: !input fan_switch
    - choose:
      - alias: By-pass is enabled & check by-pass option - turn fan on
        conditions:
        - condition: trigger
          id: t3_on
        sequence:
        - alias: Check by-pass settings and preform the correct action
          if:
          - alias: Check if the by-pass auto off is enabled
            condition: template
            value_template: '{{ (''bypass_auto_off_enabled_on'' in include_bypass_auto_off)
              or (''bypass_auto_off_enabled_off'' in include_bypass_auto_off) or (''bypass_auto_off_enabled_stop''
              in include_bypass_auto_off) }}'
          then:
          - alias: Wait the number of minutes set in the by-pass auto off time delay
            delay:
              minutes: !input bypass_auto_off_delay
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ (''bypass_enabled_turn_on'' in include_bypass)
                  and (''bypass_auto_off_enabled_on'' in include_bypass_auto_off)
                  }}'
              sequence:
              - alias: Turn off the by-pass
                action: homeassistant.turn_off
                entity_id: !input bypass_fan_on
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ (''bypass_enabled_turn_off'' in include_bypass)
                  and (''bypass_auto_off_enabled_off'' in include_bypass_auto_off)
                  }}'
              sequence:
              - alias: Turn off the by-pass
                action: homeassistant.turn_off
                entity_id: !input bypass_fan_off
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ (''bypass_enabled_stop'' in include_bypass) and
                  (''bypass_auto_off_enabled_stop'' in include_bypass_auto_off) }}'
              sequence:
              - alias: Turn off the by-pass
                action: homeassistant.turn_off
                entity_id: !input bypass_fan_stop
          - stop: Stop the automation
          else:
          - stop: Stop the automation
    - choose:
      - alias: Check if the trigger is set to normal mode
        conditions:
        - condition: template
          value_template: '{{ trigger_options == ''normal_mode_trigger'' }}'
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ safeguard_option == ''enable_safeguard'' }}'
            sequence:
            - alias: Wait until trigger is off
              wait_for_trigger:
                trigger: state
                entity_id: !input entity_trigger
                from: 'on'
                to: 'off'
              timeout:
                minutes: !input safeguard
          - conditions:
            - condition: template
              value_template: '{{ safeguard_option == ''enable_safeguard_and_trigger''
                }}'
            sequence:
            - alias: Wait until trigger is off
              wait_for_trigger:
                trigger: state
                entity_id: !input entity_trigger
                from: 'on'
                to: 'off'
              timeout:
                minutes: !input safeguard
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ states(entity_trigger) == ''on'' }}'
                sequence:
                - alias: Turn OFF trigger
                  action: homeassistant.turn_off
                  entity_id: !input entity_trigger
          - conditions:
            - condition: template
              value_template: '{{ safeguard_option == ''disable_safeguard'' }}'
            sequence:
            - alias: Wait until trigger is off
              wait_for_trigger:
                trigger: state
                entity_id: !input entity_trigger
                from: 'on'
                to: 'off'
    - alias: Wait for the delay time
      delay:
        minutes: !input time_delay
    - choose:
      - alias: Check if the manual fan switch option is enabled and switch is on
        conditions:
        - '{{ (include_manual_fan_switch == ''enable_manual_fan_switch'') or (include_manual_fan_switch
          == ''enable_manual_fan_switch_auto_off'') }}'
        - '{{ is_state(manual_fan_switch, ''on'') }}'
        sequence:
        - alias: Turn OFF manual fan switch
          action: homeassistant.turn_off
          entity_id: !input manual_fan_switch
    - alias: Turn off the fan
      action: homeassistant.turn_off
      entity_id: !input fan_switch
