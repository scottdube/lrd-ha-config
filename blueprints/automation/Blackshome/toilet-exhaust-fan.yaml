    %}\n  {% set light.data = dict(light.data, **{ 'rgbw_color': night_light_rgbw_colour
    }) %}\n{% endif %} {% if include_night_light_colour_control == 'use_rgbww_colour'
    %}\n  {% set light.data = dict(light.data, **{ 'rgbww_color': night_light_rgbww_colour
    }) %}\n{% endif %} {{ light.data }}"
trigger:
- trigger: state
  id: t1
  entity_id: !input entity_trigger
  from: 'off'
  to: 'on'
- trigger: state
  id: t3_on
  entity_id: !input bypass_fan_on
  from: 'off'
  to: 'on'
- trigger: state
  id: t3_off
  entity_id: !input bypass_fan_off
  from: 'off'
  to: 'on'
- trigger: state
  id: t3_stop
  entity_id: !input bypass_fan_stop
  from: 'off'
  to: 'on'
- trigger: state
  id: t4_on
  entity_id: !input bypass_fan_on
  from: 'on'
  to: 'off'
- trigger: state
  id: t4_off
  entity_id: !input bypass_fan_off
  from: 'on'
  to: 'off'
- trigger: state
  id: t4_stop
  entity_id: !input bypass_fan_stop
  from: 'on'
  to: 'off'
- trigger: state
  id: t5
  entity_id: !input manual_fan_switch
  from: 'off'
  to: 'on'
- trigger: homeassistant
  id: t6
  event: start
condition:
- condition: or
  conditions:
  - condition: and
    conditions:
    - condition: trigger
      id: t1
  - condition: and
    conditions:
    - condition: trigger
      id: t3_on
    - '{{ ''bypass_enabled_turn_on'' in include_bypass }}'
  - condition: and
    conditions:
    - condition: trigger
      id: t3_off
    - '{{ ''bypass_enabled_turn_off'' in include_bypass }}'
  - condition: and
    conditions:
    - condition: trigger
      id: t3_stop
    - '{{ ''bypass_enabled_stop'' in include_bypass }}'
  - condition: and
    conditions:
    - condition: trigger
      id: t4_on
    - '{{ ''bypass_enabled_turn_on'' in include_bypass }}'
  - condition: and
    conditions:
    - condition: trigger
      id: t4_off
    - '{{ ''bypass_enabled_turn_off'' in  include_bypass }}'
  - condition: and
    conditions:
    - condition: trigger
      id: t4_stop
    - '{{ ''bypass_enabled_stop'' in include_bypass }}'
  - condition: and
    conditions:
    - condition: trigger
      id: t5
    - condition: state
      entity_id: !input manual_fan_switch
      match: any
      state: 'on'
    - '{{ ( include_manual_fan_switch == ''enable_manual_fan_switch'') or (include_manual_fan_switch
      == ''enable_manual_fan_switch_auto_off'') }}'
  - condition: and
    conditions:
    - condition: trigger
      id: t6
    - '{{ (is_state(fan_switch, ''on'')) or ((is_state(entity_trigger, ''on'')) and
      (trigger_options == ''normal_mode_trigger'')) or (((include_manual_fan_switch
      == ''enable_manual_fan_switch'') or (include_manual_fan_switch == ''enable_manual_fan_switch_auto_off''))
      and (is_state(manual_fan_switch, ''on''))) }}'
    - '{{ include_ha_restart == ''enable_ha_restart'' }}'
- condition: or
  conditions:
  - '{{ include_time == ''time_disabled'' }}'
  - '{{ include_lights == ''lights_enabled'' }}'
  - '{{ include_night_lights == ''night_lights_enabled'' }}'
  - condition: and
    conditions:
    - condition: time
      after: !input after_time
      before: !input before_time
      weekday: !input weekday_options
    - '{{ include_time == ''time_enabled'' }}'
  - condition: trigger
    id:
    - t3_on
    - t3_off
    - t3_stop
    - t4_on
    - t4_off
    - t4_stop
    - t6
- condition: or
  conditions:
  - '{{ include_bypass == [] }}'
  - condition: and
    conditions:
    - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
      in include_bypass) and (''bypass_enabled_stop'' in include_bypass) }}'
    - condition: state
      entity_id: !input bypass_fan_on
      state: 'off'
    - condition: state
      entity_id: !input bypass_fan_off
      state: 'off'
    - condition: state
      entity_id: !input bypass_fan_stop
      state: 'off'
  - condition: and
    conditions:
    - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
      in include_bypass) and (''bypass_enabled_stop'' not in include_bypass) }}'
    - condition: state
      entity_id: !input bypass_fan_on
      state: 'off'
    - condition: state
      entity_id: !input bypass_fan_off
      state: 'off'
  - condition: and
    conditions:
    - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
      not in include_bypass) and (''bypass_enabled_stop'' in include_bypass) }}'
    - condition: state
      entity_id: !input bypass_fan_on
      state: 'off'
    - condition: state
      entity_id: !input bypass_fan_stop
      state: 'off'
  - condition: and
    conditions:
    - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
      in include_bypass) and (''bypass_enabled_stop'' in include_bypass) }}'
    - condition: state
      entity_id: !input bypass_fan_off
      state: 'off'
    - condition: state
      entity_id: !input bypass_fan_stop
      state: 'off'
  - condition: and
    conditions:
    - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
      not in include_bypass) and (''bypass_enabled_stop'' not in include_bypass) }}'
    - condition: state
      entity_id: !input bypass_fan_on
      state: 'off'
  - condition: and
    conditions:
    - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
      in include_bypass) and (''bypass_enabled_stop'' not in include_bypass) }}'
    - condition: state
      entity_id: !input bypass_fan_off
      state: 'off'
  - condition: and
    conditions:
    - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
      not in include_bypass) and (''bypass_enabled_stop'' in include_bypass) }}'
    - condition: state
      entity_id: !input bypass_fan_stop
      state: 'off'
  - condition: trigger
    id:
    - t3_on
    - t3_off
    - t3_stop
    - t4_on
    - t4_off
    - t4_stop
- condition: and
  conditions: !input global_conditions
action:
- choose:
  - alias: Check if the manual fan switch option is enabled, switch is on and the
      trigger is off
    conditions:
    - condition: trigger
      id: t5
    - '{{ (((include_manual_fan_switch == ''enable_manual_fan_switch'') or (include_manual_fan_switch
      == ''enable_manual_fan_switch_auto_off'')) and (is_state(manual_fan_switch,
      ''on''))) }}'
    - '{{ is_state(entity_trigger, ''off'') }}'
    sequence:
    - choose:
      - alias: Check if the manual fan switch auto off is enabled
        conditions:
        - '{{ include_manual_fan_switch == ''enable_manual_fan_switch_auto_off'' }}'
        sequence:
        - alias: Turn on the fan
          action: homeassistant.turn_on
          entity_id: !input fan_switch
        - alias: Wait until the manual fan switch is turned off or the time delay
            passes
          wait_for_trigger:
            trigger: state
            entity_id: !input manual_fan_switch
            from: 'on'
            to: 'off'
          timeout:
            minutes: !input manual_fan_switch_time_delay
        - alias: Turn off the manual fan switch
          action: homeassistant.turn_off
          entity_id: !input manual_fan_switch
        - alias: Turn off the fan
          action: homeassistant.turn_off
          entity_id: !input fan_switch
      - alias: Check if the manual fan switch is enabled
        conditions:
        - '{{ include_manual_fan_switch == ''enable_manual_fan_switch'' }}'
        sequence:
        - alias: Turn on the fan
          action: homeassistant.turn_on
          entity_id: !input fan_switch
        - alias: Wait until the manual fan switch is turned off
          wait_for_trigger:
            trigger: state
            entity_id: !input manual_fan_switch
            from: 'on'
            to: 'off'
        - alias: Turn off the fan
          action: homeassistant.turn_off
          entity_id: !input fan_switch
    - stop: Stop the automation
  - alias: Check if the manual fan switch option is enabled, switch is on and the
      trigger is on
    conditions:
    - condition: trigger
      id: t5
    - '{{ (((include_manual_fan_switch == ''enable_manual_fan_switch'') or (include_manual_fan_switch
      == ''enable_manual_fan_switch_auto_off'')) and (is_state(manual_fan_switch,
      ''on''))) }}'
    - '{{ is_state(entity_trigger, ''on'') }}'
    sequence:
    - choose:
      - alias: Check if the manual fan switch auto off is enabled
        conditions:
        - '{{ trigger_wait_option == ''wait_for_trigger'' }}'
        sequence:
        - alias: Turn on the fan
          action: homeassistant.turn_on
          entity_id: !input fan_switch
  - alias: By-pass is turned on & check by-pass option - turn fan off
    conditions:
    - condition: trigger
      id: t3_off
    sequence:
    - alias: Turn off the fan
      action: homeassistant.turn_off
      entity_id: !input fan_switch
    - alias: Check by-pass settings and preform the correct action
      if:
      - alias: Check if the by-pass auto off is enabled
        condition: template
        value_template: '{{ (''bypass_auto_off_enabled_on'' in include_bypass_auto_off)
          or (''bypass_auto_off_enabled_off'' in include_bypass_auto_off) or (''bypass_auto_off_enabled_stop''
          in include_bypass_auto_off) }}'
      then:
      - alias: Wait the number of minutes set in the by-pass auto off time delay
        delay:
          minutes: !input bypass_auto_off_delay
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (''bypass_enabled_turn_on'' in include_bypass) and
              (''bypass_auto_off_enabled_on'' in include_bypass_auto_off) }}'
          sequence:
          - alias: Turn off the by-pass
            action: homeassistant.turn_off
            entity_id: !input bypass_fan_on
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (''bypass_enabled_turn_off'' in include_bypass) and
              (''bypass_auto_off_enabled_off'' in include_bypass_auto_off) }}'
          sequence:
          - alias: Turn off the by-pass
            action: homeassistant.turn_off
            entity_id: !input bypass_fan_off
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (''bypass_enabled_stop'' in include_bypass) and (''bypass_auto_off_enabled_stop''
              in include_bypass_auto_off) }}'
          sequence:
          - alias: Turn off the by-pass
            action: homeassistant.turn_off
            entity_id: !input bypass_fan_stop
      - stop: Stop the automation
      else:
      - stop: Stop the automation
  - alias: By-pass is turned on & check by-pass option - Keep the current fan state
    conditions:
    - condition: trigger
      id: t3_stop
    sequence:
    - alias: Check by-pass settings and preform the correct action
      if:
      - alias: Check if the by-pass auto off is enabled
        condition: template
        value_template: '{{ (''bypass_auto_off_enabled_on'' in include_bypass_auto_off)
          or (''bypass_auto_off_enabled_off'' in include_bypass_auto_off) or (''bypass_auto_off_enabled_stop''
          in include_bypass_auto_off) }}'
      then:
      - alias: Wait the number of minutes set in the by-pass auto off time delay
        delay:
          minutes: !input bypass_auto_off_delay
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (''bypass_enabled_turn_on'' in include_bypass) and
              (''bypass_auto_off_enabled_on'' in include_bypass_auto_off) }}'
          sequence:
          - alias: Turn off the by-pass
            action: homeassistant.turn_off
            entity_id: !input bypass_fan_on
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (''bypass_enabled_turn_off'' in include_bypass) and
              (''bypass_auto_off_enabled_off'' in include_bypass_auto_off) }}'
          sequence:
          - alias: Turn off the by-pass
            action: homeassistant.turn_off
            entity_id: !input bypass_fan_off
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (''bypass_enabled_stop'' in include_bypass) and (''bypass_auto_off_enabled_stop''
              in include_bypass_auto_off) }}'
          sequence:
          - alias: Turn off the by-pass
            action: homeassistant.turn_off
            entity_id: !input bypass_fan_stop
      - stop: Stop the automation
      else:
      - stop: Stop the automation
  - alias: Normal Mode - By-pass is turned off & check if the trigger sensor and manual
      fan switch is off
    conditions:
    - condition: template
      value_template: '{{ trigger_options == ''normal_mode_trigger'' }}'
    - condition: trigger
      id:
      - t4_on
      - t4_off
      - t4_stop
    - condition: and
      conditions:
      - '{{ is_state(entity_trigger, ''off'') }}'
      - condition: or
        conditions:
        - '{{ (include_manual_fan_switch == ''enable_manual_fan_switch'') and (is_state(manual_fan_switch,
          ''off'')) }}'
        - '{{ (include_manual_fan_switch == ''enable_manual_fan_switch_auto_off'')
          and (is_state(manual_fan_switch, ''off'')) }}'
        - '{{ include_manual_fan_switch == ''disable_manual_fan_switch'' }}'
    sequence:
    - choose:
      - alias: Check all by-pass are off
        conditions:
        - condition: or
          conditions:
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
              in include_bypass) and (''bypass_enabled_stop'' in include_bypass) }}'
            - condition: state
              entity_id: !input bypass_fan_on
              state: 'off'
            - condition: state
              entity_id: !input bypass_fan_off
              state: 'off'
            - condition: state
              entity_id: !input bypass_fan_stop
              state: 'off'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
              in include_bypass) and (''bypass_enabled_stop'' not in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_on
              state: 'off'
            - condition: state
              entity_id: !input bypass_fan_off
              state: 'off'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
              not in include_bypass) and (''bypass_enabled_stop'' in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_on
              state: 'off'
            - condition: state
              entity_id: !input bypass_fan_stop
              state: 'off'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
              in include_bypass) and (''bypass_enabled_stop'' in include_bypass) }}'
            - condition: state
              entity_id: !input bypass_fan_off
              state: 'off'
            - condition: state
              entity_id: !input bypass_fan_stop
              state: 'off'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' in include_bypass) and (''bypass_enabled_turn_off''
              not in include_bypass) and (''bypass_enabled_stop'' not in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_on
              state: 'off'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
              in include_bypass) and (''bypass_enabled_stop'' not in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_off
              state: 'off'
          - condition: and
            conditions:
            - '{{ (''bypass_enabled_turn_on'' not in include_bypass) and (''bypass_enabled_turn_off''
              not in include_bypass) and (''bypass_enabled_stop'' in include_bypass)
              }}'
            - condition: state
              entity_id: !input bypass_fan_stop
              state: 'off'
        sequence:
        - alias: Turn off the fan
          action: homeassistant.turn_off
          entity_id: !input fan_switch
        - stop: Stop the automation
      - alias: trigger sensor is off and check if any by-passes are on
        conditions:
        - condition: or
          conditions:
          - condition: and
            conditions:
