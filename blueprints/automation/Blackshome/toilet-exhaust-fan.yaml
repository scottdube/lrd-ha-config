blueprint:
  name: Toilet Exhaust Fan
  description: "# \U0001F6BD Toilet Exhaust Fan\n**Version: 2.9**\n\n\U0001F6BD Let
    it go, let it blow - Enjoy a breath of fresh air with your smart fan control \U0001F4A9\U0001F331\n\n**If
    you like my blueprints, and would like to show your support or just say thank
    you?** [Click Here](https://www.paypal.com/donate/?hosted_button_id=WAZS3QSDTPGA8)
    \U0001F642\n\n<details> <summary><b>The Automation Process:</b> \U0001F448</summary>\n\n\n
    \ - **Triggering:**\n    - When a light is turned ON or a binary sensor is activated,
    it will turn on the exhaust fan.\n    - If the trigger is activated again before
    the time delay ends, the automation resets.\n\n  - **Safeguard:**\n    - If your
    trigger is a light and it remains ON (keeping the fan ON), you can set a maximum
    run time to automatically turn both the light and fan OFF.\n\n  - **Time Delay:**\n
    \   - When the light is turned OFF or the binary sensor is clear, a time delay
    is activated, which automatically turns the exhaust fan OFF.\n\n  - **Invert Trigger
    Option:**\n    - The option to invert the trigger allows the exhaust fan to turn
    ON when the light is turned OFF.\n\n  - **Trigger Wait Options:**\n    Controls
    how the fan responds based on how long the trigger (e.g., a light) stays ON.\n
    \   - **Use the wait time** — The fan will only turn ON if the trigger remains
    ON for the full wait time. Ideal for longer use where the fan isn't needed during
    brief activity.\n    - **Turn ON but use the wait time** — The fan turns ON, but
    if the trigger turns OFF before the full wait time, the fan will turn OFF after
    a brief delay. Great for both short visits (with a short fan delay) and longer
    stays (with a longer delay if needed).\n\n  - **Lights Option:**\n    - If your
    trigger is a light, you can set the brightness, colour temperature, or colour.\n
    \   - You can also enable night lights to apply different settings, such as lower
    brightness, warmer colour temperature, or a specific colour, ideal for late-night
    trips to the toilet.\n\n  - **Manual Fan Switch Option:**\n    - Provides independent
    control over the fan (ON/OFF) while maintaining automation trigger.\n    - Opt
    to use the auto-off feature for manual control.\n\n  - **Time-Based Options:**\n
    \   - Specify precise start and end times along with weekday selections to define
    when the automation should run.\n    - This is a good option if you would like
    to disable the fan at night when everyone is sleeping, so the fan noise doesn't
    wake anyone up.\n\n  - **Bypass Options:**\n    - Use \"Bypass Options\" for manual
    bypassing of trigger sensors, providing manual control and additional customization.\n\n
    \ - **Custom Conditions:**\n    - Enter any custom conditions to further customize
    the automation process.\n\n  - **Blueprint Add-On Integration:**\n    - \U0001F6BF
    [Bathroom Humidity Exhaust Fan](https://community.home-assistant.io/t/509992)
    - Step into the future of freshness - customize it your way and let the automated
    fan system handle the humidity control for you!\n\n  - **HA Restart Safeguard:**\n
    \   - An option for safeguarding the automation process in case of a Home Assistant
    restart.\n</details>\n\nNeed help?\n- FAQ: [Click Here](https://community.home-assistant.io/t/478954/7)\n-
    Community Support Including Updates: [Click Here](https://community.home-assistant.io/t/478954)\n\nRequired
    = *\n"
  domain: automation
  input:
    trigger_settings:
      name: Triggers *
      icon: mdi:cog-outline
      collapsed: true
      input:
        entity_trigger:
          name: Trigger Sensor *
          description: 'The trigger is typically either a light, a switch or a motion
            sensor. However, any entity capable of toggling between an ON and OFF
            state can serve as the trigger.

            '
          default: []
          selector:
            entity:
              reorder: false
              multiple: false
        trigger_options:
          name: Trigger Options
          description: 'Select the mode that aligns with your specific needs.


            **Normal Mode (Default)** - This feature initiates the fan operation when
            the trigger switches from an OFF to ON state. Example, when the light
            is switched ON when entering the toilet.


            **Inverted Mode** - This feature initiates the fan operation when the
            trigger switches from an ON to OFF state. Example, when the light is switched
            OFF when leaving the toilet.


            **Note** - Using a motion sensor as the trigger might introduce operational
            difficulties.

            '
          default: normal_mode_trigger
          selector:
            select:
              options:
              - label: Normal Mode (Default)
                value: normal_mode_trigger
              - label: Invert Mode
                value: inverted_trigger
              custom_value: false
              multiple: false
              sort: false
        trigger_wait_option:
          name: Trigger Wait Option (Optional)
          description: 'Choose how the fan should respond when the trigger (e.g.,
            Light) turns ON.


            **Use the wait time** — The fan turns ON only if the trigger stays ON
            for the full wait time. Ideal for longer stays where brief use doesn''t
            require fan activation.


            **Turn ON but use the wait time** — The fan turns ON, but will turn OFF
            early if the trigger doesn''t stay ON for the full wait time. In this
            mode, a Brief Use Delay can be set to prevent the fan from turning OFF
            too quickly.


            **Don''t use the wait time** — The fan turns ON as soon as the trigger
            activates, regardless of how long the trigger stays ON.


            If you selected **Use the wait time**, set the duration in the **Trigger
            Wait Time** field below.

            If you selected **Turn ON but use the wait time**, set the durations in
            both the **Trigger Wait Time** and **Brief Use Delay** fields below.

            '
          default: fire_on_trigger
          selector:
            select:
              options:
              - label: Use the wait time
                value: wait_for_trigger
              - label: Turn ON but use the wait time
                value: turn_on_and_wait_for_trigger
              - label: Dont use the wait time
                value: fire_on_trigger
              custom_value: false
              multiple: false
              sort: false
        trigger_wait_time:
          name: Trigger Wait Time
          description: "Defines how long the trigger (e.g., Light) must stay ON to
            satisfy the wait condition.\n\n\n  • If **Use the wait time** is selected,
            the fan will turn ON only *after* this time is reached.\n  • If **Turn
            ON but use the wait time** is selected, the fan turns ON, but will turn
            OFF after the Brief Use Delay if the trigger doesn't stay ON for this
            full duration.\n"
          default: 3
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.2
              unit_of_measurement: minutes
              mode: slider
        brief_use_delay:
          name: Brief Use Delay
          description: 'Only applies when **Turn ON but use the wait time** is selected.
            If the trigger turns OFF before the full Trigger Wait Time is reached,
            this sets a short delay before the fan turns OFF. Helps avoid the fan
            turning OFF too quickly during brief use.

            '
          default: 1
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.2
              unit_of_measurement: minutes
              mode: slider
        safeguard_option:
          name: Safeguard Option (Optional)
          description: 'This safeguard is active only in **Normal Mode (Default)**
            and sets a maximum runtime to prevent the fan from running indefinitely.
            If the automation turns the fan **ON** and the initial trigger condition
            (e.g., light remains **ON**) does not revert to **OFF** within the safeguard
            time frame, the safeguard will activate and proceed directly to the **Fan
            Time Delay** stage.  If selecting this setting, please specify the safeguard
            maximum run time below.


            This option is intended for use when a light switch is the trigger.

            '
          default: disable_safeguard
          selector:
            select:
              options:
              - label: Use the safeguard
                value: enable_safeguard
              - label: Use the safeguard + Turn trigger OFF
                value: enable_safeguard_and_trigger
              - label: Dont use safeguard
                value: disable_safeguard
              custom_value: false
              multiple: false
              sort: false
        safeguard:
          name: Safeguard - Maximum Run Time
          description: 'The safeguard maximum run time.

            '
          default: 20
          selector:
            number:
              min: 5.0
              max: 60.0
              step: 0.5
              unit_of_measurement: minutes
              mode: slider
    fan_settings:
      name: Fan *
      icon: mdi:fan
      collapsed: true
      input:
        fan_switch:
          name: Fan *
          description: 'The fan that gets turned ON by the trigger sensor.

            '
          default: []
          selector:
            entity:
              reorder: false
              multiple: false
        time_delay:
          name: Time Delay
          description: 'The delay time to leave the fan ON after the light is turned
            OFF or the last motion is detected.

            '
          default: 2.5
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.5
              unit_of_measurement: minutes
              mode: slider
    lights:
      name: Lights
      icon: mdi:lightbulb-on-outline
      collapsed: true
      input:
        include_lights:
          name: Use The Lights Options (Optional)
          description: "This option is typically used together with night lights.
            It allows you to set a higher brightness (e.g., 100%) during the day,
            while the night lights option lets you set a lower brightness (e.g., 10%)
            at night.\n\n**NOTE** - This option **can only** be used if your light
            is selected in the **Trigger Sensor** input.\n\n⚠️ If you're not using
            a light as the trigger and still want to control your lights, please use
            my \U0001F4A1[Sensor Light](https://community.home-assistant.io/t/481048)
            blueprint instead.\n"
          default: lights_disabled
          selector:
            select:
              options:
              - label: Enable the lights options
                value: lights_enabled
              - label: Disable the lights options
                value: lights_disabled
              custom_value: false
              multiple: false
              sort: false
        include_light_control:
          name: Light Control Options (Optional)
          description: 'Select if you would like to use brightness or transition.
            These settings will only affect a ''light'' entity that supports each
            selected option. The settings for brightness and transition are provided
            below.

            '
          default: []
          selector:
            select:
              multiple: true
              options:
              - label: Use Brightness
                value: use_brightness
              - label: Use Transition
                value: use_transition
              custom_value: false
              sort: false
        light_brightness:
          name: Brightness
          description: 'The brightness setting for the lights when they are turned
            ON.

            '
          default: 100
          selector:
            number:
              min: 1.0
              max: 100.0
              mode: slider
              step: 1.0
              unit_of_measurement: '%'
        light_transition_on:
          name: Transition - ON
          description: 'The transition setting for the lights when they are turned
            ON.

            '
          default: 1
          selector:
            number:
              min: 0.0
              max: 5.0
              mode: slider
              step: 0.5
              unit_of_measurement: seconds
        light_transition_off:
          name: Transition - OFF
          description: 'The transition setting for the lights when they are turned
            OFF.

            '
          default: 1
          selector:
            number:
              min: 0.0
              max: 30.0
              mode: slider
              step: 1.0
              unit_of_measurement: seconds
        include_light_colour_control:
          name: Light Colour Control Options (Optional)
          description: 'Select if you would like to use colour temperature, RGB, RGBW
            or RGBWW colour. These settings will only affect a ''light'' entity that
            supports each selected option. The settings for colour temperature, RGB,
            RGBW and RGBWW colour are provided below.

            '
          default: disable_colour_control
          selector:
            select:
              options:
              - label: Use Colour Temperature
                value: use_colour_temperature
              - label: Use RGB Colour
                value: use_rgb_colour
              - label: Use RGBW Colour
                value: use_rgbw_colour
              - label: Use RGBWW Colour
                value: use_rgbww_colour
              - label: Disable Colour Control
                value: disable_colour_control
              custom_value: false
              multiple: false
              sort: false
        light_colour_temperature:
          name: Colour Temperature
          description: 'The colour temperature setting for the lights when they are
            turned ON.

            '
          default: 5000
          selector:
            number:
              min: 2000.0
              max: 8000.0
              mode: slider
              step: 100.0
              unit_of_measurement: kelvin
        light_rgb_colour:
          name: RGB Colour
          description: 'The RGB colour setting for the lights when they are turned
            ON.

            '
          default:
          - 255
          - 255
          - 255
          selector:
            color_rgb: {}
        light_rgbw_colour:
          name: RGBW Colour
          description: 'The RGBW colour setting for the lights when they are turned
            ON. Enter four integers between 0 and 255 to define the values for Red,
            Green, Blue, and White.

            '
          default:
          - 255
          - 255
          - 255
          - 255
          selector:
            object:
              multiple: false
        light_rgbww_colour:
          name: RGBWW Colour
          description: 'The RGBWW colour setting for the lights when they are turned
            ON. Enter five integers between 0 and 255 to define the values for Red,
            Green, Blue, Cold White and Warm White.

            '
          default:
          - 255
          - 255
          - 255
          - 255
          - 255
          selector:
            object:
              multiple: false
    night_lights:
      name: Night Lights
      icon: mdi:lightbulb-night-outline
      collapsed: true
      input:
        include_night_lights:
          name: Use The Night Lights Options (Optional)
          description: "Enabling the night lights options allows for separate and
            customizable lighting control when the night lights conditions are met.
            Night light condition options include entity state, time, or sun elevation.
            Please choose the condition option you would like to use below. This feature
            is particularly beneficial for creating a soothing ambiance with softer
            lighting at night. The flexibility of these options allows for personalized
            adjustments, enhancing your night time ambiance and comfort, especially
            when moving around during the night.\n\n**NOTE** - This option **can only**
            be used if your light is selected in the **Trigger Sensor** input. If
            you're using the Night Lights option, it's recommended to also enable
            the Lights option above to ensure your lights reset to their daytime settings.\n\n⚠️
            If you're not using a light as the trigger and still want to control your
            lights, please use my \U0001F4A1[Sensor Light](https://community.home-assistant.io/t/481048)
            blueprint instead.\n"
          default: night_lights_disabled
          selector:
            select:
              options:
              - label: Enable the night lights options
                value: night_lights_enabled
              - label: Disable the night lights options
                value: night_lights_disabled
              custom_value: false
              multiple: false
              sort: false
        night_lights_conditions:
          name: Night Lights Conditions (Required For Night Lights)
          description: 'Select any night light condition from the options provided
            and ensure that **Use Night Lights Options** is enabled in the section
            above. You must choose at least one ''Night Light Condition'' for the
            night lights to operate, and the settings for each condition are provided
            below. If you select two or more conditions, all selected conditions must
            be met for the night lights to activate.

            '
          default: []
          selector:
            select:
              multiple: true
              options:
              - label: Enable entity state option
                value: entity_state_enabled
              - label: Enable time option
                value: time_enabled
              - label: Enable sun elevation option
                value: sun_enabled
              custom_value: false
              sort: false
        night_lights_entity_state:
          name: Night Lights - Entity State
          description: 'Select an entity that will trigger the activation of night
            lights when turned ON. This could be your phone on ''Do Not Disturb'',
            a helper, a bed sensor, etc. Please note that the selected entity cannot
            be included in the ''Lights - Switches - Scenes - Scripts'' or ''Night
            Lights'' selections.


            For more information on entity state [Click Here](https://community.home-assistant.io/t/481048/663)

            '
          default: []
          selector:
            entity:
              multiple: true
              reorder: false
        night_lights_after_time:
          name: Night Lights - Start Time
          description: 'Set the start time.

            '
          default: 00:00:00
          selector:
            time: {}
        night_lights_before_time:
          name: Night Lights - End Time
          description: 'Set the end time.

            '
          default: 00:00:00
          selector:
            time: {}
        night_lights_sun_elevation:
          name: Night Lights - Sun Elevation Falling
          description: 'The sun elevation falling refers to the angle between the
            sun and the horizon when the sun is setting. A negative value indicates
            that the sun is BELOW the horizon. For example, a setting guide of -1.5
            corresponds to dusk.

            '
          default: -1.5
          selector:
            number:
              min: -10.0
              max: 5.0
              step: 0.5
              unit_of_measurement: degrees
              mode: slider
        night_lights_sun_elevation_rising:
          name: Night Lights - Sun Elevation Rising
          description: 'The sun elevation rising refers to the angle between the sun
            and the horizon during sunrise. A negative value indicates that the sun
            is BELOW the horizon. For example, a setting guide of -4.0 corresponds
            to dawn.

            '
          default: -4.0
          selector:
            number:
              min: -10.0
              max: 5.0
              step: 0.5
              unit_of_measurement: degrees
              mode: slider
        include_night_light_control:
          name: Night Lights - Light Control Options (Optional)
          description: "Select if you would like to use brightness or transition.
            These settings will only affect a 'light' entity that supports each selected
            option. The settings for brightness and transition are provided below.
            \n\nSelecting 'If lights are ON, adjust the lights when crossing over'
            option ensures that the light control settings will be applied to any
            lights that are already ON during the transition from normal lights to
            night lights and vice versa.\n\nSelecting 'Yes - Manage OFF script when
            crossing over' is beneficial for scripts containing if-then-else actions
            that toggle various functions on and off during the transition from normal
            lights to night lights and vice versa.\n"
          default: []
          selector:
            select:
              multiple: true
              options:
              - label: Use brightness
                value: use_brightness
              - label: Use transition
                value: use_transition
              custom_value: false
              sort: false
        night_light_brightness:
          name: Night Lights - Brightness
          description: 'The brightness setting of the lights when they are turned
            ON.

            '
          default: 10
          selector:
            number:
              min: 1.0
              max: 100.0
              mode: slider
              step: 1.0
              unit_of_measurement: '%'
        night_light_transition_on:
          name: Night Lights - Transition - ON
          description: 'The transition of the lights when they are turned ON.

            '
          default: 1
          selector:
            number:
              min: 0.0
              max: 5.0
              mode: slider
              step: 0.5
              unit_of_measurement: seconds
        night_light_transition_off:
          name: Night Lights - Transition - OFF
          description: 'The transition of the lights when they are turned OFF.

            '
          default: 1
          selector:
            number:
              min: 0.0
              max: 30.0
              mode: slider
              step: 1.0
              unit_of_measurement: seconds
        include_night_light_colour_control:
          name: Night Lights - Light Colour Control Options (Optional)
          description: 'Select if you would like to use colour temperature, RGB, RGBW
            or RGBWW colour. These settings will only affect a ''light'' entity that
            supports each selected option. The settings for colour temperature, RGB,
            RGBW and RGBWW colour are provided below

            '
          default: disable_colour_control
          selector:
            select:
              options:
              - label: Use Colour Temperature
                value: use_colour_temperature
              - label: Use RGB Colour
                value: use_rgb_colour
              - label: Use RGBW Colour
                value: use_rgbw_colour
              - label: Use RGBWW Colour
                value: use_rgbww_colour
              - label: Disable Colour Control
                value: disable_colour_control
              custom_value: false
              multiple: false
              sort: false
        night_light_colour_temperature:
          name: Night Lights - Colour Temperature
          description: 'The colour temperature setting for the lights when they are
            turned ON.

            '
          default: 5000
          selector:
            number:
              min: 2000.0
              max: 8000.0
              mode: slider
              step: 100.0
              unit_of_measurement: kelvin
        night_light_rgb_colour:
          name: Night Lights - RGB Colour
          description: 'The RGB colour setting for the lights when they are turned
            ON.

            '
          default:
          - 255
          - 255
          - 255
          selector:
            color_rgb: {}
        night_light_rgbw_colour:
          name: Night Lights - RGBW Colour
          description: 'The RGBW colour setting for the lights when they are turned
            ON. Enter four integers between 0 and 255 to define the values for Red,
            Green, Blue, and White.

            '
          default:
          - 255
          - 255
          - 255
          - 255
          selector:
            object:
              multiple: false
        night_light_rgbww_colour:
          name: Night Lights - RGBWW Colour
          description: 'The RGBWW colour setting for the lights when they are turned
            ON. Enter five integers between 0 and 255 to define the values for Red,
            Green, Blue, Cold White and Warm White.

            '
          default:
          - 255
          - 255
          - 255
          - 255
          - 255
          selector:
            object:
              multiple: false
    manual_settings:
      name: Manual Fan Switch
      icon: mdi:toggle-switch-outline
      collapsed: true
      input:
        include_manual_fan_switch:
          name: Use The Manual Fan Switch Option (Optional)
          description: 'This feature enables manual control of the fan, allowing you
            to turn it ON or OFF independently, while also retaining the automation
            trigger capability. If automation is triggered the manual fan switch will
            be turned OFF. Option 2 may assist you to never overlook turning the fan
            OFF or can also serve as a manual timer.


            **NOTE** - Please note that the manual fan switch entity cannot be connected
            to either your actual fan switch or the trigger. It must function as a
            completely independent switch; otherwise, the automation will not operate.

            '
          default: disable_manual_fan_switch
          selector:
            select:
              options:
              - label: 1 - Enable manual fan switch option
                value: enable_manual_fan_switch
              - label: 2 - Enable manual fan switch + auto off option
                value: enable_manual_fan_switch_auto_off
              - label: Disable manual fan switch
                value: disable_manual_fan_switch
              custom_value: false
              multiple: false
              sort: false
        manual_fan_switch:
          name: Manual Fan Switch
          description: 'Enter a switch that will turn ON / OFF the fan.

            '
          default: []
          selector:
            entity:
              filter:
              - domain:
                - switch
                - binary_sensor
                - input_boolean
              reorder: false
              multiple: false
        manual_fan_switch_time_delay:
          name: Manual Fan Switch Auto OFF - Time Delay
          description: 'If you have enabled option 2 above, then set the auto OFF
            time delay.

            '
          default: 10
          selector:
            number:
              min: 0.0
              max: 40.0
              step: 0.5
              unit_of_measurement: minutes
              mode: slider
    notify_time_restrictions_settings:
      name: Time Restrictions
      icon: mdi:clock-outline
      collapsed: true
      input:
        include_time:
          name: Use the Time Restriction Option (Optional)
          description: 'Restrict automation to the specified start and end times on
            the selected days. Triggers outside this time range will be skipped. This
            is useful for disableing the fan that could wake you while you''re asleep,
            such as going to the toilet at night.

            '
          default: time_disabled
          selector:
            select:
              options:
              - label: Enable notify time restrictions
                value: time_enabled
              - label: Disable notify time restrictions
                value: time_disabled
              custom_value: false
              multiple: false
              sort: false
        after_time:
          name: Start Time
          description: 'Set the time when fan is allowed to run.

            '
          default: 00:00:00
          selector:
            time: {}
        before_time:
          name: End Time
          description: 'Set the time when fan should be stopped.

            '
          default: 00:00:00
          selector:
            time: {}
        weekday_options:
          name: Weekdays
          description: 'Select which days the fan is allowed to run. To activate this,
            you must enable the Time Restriction option above.

            '
          default:
          - mon
          - tue
          - wed
          - thu
          - fri
          - sat
          - sun
          selector:
            select:
              multiple: true
              mode: list
              options:
              - label: Monday
                value: mon
              - label: Tuesday
                value: tue
              - label: Wednesday
                value: wed
              - label: Thursday
                value: thu
              - label: Friday
                value: fri
              - label: Saturday
                value: sat
              - label: Sunday
                value: sun
              custom_value: false
              sort: false
    bypass_settings:
      name: Bypass
      icon: mdi:cog-pause-outline
      collapsed: true
      input:
        include_bypass:
          name: Use The By-pass Options (Optional)
          description: 'Select enable or disable. All of the three enable options
            will allow manual control of your fan. The three enable options are only
            for selecting what should happen when you turn the by-pass ON. When enabling
            an option, please enter the by-pass switch into the corresponding input
            below.

            '
          default: []
          selector:
            select:
              options:
              - label: 1 - Enable the By-pass - Turn fan ON
                value: bypass_enabled_turn_on
              - label: 2 - Enable the By-pass - Turn fan OFF
                value: bypass_enabled_turn_off
              - label: 3 - Enable the By-pass - Keep the fan current state
                value: bypass_enabled_stop
              multiple: true
              custom_value: false
              sort: false
        bypass_fan_on:
          name: By-pass Switch - Turn Fan ON
          description: 'Select the switches that will turn your fan ON, By-pass the
            trigger sensor and make your fan function as normal. The entity cannot
            be included in the "Fan" selections.

            '
          default: []
          selector:
            entity:
              multiple: true
              reorder: false
        bypass_fan_off:
          name: By-pass Switch - Turn Fan OFF
          description: 'Select the switches that will turn your fan OFF, By-pass the
            trigger sensor and make your fan function as normal. The entity cannot
            be included in the "Fan" selections.

            '
          default: []
          selector:
            entity:
              multiple: true
              reorder: false
        bypass_fan_stop:
          name: By-pass Switch - Keep The Fan Current State
          description: 'Select the switches that will pause your fan, By-pass the
            trigger sensor and make your fan function as normal. The entity cannot
            be included in the "Fan" selections.

            '
          default: []
          selector:
            entity:
              multiple: true
              reorder: false
        include_bypass_auto_off:
          name: Use The By-pass Auto OFF Option (Optional)
          description: 'This is used when you turn the by-pass ON and you would like
            the by-pass to automatically turn OFF in a set time delay. It can also
            be used as a timer to turn the fan ON and then OFF if you have chosen
            to use "Enable the By-pass - Turn fan ON" above.

            '
          default: []
          selector:
            select:
              options:
              - label: Enable the by-pass auto off - Turn fan ON option
                value: bypass_auto_off_enabled_on
              - label: Enable the by-pass auto off  - Turn fan OFF option
                value: bypass_auto_off_enabled_off
              - label: Enable the by-pass auto off  - Keep the fan current state
                value: bypass_auto_off_enabled_stop
              multiple: true
              custom_value: false
              sort: false
        bypass_auto_off_delay:
          name: By-pass Auto OFF - Time Delay
          description: 'Set the by-pass auto OFF time delay. The time delay starts
            from the last by-pass that was turned ON.

            '
          default: 60
          selector:
            number:
              min: 1.0
              max: 240.0
              step: 1.0
              unit_of_measurement: minutes
              mode: slider
    global_conditions_settings:
      name: Global Conditions
      icon: mdi:earth
      collapsed: true
      input:
        global_conditions:
          name: Global Conditions
          description: 'Enter any global conditions you would like to apply to the
            automation.

            '
          default: []
          selector:
            condition: {}
    ha_restart:
      name: HA Restart
      icon: mdi:restart
      collapsed: true
      input:
        include_ha_restart:
          name: Use The HA Restart Option (Optional)
          description: 'Select this option to activate the Home Assistant restart
            option.


            **Note -** If you''re using my "Bathroom Humidity Exhaust Fan" blueprint
            with the same fan, don''t turn on this option.  The "Bathroom Humidity
            Exhaust Fan" blueprint already has its own restart safeguard. This avoids
            conflicts - that''s why it''s an option to enable or disable.

            '
          default: disable_ha_restart
          selector:
            select:
              options:
              - label: Enable the HA Restart option
                value: enable_ha_restart
              - label: Disable the HA Restart option
                value: disable_ha_restart
              custom_value: false
              multiple: false
              sort: false
  source_url: https://gist.github.com/Blackshome/70349658a0c7543dbaa5f2e69e10cce0
mode: restart
