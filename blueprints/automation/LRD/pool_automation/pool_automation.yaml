# =============================================================================
# Pool Automation Blueprint
# Repository: https://github.com/scottdube/lrd-ha-config
# =============================================================================
#
# CHANGELOG:
#  v1.10.1 current_water_temp fallback fix (ADR-013). When the OmniLogic
#          water sensor reads 'unknown' (pump off → no flow for sensor to
#          settle), the prior float(75) fallback drove hours_to_heat to 14
#          (= 89 - 75), which made heat_start_minutes negative, which made
#          pump_should_start_minutes always satisfy the PUMP START gate.
#          Result: every poll after a lockout cleared (or any other off
#          state) immediately fired PUMP START. Confirmed against logbook
#          on 2026-05-02: pump turned on at 00:10:01 EDT — first poll after
#          midnight lockout auto-clear — even though no scheduled run window
#          had been reached. Fallback now returns target_temp, making
#          hours_to_heat = 0 when sensor is unknown, so PUMP START is gated
#          by filter_start_minutes (morning waterfall window) only.
#
#  v1.10.0 Two new mode gates — service lockout (ADR-011) and vacation mode
#          (ADR-012). Both use input_boolean helpers (defined in
#          packages/pool/pool_modes.yaml) checked via new blueprint inputs.
#
#          HOTFIX 2026-05-02 (within v1.10.0): three input variables were
#          referenced in templates but never declared in the variables:
#          block — service_lockout_boolean, vacation_boolean, and
#          vacation_filter_start_time. Result was UndefinedError at template
#          evaluation, causing silent failure of the HEATER+SPEED post-choose
#          action (vacation toggle had no effect on heater state). Fixed by
#          adding the !input wirings.
#
#          SERVICE LOCKOUT: when input_boolean.pool_service_lockout is on,
#          all equipment-control branches (PUMP START, WATERFALL ON,
#          WATERFALL END pump-off action, NOT-A-SWIM-DAY pump-off, HEATER+
#          SPEED maintenance) skip. Pool light branches and midnight reset
#          continue normally — service is about pump/heater/waterfall, not
#          unrelated functions. Detection: external pump on/off transitions
#          (from Hayward panel) toggle the lockout via separate automations
#          in packages/pool/pool_modes.yaml. Mobile notify on engage with
#          "Resume" action. Auto-clear at midnight as safety backstop.
#          Replaces tech's breaker-cycling workflow which was wearing the
#          60A pool breaker faster than its load class warrants.
#
#          VACATION MODE: when input_boolean.vacation is on, the blueprint
#          switches from "swim day" logic to filter-only logic. Heater off,
#          waterfall closed, pool light still works (security), pump runs a
#          configurable filter window (default 10:00–18:00, 8 hours). Avoids
#          algae bloom over multi-day absences. NOT-A-SWIM-DAY logic is
#          bypassed during vacation (we want filtration regardless of
#          forecast). Service lockout still applies on top — vacation +
#          service = both pause equipment.
#
#  v1.9.0  Pump flow tied to compressor activity, not heater enabled state
#          (per ADR-006). New input heater_active_binary_sensor sourced from
#          binary_sensor.<heater_equip>_heater_equipment_status (HeaterState.ON
#          from pyomnilogic_local — covers BOTH heating and cooling compressor
#          activity since HeaterState has no direction component). Pump speed
#          now selects 77% iff compressor active, 55% otherwise.
#          WATERFALL END pump-shutoff gate uses heater_actively_delivering
#          instead of heater_is_on, so pump shuts off after waterfall window
#          when compressor is idle. Was gated open by enabled-but-idle heater
#          state — pump ran 24/7 on swim-day stretches.
#          KNOWN RISK BEING WATCHED: heat pump in AUTO with ~2°F hysteresis
#          runs both heat and cool cycles. Overnight pump-off blocks both
#          directions. Acceptable in Florida May–summer where overnight
#          cooling/heating demand is minimal. Revisit in shoulder season.
#          Added swim_day guards on PUMP START and WATERFALL ON branches —
#          previously both fired regardless of swim_day, requiring NOT-A-SWIM-DAY
#          branch to clean up. Closed the ordering bug.
#          Added integration-health gate on the main poll: if pump entity is
#          unavailable (e.g. during the OmniLogic Local midnight error burst),
#          skip the poll rather than reasoning with stale `unavailable`-as-off
#          state. See scratch/omnilogic-local-midnight-burst-2026-05-01.md.
#          NOTE: variable named `heater_actively_delivering` is a misnomer —
#          the signal covers compressor activity in either heat or cool mode.
#          Renaming deferred to a future cosmetic-cleanup version to keep
#          v1.9.0 focused.
#          POST-DEPLOY FIX (same v1.9.0): heater+speed maintenance moved out
#          of the inner choose because the WATERFALL ON branch was matching
#          first every poll during the day window and short-circuiting it.
#          Pump speed was therefore never adjusted between pump-start and
#          waterfall-end. Now it runs after the inner choose unconditionally
#          when pump is on, picking up compressor-state changes within 10 min.
#
#  v1.8.0  Migrated waterfall from switch to valve platform to support
#          haomnilogic-local v1.0.0b1+. Updated entity selector domain,
#          default entity ID, service calls (valve.open_valve/close_valve),
#          and state checks (open/closed vs on/off).
#
#  v1.7.0  Heater management moved from pump-start to poll loop. Heater is
#          now enforced every 10 minutes: on if swim day and pump running,
#          off if not swim day. Heat pump thermostat controls all cycling.
#          HA only controls pump speed (77% when heater needed, 55% when not).
#          Eliminates missed heater starts due to pump-start timing issues.
#          Removed heater_idle trigger - no longer needed.
#
#  v1.6.0  Waterfall now operates independently of pump_is_on.
#
#  v1.5.0  Fixed pump start bug and last temp assumption
#
# v1.4.0 - Switched to OmniLogic Local integration for all control actions.
# v1.3.0 - Dynamic pump start time. Rain sensor mm to inch conversion.
# v1.2.0 - Pool light illuminance trigger. Heater_idle pump shutoff.
# v1.1.0 - Weather-aware chlorinator boost. Forecast high sensor.
# v1.0.0 - Initial release.
#
# REQUIREMENTS:
# - OmniLogic Local HACS integration (cryptk/haomnilogic-local) v1.0.0b1+
# - Hayward OmniLogic HACS integration (djtimca/haomnilogic) - monitoring only
# - WeatherFlow Cloud integration
# - sensor.pool_forecast_high template sensor (see /config/templates.yaml)
# - input_datetime.pool_pump_actual_start helper
# - Hayward OmniPL or OmniLogic controller
# - Hayward HeatPro heat pump in AUTO mode
#
# SETUP:
# 1. Create input_datetime.pool_pump_actual_start helper first
# 2. Disable all OmniLogic schedules before activating
# 3. Set heat pump to AUTO mode on the unit itself
# 4. Configure all inputs to match your equipment entities
# =============================================================================

blueprint:
  name: "Pool Automation v1.10.1"
  description: >
    Pool Automation v1.10.1

    Intelligent pool automation using OmniLogic Local for control and
    WeatherFlow for environmental inputs. Cloud integration retained
    for ORP/salt/pH monitoring only.

    HEATER LOGIC (set-and-hold per ADR-002): heater enabled on swim
    days, disabled otherwise. Heat pump thermostat controls cycling.
    HA manages pump speed based on compressor activity (per ADR-006):
    heater_pump_speed when compressor is actively running,
    normal_pump_speed when idle or in vacation mode.

    MODES (v1.10.0):
    - Service mode (ADR-011) pauses equipment-control branches when
      input_boolean.pool_service_lockout is on. Detection via external
      panel-toggle (no HA context). Pool light continues normally.
    - Vacation mode (ADR-012) switches from swim-day logic to
      filter-only when input_boolean.vacation is on. Heater off,
      waterfall closed, pump runs vacation_filter window. Pool light
      continues for security.
  author: LRD
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:
    basic_config:
      name: Basic Configuration
      input:
        water_temp_sensor:
          name: Water Temperature Sensor
          description: Pool water temperature sensor (local integration)
          default: sensor.omnilogic_pool_watersensor
          selector:
            entity:
              domain: sensor
              device_class: temperature
        heater_entity:
          name: Heater Entity
          description: Pool heater entity (local integration)
          default: water_heater.omnilogic_pool_heater
          selector:
            entity:
              domain: water_heater
        heater_active_binary_sensor:
          name: Heater Compressor Active Binary Sensor
          description: >
            Binary sensor that reports whether the heat pump compressor is
            actively running (HeaterState.ON from pyomnilogic_local). Distinct
            from the heater entity's enable state, which stays on across the
            entire swim day. Used for pump-speed selection and pump-off gating
            so the pump only runs at heater speed and stays on while the
            compressor is actually delivering heat. Per ADR-006.
          default: binary_sensor.omnilogic_pool_heater_heater_equipment_status
          selector:
            entity:
              domain: binary_sensor
        service_lockout_boolean:
          name: Pool Service Lockout Boolean
          description: >
            input_boolean that pauses all equipment-control branches when ON.
            Detection automations toggle it based on external pump on/off
            transitions (from the Hayward panel). Per ADR-011. Defaults to
            input_boolean.pool_service_lockout (defined in
            packages/pool/pool_modes.yaml).
          default: input_boolean.pool_service_lockout
          selector:
            entity:
              domain: input_boolean
        vacation_boolean:
          name: Vacation Mode Boolean
          description: >
            input_boolean that switches the pool from swim-day logic to
            filter-only logic when ON. Heater off, waterfall closed, pump
            runs vacation_filter window. Per ADR-012. Defaults to
            input_boolean.vacation (defined in
            packages/pool/pool_modes.yaml).
          default: input_boolean.vacation
          selector:
            entity:
              domain: input_boolean
        pump_switch:
          name: Pump Switch
          description: Pool filter pump switch (local integration)
          default: switch.omnilogic_pool_filter_pump
          selector:
            entity:
              domain: switch
        pump_speed_entity:
          name: Pump Speed Entity
          description: Pool filter pump speed number entity (local integration)
          default: number.omnilogic_pool_filter_pump_speed
          selector:
            entity:
              domain: number
        waterfall_switch:
          name: Waterfall Valve
          description: Pool waterfall valve (local integration)
          default: valve.omnilogic_pool_waterfall
          selector:
            entity:
              domain: valve
        chlorinator_switch:
          name: Chlorinator Switch
          description: Pool chlorinator switch (local integration)
          default: switch.omnilogic_pool_chlorinator
          selector:
            entity:
              domain: switch
        chlorinator_percent_entity:
          name: Chlorinator Percent Entity
          description: Pool chlorinator timed percent number entity (local integration)
          default: number.omnilogic_pool_chlorinator_timed_percent
          selector:
            entity:
              domain: number
        weather_entity:
          name: Weather Entity
          description: WeatherFlow weather entity for current air temperature
          default: weather.lake_ridge_dr
          selector:
            entity:
              domain: weather
        forecast_high_sensor:
          name: Forecast High Sensor
          description: >
            Template sensor providing today's forecast high temperature.
            See /config/templates.yaml - sensor.pool_forecast_high
          default: sensor.pool_forecast_high
          selector:
            entity:
              domain: sensor
              device_class: temperature

    temperature_config:
      name: Temperature Settings
      input:
        target_temp:
          name: Target Pool Temperature (°F)
          description: >
            Target water temperature. Unit heats below and cools above
            with 2°F differential automatically.
          default: 89
          selector:
            number:
              min: 75
              max: 95
              unit_of_measurement: "°F"
        target_ready_time:
          name: Target Ready Time
          description: Time pool should be at target temperature and ready to swim
          default: "11:00:00"
          selector:
            time:
        min_swim_temp:
          name: Minimum Forecast Temp for Swimming (°F)
          description: If forecast high is below this temperature heater and pump turn off
          default: 78
          selector:
            number:
              min: 60
              max: 90
              unit_of_measurement: "°F"
        min_heatpump_air_temp:
          name: Minimum Air Temp for Heat Pump (°F)
          description: Heat pump efficiency drops significantly below this temperature
          default: 55
          selector:
            number:
              min: 45
              max: 65
              unit_of_measurement: "°F"

    pump_config:
      name: Pump Settings
      input:
        normal_pump_speed:
          name: Normal Pump Speed (%)
          description: Pump speed during normal filtration
          default: 65
          selector:
            number:
              min: 30
              max: 100
              unit_of_measurement: "%"
        heater_pump_speed:
          name: Heater Pump Speed (%)
          description: Minimum pump speed when heater needed
          default: 75
          selector:
            number:
              min: 50
              max: 100
              unit_of_measurement: "%"
        min_filter_hours:
          name: Minimum Filter Hours Per Day
          description: >
            Minimum hours pump should run each day for filtration.
            Waterfall runtime counts toward this total.
          default: 8
          selector:
            number:
              min: 4
              max: 24
              unit_of_measurement: hours
        waterfall_start_time:
          name: Waterfall Start Time
          description: Time to turn waterfall on daily
          default: "09:00:00"
          selector:
            time:
        waterfall_end_time:
          name: Waterfall End Time
          description: Time to turn waterfall off
          default: "20:00:00"
          selector:
            time:
        vacation_filter_start_time:
          name: Vacation Filter Start Time
          description: >
            When in vacation mode, start the filtration pump at this time.
            Pump runs for min_filter_hours and then turns off. Default
            10:00 (mid-morning, off-peak energy in many TOU plans, after
            sunrise pool warm-up).
          default: "10:00:00"
          selector:
            time:

    chlorinator_config:
      name: Chlorinator Settings
      input:
        normal_chlor_percent:
          name: Normal Chlorinator %
          description: Normal chlorinator output percentage
          default: 20
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        boost_chlor_percent:
          name: Rain Boost Chlorinator %
          description: Chlorinator output percentage after significant rainfall
          default: 50
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        rain_threshold:
          name: Rain Threshold (inches)
          description: Daily rainfall amount that triggers chlorinator boost
          default: 1.0
          selector:
            number:
              min: 0.25
              max: 3.0
              step: 0.25
              unit_of_measurement: "in"
        rain_sensor_today:
          name: Rain Sensor Today
          description: Precipitation today sensor (WeatherFlow)
          default: sensor.lake_ridge_dr_precipitation_today
          selector:
            entity:
              domain: sensor
        rain_sensor_yesterday:
          name: Rain Sensor Yesterday
          description: Precipitation yesterday sensor (WeatherFlow)
          default: sensor.lake_ridge_dr_precipitation_yesterday
          selector:
            entity:
              domain: sensor

    light_config:
      name: Pool Light Settings
      input:
        pool_light_switch:
          name: Pool Light Switch
          description: Pool light switch (local integration)
          default: switch.omnilogic_pool_light
          selector:
            entity:
              domain: switch
        illuminance_sensor:
          name: Illuminance Sensor
          description: Tempest illuminance sensor used to detect dusk (WeatherFlow)
          default: sensor.st_00184974_illuminance
          selector:
            entity:
              domain: sensor
              device_class: illuminance
        light_lux_threshold:
          name: Illuminance Threshold (lux)
          description: Turn pool light on when illuminance drops below this value
          default: 500
          selector:
            number:
              min: 50
              max: 2000
              unit_of_measurement: lux
        light_lux_debounce:
          name: Illuminance Debounce (minutes)
          description: Minutes illuminance must remain below threshold before turning light on
          default: 5
          selector:
            number:
              min: 1
              max: 30
              unit_of_measurement: minutes
        light_off_time:
          name: Pool Light Off Time
          description: Time to turn pool light off
          default: "22:00:00"
          selector:
            time:

variables:
  water_temp_sensor: !input water_temp_sensor
  heater_entity: !input heater_entity
  heater_active_binary_sensor: !input heater_active_binary_sensor
  service_lockout_boolean: !input service_lockout_boolean
  vacation_boolean: !input vacation_boolean
  pump_switch: !input pump_switch
  pump_speed_entity: !input pump_speed_entity
  waterfall_switch: !input waterfall_switch
  chlorinator_switch: !input chlorinator_switch
  chlorinator_percent_entity: !input chlorinator_percent_entity
  pool_light_switch: !input pool_light_switch
  weather_entity: !input weather_entity
  forecast_high_sensor: !input forecast_high_sensor
  target_temp: !input target_temp
  target_ready_time: !input target_ready_time
  min_swim_temp: !input min_swim_temp
  min_heatpump_air_temp: !input min_heatpump_air_temp
  normal_pump_speed: !input normal_pump_speed
  heater_pump_speed: !input heater_pump_speed
  min_filter_hours: !input min_filter_hours
  normal_chlor_percent: !input normal_chlor_percent
  boost_chlor_percent: !input boost_chlor_percent
  rain_threshold: !input rain_threshold
  rain_sensor_today: !input rain_sensor_today
  rain_sensor_yesterday: !input rain_sensor_yesterday
  light_lux_threshold: !input light_lux_threshold
  waterfall_start_time: !input waterfall_start_time
  waterfall_end_time: !input waterfall_end_time
  vacation_filter_start_time: !input vacation_filter_start_time
  current_water_temp: >
    {# v1.10.1 (ADR-013): fallback changed from float(75) to float(target_temp).
       The OmniLogic water sensor reads 'unknown' when the pump is off (no flow
       for the in-line probe to settle against). The old float(75) fallback
       made hours_to_heat = max(target_temp - 75, 0) — at target_temp=89 that's
       14 hours, driving heat_start_minutes negative and pump_should_start_minutes
       to a value < current_minutes the moment any other gate (e.g. service
       lockout) cleared. Result: pump auto-started immediately after lockout
       cleared at midnight even though no real heat demand existed.

       New fallback returns target_temp when the sensor is unknown, making
       hours_to_heat = 0 and letting filter_start_minutes (08:00 morning
       window) drive PUMP START. Pump comes on naturally at the morning
       filter window, reads true water temp once flow settles, and the
       blueprint reacts on the next /10 poll.

       Limitation: this assumes "unknown" means "we don't know, so don't
       force an early start" rather than "water might actually be very cold."
       For shoulder-season cold mornings this could leave warmup tight. The
       proper fix is a trusted-temp helper (logger v2 phase 2) or an
       independent water sensor that reports while pump is off (ADR-015
       candidate). #}
    {{ states(water_temp_sensor) | float(target_temp) }}
  current_air_temp: >
    {{ state_attr(weather_entity, 'temperature') | float(70) }}
  forecast_high: >
    {{ states(forecast_high_sensor) | float(70) }}
  rain_today: >
    {{ (states(rain_sensor_today) | float(0)) / 25.4 }}
  rain_yesterday: >
    {{ (states(rain_sensor_yesterday) | float(0)) / 25.4 }}
  significant_rain: >
    {{ rain_today >= rain_threshold or rain_yesterday >= rain_threshold }}
  swimming_day: >
    {{ forecast_high >= min_swim_temp }}
  heatpump_ok: >
    {{ current_air_temp >= min_heatpump_air_temp }}
  heater_needed: >
    {# v1.10.0: vacation_mode forces False so HEATER+SPEED maintenance
       turns the heater off naturally without a separate vacation branch.
       Single-expression form ensures clean boolean return — multi-line
       {% if %}{% endif %} returns a STRING with whitespace which can
       silently fail downstream `not heater_needed` comparisons even after
       HA's native-type conversion. Hotfix 2026-05-02. #}
    {{ false if is_state(vacation_boolean, 'on') else (swimming_day and heatpump_ok) }}
  hours_to_heat: >
    {% if not heatpump_ok %}
      {{ 0 }}
    {% else %}
      {{ [target_temp - current_water_temp, 0] | max | float }}
    {% endif %}
  target_ready_minutes: >
    {% set t = target_ready_time %}
    {% set h = t[0:2] | int %}
    {% set m = t[3:5] | int %}
    {{ h * 60 + m }}
  waterfall_end_minutes: >
    {% set t = waterfall_end_time %}
    {% set h = t[0:2] | int %}
    {% set m = t[3:5] | int %}
    {{ h * 60 + m }}
  waterfall_start_minutes: >
    {% set t = waterfall_start_time %}
    {% set h = t[0:2] | int %}
    {% set m = t[3:5] | int %}
    {{ h * 60 + m }}
  waterfall_hours: >
    {{ ((waterfall_end_minutes - waterfall_start_minutes) / 60) | float }}
  extra_filter_needed_hours: >
    {{ [min_filter_hours - waterfall_hours, 0] | max | float }}
  heat_start_minutes: >
    {{ target_ready_minutes - (hours_to_heat * 60) }}
  filter_start_minutes: >
    {{ waterfall_start_minutes - (extra_filter_needed_hours * 60) }}
  pump_should_start_minutes: >
    {{ [heat_start_minutes, filter_start_minutes] | min }}
  current_minutes: >
    {{ now().hour * 60 + now().minute }}
  pump_is_on: >
    {{ is_state(pump_switch, 'on') }}
  heater_is_on: >
    {{ not is_state(heater_entity, 'off') }}
  heater_actively_delivering: >
    {# Per ADR-006: distinguishes compressor-running from heater-enabled.
       Fail-safe: if the binary sensor is unavailable, treat as True so
       we keep the pump running rather than starve the heat exchanger.
       v1.10.0: when in vacation_mode, force False since heater should be
       off in vacation.
       Single-expression form ensures clean boolean return — see hotfix
       comment on heater_needed above for why. Hotfix 2026-05-02. #}
    {{ false if is_state(vacation_boolean, 'on')
       else (true if states(heater_active_binary_sensor) in ['unavailable', 'unknown']
             else is_state(heater_active_binary_sensor, 'on')) }}
  service_active: >
    {# Per ADR-011: pool service lockout. When True, equipment-control
       branches pause. Detection automations in pool_modes.yaml toggle
       the boolean based on external panel-toggle events.
       Fail-safe: if the helper doesn't exist, treat as False (no lockout)
       so a missing helper doesn't disable the pool. #}
    {{ is_state(service_lockout_boolean, 'on') }}
  vacation_mode: >
    {# Per ADR-012: cross-cutting vacation toggle. When True, pool runs
       filter-only logic (no heating, no waterfall, pool light still works).
       Fail-safe: if helper doesn't exist, treat as False (normal operation). #}
    {{ is_state(vacation_boolean, 'on') }}
  vacation_filter_start_minutes: >
    {% set t = vacation_filter_start_time %}
    {% set h = t[0:2] | int %}
    {% set m = t[3:5] | int %}
    {{ h * 60 + m }}
  vacation_filter_end_minutes: >
    {{ vacation_filter_start_minutes + (min_filter_hours * 60) }}
  should_filter: >
    {# Cross-mode filtration gate. In normal mode: tied to swim_day. In
       vacation mode: always filter (pool needs sanitization regardless
       of swim use). #}
    {{ swimming_day or vacation_mode }}
  hours_pumped_today: >
    {% set start = states('input_datetime.pool_pump_actual_start') %}
    {% if start and start != 'unknown' and not start.startswith('1970') %}
      {% set start_dt = strptime(start, '%Y-%m-%d %H:%M:%S') %}
      {% set now_dt = now().replace(tzinfo=none) %}
      {{ ((now_dt - start_dt).total_seconds() / 3600) | float }}
    {% else %}
      {{ 0 }}
    {% endif %}
  filtration_complete: >
    {{ hours_pumped_today >= min_filter_hours }}

trigger:
  - platform: time_pattern
    minutes: "/10"
    id: poll
  - platform: numeric_state
    entity_id: !input illuminance_sensor
    below: !input light_lux_threshold
    for:
      minutes: !input light_lux_debounce
    id: light_on_lux
  - platform: sun
    event: sunset
    offset: "00:30:00"
    id: light_on_sunset
  - platform: time
    at: !input light_off_time
    id: light_off
  - platform: time
    at: "00:01:00"
    id: midnight_reset

condition: []

action:
  - choose:
      # MIDNIGHT RESET - clear pump start time for new day
      - conditions:
          - condition: trigger
            id: midnight_reset
        sequence:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.pool_pump_actual_start
            data:
              datetime: "1970-01-01 00:00:00"

      # MAIN POLL - every 10 minutes
      # Integration-health gate: skip the entire poll if pump entity is
      # unavailable. Otherwise pump_is_on (= is_state(pump_switch, 'on'))
      # returns False for an unavailable entity, which causes the PUMP START
      # branch to fire on stale state during integration outages (e.g. the
      # OmniLogic Local midnight error burst — see scratch/omnilogic-local-
      # midnight-burst-2026-05-01.md).
      - conditions:
          - condition: trigger
            id: poll
          - condition: template
            value_template: "{{ states(pump_switch) != 'unavailable' }}"
        sequence:
          - choose:
              # PUMP START - conditions met and time reached
              # swim_day guard added v1.9.0: previously fired regardless of
              # swim_day, requiring the NOT-A-SWIM-DAY branch to undo it.
              # v1.10.0: gated on `not service_active` (ADR-011). When in
              # vacation_mode, uses vacation_filter window instead of
              # heat-time-based pump_should_start_minutes (ADR-012).
              # HOTFIX 2026-05-03: added upper-bound gate to the normal-mode
              # condition. Previously PUMP START would re-fire any time the
              # pump was off AND current_minutes >= pump_should_start_minutes
              # — including after WATERFALL END had turned it off at 20:00 for
              # the night. Result observed 2026-05-02: pump turned off at
              # 20:00:01 by WATERFALL END branch, then turned BACK ON at
              # 20:10:01 by PUMP START — defeating the entire ADR-006
              # overnight-savings premise.
              #
              # The upper bound uses OR logic across two signals:
              #   - current_minutes < waterfall_end_minutes (waterfall window)
              #   - not filtration_complete (filtration target not yet met)
              #
              # Combined: pump runs until BOTH waterfall window has closed
              # AND filtration target has been met. Whichever lasts longer
              # determines pump runtime. Handles three cases:
              #   1. Waterfall window > filtration time (Scott's setup):
              #      filtration completes first; waterfall window is the
              #      binding constraint. Pump turns off at waterfall_end.
              #   2. No waterfall (or very short window): filtration_complete
              #      is the binding constraint. Pump runs until filter target
              #      met, then stops.
              #   3. Long filtration target: if filtration > waterfall window,
              #      pump runs past waterfall_end until filter target met.
              - conditions:
                  - condition: template
                    value_template: >
                      {% if service_active %}
                        false
                      {% elif vacation_mode %}
                        {{ not pump_is_on
                           and current_minutes >= vacation_filter_start_minutes
                           and current_minutes < vacation_filter_end_minutes }}
                      {% else %}
                        {{ not pump_is_on
                           and current_minutes >= pump_should_start_minutes
                           and (current_minutes < waterfall_end_minutes or not filtration_complete)
                           and swimming_day }}
                      {% endif %}
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: !input pump_switch
                  - action: number.set_value
                    target:
                      entity_id: !input pump_speed_entity
                    data:
                      value: "{{ normal_pump_speed }}"
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.pool_pump_actual_start
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - action: number.set_value
                    target:
                      entity_id: !input chlorinator_percent_entity
                    data:
                      value: >
                        {% if significant_rain %}
                          {{ boost_chlor_percent }}
                        {% else %}
                          {{ normal_chlor_percent }}
                        {% endif %}

              # WATERFALL ON - within waterfall window AND swim day
              # swim_day guard added v1.9.0: previously fired regardless of
              # swim_day. Pump independence: if pump is off when waterfall
              # window opens, start pump at correct speed before enabling
              # waterfall.
              # v1.10.0: skipped during vacation_mode (no waterfall on
              # vacation per ADR-012) and during service_active (ADR-011).
              - conditions:
                  - condition: template
                    value_template: >
                      {{ current_minutes >= waterfall_start_minutes
                         and current_minutes < waterfall_end_minutes
                         and swimming_day
                         and not vacation_mode
                         and not service_active }}
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ not pump_is_on }}"
                    then:
                      - action: switch.turn_on
                        target:
                          entity_id: !input pump_switch
                      - action: number.set_value
                        target:
                          entity_id: !input pump_speed_entity
                        data:
                          value: >
                            {{ heater_pump_speed if heater_needed else normal_pump_speed }}
                      - action: input_datetime.set_datetime
                        target:
                          entity_id: input_datetime.pool_pump_actual_start
                        data:
                          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - if:
                      - condition: template
                        value_template: "{{ is_state(waterfall_switch, 'closed') }}"
                    then:
                      - action: valve.open_valve
                        target:
                          entity_id: !input waterfall_switch

              # WATERFALL END - time reached
              # v1.9.0: pump-shutoff gate now uses heater_actively_delivering
              # rather than heater_is_on. Previously the heater's enabled
              # state (true all swim day) blocked the pump shutoff, causing
              # 24/7 pump runs at heater speed — see ADR-006.
              # Known risk being deployed-and-watched: heat pump runs in AUTO
              # (heat AND cool, ~2°F hysteresis); overnight pump-off blocks
              # both directions of compressor activity. Acceptable risk in
              # Florida May–summer because (a) water rarely drops below
              # setpoint overnight in Florida heat, and (b) when above
              # setpoint, the pool radiates heat to sky overnight without
              # needing active cooling.
              # v1.10.0: pump-off action gated on `not service_active` so
              # we don't yank the pump out from under a tech still working.
              # Valve-close still fires regardless (cleanup is safe).
              - conditions:
                  - condition: template
                    value_template: >
                      {{ current_minutes >= waterfall_end_minutes
                         and is_state(waterfall_switch, 'open') }}
                sequence:
                  - action: valve.close_valve
                    target:
                      entity_id: !input waterfall_switch
                  - condition: template
                    value_template: >
                      {{ not heater_actively_delivering
                         and filtration_complete
                         and not service_active }}
                  - action: switch.turn_off
                    target:
                      entity_id: !input pump_switch

              # NOT A SWIMMING DAY (or end of vacation filter window) -
              # shut everything down.
              # v1.10.0: triggered when `should_filter` is False
              # (swim_day=False AND not vacation_mode), OR in vacation_mode
              # past the vacation filter end window. Gated on `not
              # service_active` so we don't shut down on a tech mid-work.
              - conditions:
                  - condition: template
                    value_template: >
                      {% if service_active %}
                        false
                      {% elif vacation_mode %}
                        {{ pump_is_on
                           and current_minutes >= vacation_filter_end_minutes }}
                      {% else %}
                        {{ not swimming_day and pump_is_on }}
                      {% endif %}
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: !input pump_switch
                  - action: valve.close_valve
                    target:
                      entity_id: !input waterfall_switch
                  - action: water_heater.set_operation_mode
                    target:
                      entity_id: !input heater_entity
                    data:
                      operation_mode: "off"

          # HEATER AND PUMP SPEED MAINTENANCE - POST-CHOOSE
          # v1.9.0 fix (was an inner-choose branch): inner choose's WATERFALL
          # ON branch matches every poll during 08:00-20:00 on swim days,
          # short-circuiting all later branches including this one. Result:
          # pump speed never adjusted during the day. Moved out of the inner
          # choose so it runs every poll regardless of which transition
          # branch (if any) just fired.
          # Heater enable: set on if swim day (heater_needed), off otherwise.
          # Heat pump thermostat controls actual cycling.
          # Pump speed (per ADR-006): heater_pump_speed iff compressor is
          # actively running, normal_pump_speed otherwise. Distinguishes
          # ready-but-idle from compressor-running.
          # Re-checks pump state via is_state() so a just-fired turn-off
          # branch (WATERFALL END or NOT-A-SWIM-DAY) doesn't get clobbered.
          # v1.10.0: skip entirely if service_active (ADR-011). In
          # vacation_mode (ADR-012), heater_needed is forced False (via
          # the variable definition above) so the heater-off branch fires
          # naturally and pump_speed selects normal_pump_speed.
          - if:
              - condition: template
                value_template: >
                  {{ is_state(pump_switch, 'on') and not service_active }}
            then:
              - if:
                  - condition: template
                    value_template: "{{ heater_needed and is_state(heater_entity, 'off') }}"
                then:
                  - action: water_heater.set_operation_mode
                    target:
                      entity_id: !input heater_entity
                    data:
                      operation_mode: "on"
                  - action: water_heater.set_temperature
                    target:
                      entity_id: !input heater_entity
                    data:
                      temperature: "{{ target_temp }}"
              - if:
                  - condition: template
                    value_template: "{{ not heater_needed and not is_state(heater_entity, 'off') }}"
                then:
                  - action: water_heater.set_operation_mode
                    target:
                      entity_id: !input heater_entity
                    data:
                      operation_mode: "off"
              - action: number.set_value
                target:
                  entity_id: !input pump_speed_entity
                data:
                  value: >
                    {{ heater_pump_speed if heater_actively_delivering else normal_pump_speed }}

      # POOL LIGHT ON - illuminance based (primary)
      - conditions:
          - condition: trigger
            id: light_on_lux
          - condition: template
            value_template: "{{ is_state(pool_light_switch, 'off') }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input pool_light_switch

      # POOL LIGHT ON - sunset fallback
      - conditions:
          - condition: trigger
            id: light_on_sunset
          - condition: template
            value_template: "{{ is_state(pool_light_switch, 'off') }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input pool_light_switch

      # POOL LIGHT OFF - fixed time
      - conditions:
          - condition: trigger
            id: light_off
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input pool_light_switch

mode: parallel
max_exceeded: silent
