# =============================================================================
# Pool Automation Blueprint
# Repository: https://github.com/scottdube/lrd-ha-config
# =============================================================================
#
# CHANGELOG:
#  v1.5.0  Fixed pump start bug and last temp assumption
#
# v1.4.0 - Switched to OmniLogic Local integration for all control actions.
#          Local integration provides faster response and works independently
#          of Hayward cloud. Cloud integration retained for ORP/salt/pH
#          monitoring only. Replaced omnilogic.set_pump_speed service with
#          number.set_value on local pump speed entity. Replaced
#          omnilogic.set_chlor_timed_percent with number.set_value on local
#          chlorinator percent entity.
#
#          INTEGRATION SPLIT:
#          LOCAL  - All control: pump, heater, waterfall, chlorinator, light
#          LOCAL  - Water temp, air temp sensors
#          CLOUD  - ORP, salt level, pH (monitoring only, not in blueprint)
#          WFLOW  - Forecast high, rain accumulation, illuminance, air temp
#
# v1.3.0 - Dynamic pump start time based on target ready time and minimum
#          filter hours. 10-minute polling replaces fixed pump start trigger.
#          Rain sensor mm to inch conversion added.
# v1.2.0 - Added pool light illuminance-based trigger with sunset fallback.
#          Added heater_idle pump shutoff trigger. Parallel mode.
# v1.1.0 - Added weather-aware chlorinator boost. Added forecast high sensor
#          input. Fixed heater control to use set_operation_mode.
# v1.0.0 - Initial release. Basic pump, heater, waterfall, chlorinator,
#          and light control.
#
# REQUIREMENTS:
# - OmniLogic Local HACS integration (cryptk/haomnilogic-local)
# - Hayward OmniLogic HACS integration (djtimca/haomnilogic) - monitoring only
# - WeatherFlow Cloud integration
# - sensor.pool_forecast_high template sensor (see /config/templates.yaml)
# - input_datetime.pool_pump_actual_start helper
# - Hayward OmniPL or OmniLogic controller
# - Hayward HeatPro heat pump in AUTO mode
#
# SETUP:
# 1. Create input_datetime.pool_pump_actual_start helper first
# 2. Disable all OmniLogic schedules before activating
# 3. Set heat pump to AUTO mode on the unit itself
# 4. Configure all inputs to match your equipment entities
# =============================================================================

blueprint:
  name: "Pool Automation v1.5.0"
  description: >
    Pool Automation v1.5.0

    Intelligent pool automation using OmniLogic Local for all control
    actions and WeatherFlow for environmental inputs. Cloud integration
    retained for ORP/salt/pH monitoring only.

    INTEGRATION SPLIT:
    LOCAL  - All control: pump, heater, waterfall, chlorinator, light
    LOCAL  - Water temp and air temp sensors
    CLOUD  - ORP, salt level, pH (monitoring only, not used here)
    WFLOW  - Forecast high, rain accumulation, illuminance, air temp
  author: LRD
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:
    basic_config:
      name: Basic Configuration
      input:
        water_temp_sensor:
          name: Water Temperature Sensor
          description: Pool water temperature sensor (local integration)
          default: sensor.omnilogic_pool_watersensor
          selector:
            entity:
              domain: sensor
              device_class: temperature
        heater_entity:
          name: Heater Entity
          description: Pool heater entity (local integration)
          default: water_heater.omnilogic_pool_heater
          selector:
            entity:
              domain: water_heater
        pump_switch:
          name: Pump Switch
          description: Pool filter pump switch (local integration)
          default: switch.omnilogic_pool_filter_pump
          selector:
            entity:
              domain: switch
        pump_speed_entity:
          name: Pump Speed Entity
          description: Pool filter pump speed number entity (local integration)
          default: number.omnilogic_pool_filter_pump_speed
          selector:
            entity:
              domain: number
        waterfall_switch:
          name: Waterfall Switch
          description: Pool waterfall switch (local integration)
          default: switch.omnilogic_pool_waterfall
          selector:
            entity:
              domain: switch
        chlorinator_switch:
          name: Chlorinator Switch
          description: Pool chlorinator switch (local integration)
          default: switch.omnilogic_pool_chlorinator
          selector:
            entity:
              domain: switch
        chlorinator_percent_entity:
          name: Chlorinator Percent Entity
          description: Pool chlorinator timed percent number entity (local integration)
          default: number.omnilogic_pool_chlorinator_timed_percent
          selector:
            entity:
              domain: number
        weather_entity:
          name: Weather Entity
          description: WeatherFlow weather entity for current air temperature
          default: weather.lake_ridge_dr
          selector:
            entity:
              domain: weather
        forecast_high_sensor:
          name: Forecast High Sensor
          description: >
            Template sensor providing today's forecast high temperature.
            See /config/templates.yaml - sensor.pool_forecast_high
          default: sensor.pool_forecast_high
          selector:
            entity:
              domain: sensor
              device_class: temperature

    temperature_config:
      name: Temperature Settings
      input:
        target_temp:
          name: Target Pool Temperature (°F)
          description: >
            Target water temperature. Unit heats below and cools above
            with 2°F differential automatically.
          default: 89
          selector:
            number:
              min: 75
              max: 95
              unit_of_measurement: "°F"
        target_ready_time:
          name: Target Ready Time
          description: Time pool should be at target temperature and ready to swim
          default: "11:00:00"
          selector:
            time:
        min_swim_temp:
          name: Minimum Forecast Temp for Swimming (°F)
          description: If forecast high is below this temperature heater and pump turn off
          default: 78
          selector:
            number:
              min: 60
              max: 90
              unit_of_measurement: "°F"
        min_heatpump_air_temp:
          name: Minimum Air Temp for Heat Pump (°F)
          description: Heat pump efficiency drops significantly below this temperature
          default: 55
          selector:
            number:
              min: 45
              max: 65
              unit_of_measurement: "°F"

    pump_config:
      name: Pump Settings
      input:
        normal_pump_speed:
          name: Normal Pump Speed (%)
          description: Pump speed during normal filtration
          default: 65
          selector:
            number:
              min: 30
              max: 100
              unit_of_measurement: "%"
        heater_pump_speed:
          name: Heater Pump Speed (%)
          description: Minimum pump speed when heater or cooler is running
          default: 75
          selector:
            number:
              min: 50
              max: 100
              unit_of_measurement: "%"
        min_filter_hours:
          name: Minimum Filter Hours Per Day
          description: >
            Minimum hours pump should run each day for filtration.
            Waterfall runtime counts toward this total.
          default: 8
          selector:
            number:
              min: 4
              max: 24
              unit_of_measurement: hours
        waterfall_start_time:
          name: Waterfall Start Time
          description: Time to turn waterfall on daily
          default: "09:00:00"
          selector:
            time:
        waterfall_end_time:
          name: Waterfall End Time
          description: Time to turn waterfall off
          default: "20:00:00"
          selector:
            time:

    chlorinator_config:
      name: Chlorinator Settings
      input:
        normal_chlor_percent:
          name: Normal Chlorinator %
          description: Normal chlorinator output percentage
          default: 20
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        boost_chlor_percent:
          name: Rain Boost Chlorinator %
          description: Chlorinator output percentage after significant rainfall
          default: 50
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        rain_threshold:
          name: Rain Threshold (inches)
          description: Daily rainfall amount that triggers chlorinator boost
          default: 1.0
          selector:
            number:
              min: 0.25
              max: 3.0
              step: 0.25
              unit_of_measurement: "in"
        rain_sensor_today:
          name: Rain Sensor Today
          description: Precipitation today sensor (WeatherFlow)
          default: sensor.lake_ridge_dr_precipitation_today
          selector:
            entity:
              domain: sensor
        rain_sensor_yesterday:
          name: Rain Sensor Yesterday
          description: Precipitation yesterday sensor (WeatherFlow)
          default: sensor.lake_ridge_dr_precipitation_yesterday
          selector:
            entity:
              domain: sensor

    light_config:
      name: Pool Light Settings
      input:
        pool_light_switch:
          name: Pool Light Switch
          description: Pool light switch (local integration)
          default: switch.omnilogic_pool_light
          selector:
            entity:
              domain: switch
        illuminance_sensor:
          name: Illuminance Sensor
          description: Tempest illuminance sensor used to detect dusk (WeatherFlow)
          default: sensor.st_00184974_illuminance
          selector:
            entity:
              domain: sensor
              device_class: illuminance
        light_lux_threshold:
          name: Illuminance Threshold (lux)
          description: Turn pool light on when illuminance drops below this value
          default: 500
          selector:
            number:
              min: 50
              max: 2000
              unit_of_measurement: lux
        light_lux_debounce:
          name: Illuminance Debounce (minutes)
          description: Minutes illuminance must remain below threshold before turning light on
          default: 5
          selector:
            number:
              min: 1
              max: 30
              unit_of_measurement: minutes
        light_off_time:
          name: Pool Light Off Time
          description: Time to turn pool light off
          default: "22:00:00"
          selector:
            time:

variables:
  water_temp_sensor: !input water_temp_sensor
  heater_entity: !input heater_entity
  pump_switch: !input pump_switch
  pump_speed_entity: !input pump_speed_entity
  waterfall_switch: !input waterfall_switch
  chlorinator_switch: !input chlorinator_switch
  chlorinator_percent_entity: !input chlorinator_percent_entity
  pool_light_switch: !input pool_light_switch
  weather_entity: !input weather_entity
  forecast_high_sensor: !input forecast_high_sensor
  target_temp: !input target_temp
  target_ready_time: !input target_ready_time
  min_swim_temp: !input min_swim_temp
  min_heatpump_air_temp: !input min_heatpump_air_temp
  normal_pump_speed: !input normal_pump_speed
  heater_pump_speed: !input heater_pump_speed
  min_filter_hours: !input min_filter_hours
  normal_chlor_percent: !input normal_chlor_percent
  boost_chlor_percent: !input boost_chlor_percent
  rain_threshold: !input rain_threshold
  rain_sensor_today: !input rain_sensor_today
  rain_sensor_yesterday: !input rain_sensor_yesterday
  light_lux_threshold: !input light_lux_threshold
  waterfall_start_time: !input waterfall_start_time
  waterfall_end_time: !input waterfall_end_time
  current_water_temp: >
    {{ states(water_temp_sensor) | float(75) }}
  current_air_temp: >
    {{ state_attr(weather_entity, 'temperature') | float(70) }}
  forecast_high: >
    {{ states(forecast_high_sensor) | float(70) }}
  rain_today: >
    {{ (states(rain_sensor_today) | float(0)) / 25.4 }}
  rain_yesterday: >
    {{ (states(rain_sensor_yesterday) | float(0)) / 25.4 }}
  significant_rain: >
    {{ rain_today >= rain_threshold or rain_yesterday >= rain_threshold }}
  swimming_day: >
    {{ forecast_high >= min_swim_temp }}
  heatpump_ok: >
    {{ current_air_temp >= min_heatpump_air_temp }}
  heater_needed: >
    {{ swimming_day and heatpump_ok }}
  hours_to_heat: >
    {% if not heatpump_ok %}
      {{ 0 }}
    {% else %}
      {{ [target_temp - current_water_temp, 0] | max | float }}
    {% endif %}
  target_ready_minutes: >
    {% set t = target_ready_time %}
    {% set h = t[0:2] | int %}
    {% set m = t[3:5] | int %}
    {{ h * 60 + m }}
  waterfall_end_minutes: >
    {% set t = waterfall_end_time %}
    {% set h = t[0:2] | int %}
    {% set m = t[3:5] | int %}
    {{ h * 60 + m }}
  waterfall_start_minutes: >
    {% set t = waterfall_start_time %}
    {% set h = t[0:2] | int %}
    {% set m = t[3:5] | int %}
    {{ h * 60 + m }}
  waterfall_hours: >
    {{ ((waterfall_end_minutes - waterfall_start_minutes) / 60) | float }}
  extra_filter_needed_hours: >
    {{ [min_filter_hours - waterfall_hours, 0] | max | float }}
  heat_start_minutes: >
    {{ target_ready_minutes - (hours_to_heat * 60) }}
  filter_start_minutes: >
    {{ waterfall_start_minutes - (extra_filter_needed_hours * 60) }}
  pump_should_start_minutes: >
    {{ [heat_start_minutes, filter_start_minutes] | min }}
  current_minutes: >
    {{ now().hour * 60 + now().minute }}
  pump_is_on: >
    {{ is_state(pump_switch, 'on') }}
  hours_pumped_today: >
    {% set start = states('input_datetime.pool_pump_actual_start') %}
    {% if start and start != 'unknown' and not start.startswith('1970') %}
      {% set start_dt = strptime(start, '%Y-%m-%d %H:%M:%S') %}
      {% set now_dt = now().replace(tzinfo=none) %}
      {{ ((now_dt - start_dt).total_seconds() / 3600) | float }}
    {% else %}
      {{ 0 }}
    {% endif %}
  filtration_complete: >
    {{ hours_pumped_today >= min_filter_hours }}

trigger:
  - platform: time_pattern
    minutes: "/10"
    id: poll
  - platform: state
    entity_id: !input heater_entity
    from: "on"
    to: "off"
    id: heater_idle
  - platform: numeric_state
    entity_id: !input illuminance_sensor
    below: !input light_lux_threshold
    for:
      minutes: !input light_lux_debounce
    id: light_on_lux
  - platform: sun
    event: sunset
    offset: "00:30:00"
    id: light_on_sunset
  - platform: time
    at: !input light_off_time
    id: light_off
  - platform: time
    at: "00:01:00"
    id: midnight_reset

condition: []

action:
  - choose:
      # MIDNIGHT RESET - clear pump start time for new day
      - conditions:
          - condition: trigger
            id: midnight_reset
        sequence:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.pool_pump_actual_start
            data:
              datetime: "1970-01-01 00:00:00"

      # MAIN POLL - every 10 minutes
      - conditions:
          - condition: trigger
            id: poll
        sequence:
          - choose:
              # PUMP START - conditions met and time reached
              - conditions:
                  - condition: template
                    value_template: >
                      {{ not pump_is_on
                         and current_minutes >= pump_should_start_minutes }}
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: !input pump_switch
                  - action: number.set_value
                    target:
                      entity_id: !input pump_speed_entity
                    data:
                      value: "{{ normal_pump_speed }}"
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.pool_pump_actual_start
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - condition: template
                    value_template: "{{ heater_needed }}"
                  - action: water_heater.set_operation_mode
                    target:
                      entity_id: !input heater_entity
                    data:
                      operation_mode: "on"
                  - action: water_heater.set_temperature
                    target:
                      entity_id: !input heater_entity
                    data:
                      temperature: "{{ target_temp }}"
                  - action: number.set_value
                    target:
                      entity_id: !input chlorinator_percent_entity
                    data:
                      value: >
                        {% if significant_rain %}
                          {{ boost_chlor_percent }}
                        {% else %}
                          {{ normal_chlor_percent }}
                        {% endif %}

              # WATERFALL START - pump is on and time reached
              - conditions:
                  - condition: template
                    value_template: >
                      {{ pump_is_on
                         and current_minutes >= waterfall_start_minutes
                         and current_minutes < waterfall_end_minutes
                         and is_state(waterfall_switch, 'off') }}
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: !input waterfall_switch

              # WATERFALL END - time reached
              - conditions:
                  - condition: template
                    value_template: >
                      {{ current_minutes >= waterfall_end_minutes
                         and is_state(waterfall_switch, 'on') }}
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: !input waterfall_switch
                  - condition: template
                    value_template: >
                      {{ not is_state(heater_entity, 'on')
                         and filtration_complete }}
                  - action: switch.turn_off
                    target:
                      entity_id: !input pump_switch
                  - action: water_heater.set_operation_mode
                    target:
                      entity_id: !input heater_entity
                    data:
                      operation_mode: "off"

              # NOT A SWIMMING DAY - shut everything down
              - conditions:
                  - condition: template
                    value_template: >
                      {{ not swimming_day and pump_is_on }}
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: !input pump_switch
                  - action: switch.turn_off
                    target:
                      entity_id: !input waterfall_switch
                  - action: water_heater.set_operation_mode
                    target:
                      entity_id: !input heater_entity
                    data:
                      operation_mode: "off"

              # PUMP SPEED ADJUSTMENT - based on heater state
              - conditions:
                  - condition: template
                    value_template: "{{ pump_is_on }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ is_state(heater_entity, 'on') }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input pump_speed_entity
                            data:
                              value: "{{ heater_pump_speed }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ not is_state(heater_entity, 'on') }}"
                        sequence:
                          - action: number.set_value
                            target:
                              entity_id: !input pump_speed_entity
                            data:
                              value: "{{ normal_pump_speed }}"

      # HEATER WENT IDLE - turn pump off if after waterfall end and filtration complete
      - conditions:
          - condition: trigger
            id: heater_idle
          - condition: time
            after: !input waterfall_end_time
          - condition: template
            value_template: "{{ filtration_complete }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input pump_switch

      # POOL LIGHT ON - illuminance based (primary)
      - conditions:
          - condition: trigger
            id: light_on_lux
          - condition: template
            value_template: "{{ is_state(pool_light_switch, 'off') }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input pool_light_switch

      # POOL LIGHT ON - sunset fallback
      - conditions:
          - condition: trigger
            id: light_on_sunset
          - condition: template
            value_template: "{{ is_state(pool_light_switch, 'off') }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input pool_light_switch

      # POOL LIGHT OFF - fixed time
      - conditions:
          - condition: trigger
            id: light_off
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input pool_light_switch

mode: parallel
max_exceeded: silent
