blueprint:
  name: Garage Door Open Alert
  description: >
    Alerts when a garage door is left open via mobile notification and Alexa
    announcements. Time-of-day and weather-aware with configurable delays.
    Weather context included in announcements. Repeats until door closes.
    Supports multiple doors via separate automation instances.
  domain: automation
  homeassistant:
    min_version: "2023.1.0"
  input:
    door_sensor:
      name: Garage Door Sensor
      description: Binary sensor for the garage door tilt sensor
      selector:
        entity:
          domain: binary_sensor
    door_name:
      name: Door Name
      description: >
        Name of this door used in notifications
        (e.g. Big Garage Door, Side Door, Shop Door)
      default: Garage Door
      selector:
        text:
    # PRIMARY PHONE
    # Replace notify.mobile_app_iphone_sd with your mobile app notify service name
    # Found in Developer Tools > Actions > search notify.mobile_app
    notification_target_1:
      name: Mobile Notification Target 1
      description: Primary mobile app notify target (e.g. notify.mobile_app_iphone_sd)
      default: notify.mobile_app_iphone_sd
      selector:
        text:
    # SECOND PHONE - OPTIONAL
    # To add a second phone:
    # 1. Uncomment notification_target_2 input below
    # 2. Uncomment the second phone action block in the action section
    # 3. Replace notify.mobile_app_second_phone with the actual notify service name
    # notification_target_2:
    #   name: Mobile Notification Target 2 (optional)
    #   description: Second mobile app notify target (e.g. notify.mobile_app_marys_iphone)
    #   default: notify.mobile_app_second_phone
    #   selector:
    #     text:
    alexa_targets:
      name: Alexa Media Player Targets
      description: List of media_player entities to announce on
      selector:
        entity:
          domain: media_player
          multiple: true
    weather_entity:
      name: Weather Entity
      description: Weather entity for rain and wind data
      selector:
        entity:
          domain: weather
    door_facing:
      name: Door Facing Direction
      description: Cardinal direction the garage door faces
      default: "N"
      selector:
        select:
          options:
            - "N"
            - "NE"
            - "E"
            - "SE"
            - "S"
            - "SW"
            - "W"
            - "NW"
    wind_buffer:
      name: Wind Direction Buffer (degrees)
      description: >
        Expands the adverse wind arc symmetrically beyond the base 180 degrees.
        0 = exactly 180 degree arc centered on door facing.
        90 = 360 degree arc (wind from any direction triggers alert).
      default: 0
      selector:
        number:
          min: 0
          max: 90
          unit_of_measurement: degrees
    wind_threshold:
      name: Wind Gust Threshold (mph)
      description: Wind gust speed above which weather delay applies
      default: 14
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: mph
    day_start:
      name: Daytime Start
      description: Start of daytime window
      default: "07:00:00"
      selector:
        time:
    day_end:
      name: Daytime End
      description: End of daytime window
      default: "21:00:00"
      selector:
        time:
    day_delay:
      name: Daytime Delay (minutes)
      description: Minutes before alerting during daytime with no weather event
      default: 60
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: minutes
    night_delay:
      name: Nighttime Delay (minutes)
      description: Minutes before alerting during nighttime with no weather event
      default: 10
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: minutes
    weather_delay:
      name: Weather Event Delay (minutes)
      description: Minutes before alerting when rain or wind detected
      default: 10
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: minutes
    repeat_interval:
      name: Repeat Interval (minutes)
      description: How often to repeat the alert while door remains open
      default: 5
      selector:
        number:
          min: 1
          max: 30
          unit_of_measurement: minutes

variables:
  door_sensor: !input door_sensor
  door_name: !input door_name
  weather_entity: !input weather_entity
  wind_threshold: !input wind_threshold
  wind_buffer: !input wind_buffer
  door_facing: !input door_facing
  day_start: !input day_start
  day_end: !input day_end
  day_delay: !input day_delay
  night_delay: !input night_delay
  weather_delay: !input weather_delay
  repeat_interval: !input repeat_interval
  door_bearing: >
    {% if door_facing == 'N' %} {{ 0 }}
    {% elif door_facing == 'NE' %} {{ 45 }}
    {% elif door_facing == 'E' %} {{ 90 }}
    {% elif door_facing == 'SE' %} {{ 135 }}
    {% elif door_facing == 'S' %} {{ 180 }}
    {% elif door_facing == 'SW' %} {{ 225 }}
    {% elif door_facing == 'W' %} {{ 270 }}
    {% elif door_facing == 'NW' %} {{ 315 }}
    {% else %} {{ 0 }}
    {% endif %}
  is_raining: >
    {{ states(weather_entity) in ['rainy', 'pouring'] }}
  adverse_wind: >
    {% set g = state_attr(weather_entity, 'wind_gust_speed') | float(0) %}
    {% set b = state_attr(weather_entity, 'wind_bearing') | float(0) %}
    {% set arc_min = (door_bearing | float - 90 - wind_buffer | float) % 360 %}
    {% set arc_max = (door_bearing | float + 90 + wind_buffer | float) % 360 %}
    {% if arc_min > arc_max %}
      {{ g > wind_threshold and (b >= arc_min or b <= arc_max) }}
    {% else %}
      {{ g > wind_threshold and (b >= arc_min and b <= arc_max) }}
    {% endif %}
  weather_event: >
    {{ is_raining or adverse_wind }}
  is_daytime: >
    {{ now().strftime('%H:%M:%S') >= day_start and now().strftime('%H:%M:%S') < day_end }}
  initial_delay: >
    {% if weather_event %}
      {{ weather_delay | int }}
    {% elif is_daytime %}
      {{ day_delay | int }}
    {% else %}
      {{ night_delay | int }}
    {% endif %}
  weather_context: >
    {% if is_raining and adverse_wind %}
      It is currently raining and there are adverse winds.
    {% elif is_raining %}
      It is currently raining.
    {% elif adverse_wind %}
      There are currently adverse winds.
    {% else %}
      {% endif %}

trigger:
  - platform: state
    entity_id: !input door_sensor
    from: "off"
    to: "on"

condition: []

action:
  - delay:
      minutes: "{{ initial_delay }}"
  - repeat:
      while:
        - condition: template
          value_template: "{{ is_state(door_sensor, 'on') }}"
      sequence:
        - parallel:
            # PRIMARY PHONE NOTIFICATION
            - action: notify.mobile_app_iphone_sd
              data:
                title: "{{ door_name }} Alert"
                message: >
                  {{ door_name }} has been open for
                  {{ ((repeat.index - 1) * repeat_interval) + initial_delay }} minutes.
                  {{ weather_context }}
                data:
                  push:
                    interruption-level: time-sensitive
            # SECOND PHONE NOTIFICATION - UNCOMMENT TO ENABLE
            # Step 1: Uncomment notification_target_2 input in the blueprint section above
            # Step 2: Replace notify.mobile_app_second_phone with actual notify service name
            # - action: notify.mobile_app_second_phone
            #   data:
            #     title: "{{ door_name }} Alert"
            #     message: >
            #       {{ door_name }} has been open for
            #       {{ (repeat.index * repeat_interval) + initial_delay }} minute(s).
            #       {{ weather_context }}
            #     data:
            #       push:
            #         interruption-level: time-sensitive
            - action: notify.alexa_media
              data:
                message: >
                  Attention: The {{ door_name }} has been open for
                  {{ ((repeat.index - 1) * repeat_interval) + initial_delay }} minutes.
                  {{ weather_context }}
                  Please close it.
                target: !input alexa_targets
                data:
                  type: announce
        - delay:
            minutes: "{{ repeat_interval }}"

mode: single
max_exceeded: silent