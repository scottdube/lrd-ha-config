# Pool health watcher — three-layer proactive detection
#
# Extended 2026-05-17 (evening) after a third OmniLogic incident in 24h
# revealed gaps in the initial single-layer design. Now covers all three
# failure modes per ADR-019:
#
#   Class 1: integration↔MSP wedge — entities go unavailable as a group,
#            no OmniLogic UI alarms. Triggered by network L1 disturbance
#            (cable swap, switch reboot) or autonomous controller wedge.
#   Class 2: MSP↔peripheral comm-loss — integration looks healthy,
#            commands ack, but local_filter_power stays at 0 W with
#            state=on. MSP_DEV_COMM_LOSS alarms in OmniLogic UI.
#   Class 3: physical / network — controller off the network entirely.
#            Both ICMP and integration fail. Causes: controller power
#            loss, breaker trip, RJ45 disconnect, Cat 6 cable fault,
#            switch port issue.
#
# Each class has its own dedicated detection automation with semantics
# specific to its symptom signature. Notification tags are distinct so
# iOS collapses them into separate threads — at-a-glance, you know
# which layer is broken.
#
# Detection summary:
#   - automation.pool_alert_on_pump_on_but_no_power  → class 2 (template
#     trigger on pump_state=on AND power<50W for 2m)
#   - automation.pool_alert_on_omnilogic_integration_wedge → class 1
#     (state trigger on pump entity unavailable for 10m)
#   - automation.pool_alert_on_omnilogic_controller_unreachable → class 3
#     (state trigger on ping binary_sensor off for 5m)
#
# Paired auditor assertion: P5 (pump_on_actually_drawing_power) in
# pool/scripts/auditor.py — same logic as class-2 watcher, retrospective,
# runs nightly on the daily slice.
#
# Implementation note (class-2 watcher only): uses a template-platform
# AUTOMATION TRIGGER rather than a standalone template binary_sensor.
# Two prior attempts in this same package both failed silently:
#   1. Modern `template: - binary_sensor:` block — dropped by HA's
#      package merge because configuration.yaml resolves `template:` via
#      `!include config/templates.yaml`; package's template: list never
#      merged with the include's resolved value. No log warning.
#   2. Legacy `binary_sensor: - platform: template` — file parsed,
#      no errors, but the entity never appeared in the state registry.
#      Consistent with the legacy template platform being deprecated /
#      restricted in HA 2026.x with a silent-fail compatibility shim.
# A template platform trigger inside the automation itself sidesteps
# both issues — it doesn't register a separate entity and doesn't touch
# the `template:` or `binary_sensor:` top-level keys.
#
# Implementation note (class-3 watcher): references the ping
# binary_sensor `binary_sensor.pool_controller_reachable`, which is set
# up via the HA UI (Settings → Devices & Services → Add Integration →
# Ping (ICMP), host 192.168.11.19, name "Pool Controller Reachable",
# count 3, scan_interval 30). The ping integration's YAML configuration
# was deprecated in HA 2023.12, and `binary_sensor: - platform: ping`
# now triggers an HA Repair notification asking for migration. The UI
# path stores the config entry in .storage/core.config_entries (not in
# git), so the entity definition is not version-controlled — but it's
# referenced from this version-controlled automation, and the UI setup
# is documented in integrations/omnilogic.md so the knowledge isn't
# lost if .storage ever needs to be rebuilt.
#
# Related ADRs:
#   - docs/decisions/019-omnilogic-recovery-playbook.md
#   - docs/decisions/016-integration-recovery-debounce.md (supplies
#     input_boolean.pool_integration_recovering, gates the class-2
#     watcher to suppress false positives during 5-min post-recovery)
#   - docs/decisions/011-pool-service-mode.md (supplies
#     input_boolean.pool_service_lockout, gates the class-2 watcher
#     during tech service work)
#
# Tuning notes (class-2 thresholds must stay aligned with auditor.py):
#   - 50 W power threshold matches PUMP_ON_POWER_MIN_W in auditor.py
#   - 2 min trigger `for:` duration matches PUMP_ON_NO_POWER_SKIP_SEC.
#   - 10 min unavailable threshold (class 1) absorbs HA restarts and
#     integration reloads without false-positive.
#   - 5 min ping-off threshold (class 3) catches sustained outages
#     while tolerating single missed ping cycles.
#
# 2026-05-22 addition: chemistry + equipment-health watchers (class-C).
# Added to close the absence-mode gap. With the pool_automation blueprint
# disabled during extended absence (per pre-departure plan), the pool
# runs on the OmniLogic MSP's local schedule for filtration and
# chlorination, and T&D Pool Construction handles weekly chemistry on
# their service visits. The watchers below provide between-visit
# alerting for chemistry drift and mechanical failures that can develop
# in days, not weeks.
#
# Entity inventory check 2026-05-22: this install does NOT have ORP or
# pH probes (Hayward optional add-ons not installed at LRD). Only the
# chlorinator's salt sensors are exposed. Watcher scope was reduced
# accordingly and rebuilt around Hayward's per-equipment alarm
# binary_sensors plus the local-integration flow detection. The
# integrations/omnilogic.md note about cloud exposing ORP/salt/pH was
# overstated and has been corrected.
#
# Detection summary (chemistry + equipment, separate from the three
# failure-class watchers above):
#   - automation.pool_alert_on_salt_out_of_band            → chlorinator
#                                                             can't produce
#                                                             OR corrosion
#                                                             risk
#   - automation.pool_alert_on_hayward_equipment_alarm     → any of the
#                                                             five Hayward
#                                                             per-device
#                                                             alarm binary
#                                                             sensors on for
#                                                             5+ min
#   - automation.pool_alert_on_flow_loss_with_pump_on      → pump on but
#                                                             no flow (dry
#                                                             run, blocked
#                                                             impeller,
#                                                             airlock)
#   - automation.pool_alert_on_cloud_salt_feed_stale       → cloud feed
#                                                             gone; suppress
#                                                             salt watcher
#                                                             noise and
#                                                             surface the
#                                                             feed-loss
#                                                             event itself
#
# Sensor source mix:
#   - Salt: djtimca/haomnilogic CLOUD integration. Entity:
#     `sensor.pool_pool_chlorinator_average_salt_level` (smoothed,
#     stable for sustained-threshold checks). Use
#     `sensor.pool_pool_chlorinator_instant_salt_level` for live spot
#     checks.
#   - Hayward equipment alarms: also cloud. Five entities in the form
#     `binary_sensor.pool_pool_<equipment>_alarm` (chlorinator,
#     filter_pump, heater_heater, light, waterfall). These are tuned by
#     Hayward — no thresholds for us to invent.
#   - Flow: LOCAL integration. Entity:
#     `binary_sensor.omnilogic_pool_pool_flow`. Note the unusual prefix
#     `omnilogic_pool_pool_` (vs the usual `omnilogic_pool_` for local
#     entities) — this is the local integration's representation of the
#     cloud-style `pool_pool_*` namespace for a specific sensor type.
#     If a future cryptk/haomnilogic-local release renames this, the
#     watcher goes silent until updated.
#
# Threshold rationale (saltwater pool chemistry, conservative for
# unattended operation):
#   - Salt 2500-3800 ppm: target typically 2700-3400 ppm for our cell.
#     Below 2500 the chlorinator can't produce; above 3800 risks
#     corrosion of metal hardware.
#   - 30-min `for:` duration on salt: absorbs cloud polling jitter +
#     brief chemistry transients during active chlorinator runs.
#   - 5-min `for:` duration on Hayward alarms: absorbs brief alarm
#     flickers during state transitions (e.g. chlorinator momentarily
#     alarms during pump startup).
#   - 5-min `for:` duration on flow-loss: matches expected flow-sensor
#     settling time after pump start.
#   - 60-min `for:` duration on cloud-feed-stale: well above normal
#     polling jitter, suppresses false positives on transient cloud
#     drops.
#
# Gating: all four watchers are gated by input_boolean.pool_service_lockout
# (ADR-011) so T&D's panel-toggle service mode silences them while
# they're on site. Not gated by pool_integration_recovering — that
# boolean is local-integration-specific, doesn't apply to cloud
# chemistry sensors or to Hayward's per-equipment alarms.

automation:
  - alias: "Pool: Alert on pump-on but no power"
    id: pool_alert_on_pump_on_but_no_power
    description: >
      Class 2 (MSP↔peripheral comm-loss) — fires when the integration
      reports the pump is running at a non-zero speed but power
      telemetry stays at 0 W (or below 50 W) for 2+ minutes. Sustained
      mismatch indicates an OmniLogic wedge — see ADR-019 for the
      three failure modes and the triage flow.
      Gated by input_boolean.pool_integration_recovering (ADR-016) so
      the 5-min post-recovery reconciliation window doesn't
      false-positive, and by input_boolean.pool_service_lockout
      (ADR-011) so the watcher stays quiet during tech service work.
    mode: single
    trigger:
      - platform: template
        value_template: >
          {% set pump = states('switch.omnilogic_pool_filter_pump') %}
          {% set power = states('sensor.omnilogic_pool_filter_pump_power') | float(none) %}
          {{ pump == 'on' and power is not none and power < 50 }}
        for: "00:02:00"
    condition:
      - condition: state
        entity_id: input_boolean.pool_integration_recovering
        state: "off"
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "off"
    action:
      - service: notify.scott_and_ha
        data:
          title: "Pool: pump-on / no-power mismatch (class 2)"
          message: >
            Pool filter pump reports ON at
            {{ states('number.omnilogic_pool_filter_pump_speed') }}%
            but power = {{ states('sensor.omnilogic_pool_filter_pump_power') }} W.
            Likely class-2 MSP↔peripheral comm-loss (ADR-019). Check
            OmniLogic UI alarms panel for MSP_DEV_COMM_LOSS; recovery is
            a controller power-cycle via the pool sub-panel breaker.
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_pump_no_power

  - alias: "Pool: Alert on OmniLogic integration wedge"
    id: pool_alert_on_omnilogic_integration_wedge
    description: >
      Class 1 (integration↔MSP wedge) — fires when
      switch.omnilogic_pool_filter_pump has been unavailable for 10+
      min. All OmniLogic Local entities share the integration's
      coordinator and go unavailable as a group, so the pump entity is
      a faithful proxy for the integration's overall state.
      10-min threshold absorbs HA restarts (entities flap briefly),
      integration reloads, and transient network blips without
      false-positive. Does NOT have a recovery-debounce gate — by
      definition this fires BEFORE any recovery, so the ADR-016
      pool_integration_recovering boolean isn't relevant.
      If the controller is also unreachable at the network layer, the
      class-3 watcher will fire too (separate notification tag).
      Trigger note (2026-05-18): originally used a state trigger with
      `to: "unavailable"`. Validated empirically against the 2026-05-17
      overnight outage that the state trigger did NOT fire across 10
      hours of unavailable state — HA's state trigger semantics around
      `to: "unavailable"` are not reliable. Switched to template trigger
      below, which re-evaluates on every state change and treats the
      `for:` duration as continuous truthy-result hold time.
    mode: single
    trigger:
      - platform: template
        value_template: "{{ states('switch.omnilogic_pool_filter_pump') == 'unavailable' }}"
        for: "00:10:00"
    action:
      - service: notify.scott_and_ha
        data:
          title: "Pool: OmniLogic integration wedge (class 1)"
          message: >
            switch.omnilogic_pool_filter_pump has been unavailable for
            10+ min. Triage per ADR-019: check if controller is
            pingable. If pingable, UDP listener is wedged — breaker
            cycle. If not pingable, see the controller-unreachable
            alert (likely already fired) and triage physical/network.
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_integration_wedge

  - alias: "Pool: Alert on controller network degrading"
    id: pool_alert_on_controller_network_degrading
    description: >
      Class 3a (early warning) — fires when ping packet loss to the
      OmniLogic controller stays elevated (>10%) for 5+ min. Catches
      degrading cable/network conditions BEFORE the binary_sensor
      goes off (which requires sustained 100% loss). Complementary
      to pool_alert_on_omnilogic_controller_unreachable.
      Entity ID note: HA's ping integration names diagnostic sensors
      after the host IP (`sensor.192_168_11_19_packet_loss`) rather
      than the device name. Ugly but functional. If the controller IP
      ever changes (DHCP reassignment, network reorg), this entity ID
      will be regenerated and this watcher will silently stop firing
      until the entity_id is updated to match. DHCP reservation is in
      place per integrations/omnilogic.md, so IP should be stable.
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.192_168_11_19_packet_loss
        above: 10
        for: "00:05:00"
    action:
      - service: notify.scott_and_ha
        data:
          title: "Pool: controller network degrading"
          message: >
            Ping packet loss to the OmniLogic controller is
            {{ states('sensor.192_168_11_19_packet_loss') }}% over the
            last 5+ min. Cable or network is degrading — investigate
            before it goes fully unreachable. Re-crimp may have failed,
            or in-wall cable damage may be developing.
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_controller_degrading

  - alias: "Pool: Alert on OmniLogic controller unreachable"
    id: pool_alert_on_omnilogic_controller_unreachable
    description: >
      Class 3 (physical/network) — fires when
      binary_sensor.pool_controller_reachable (UI-configured ping at
      192.168.11.19, see header for setup) has been off for 5+ min.
      Catches controller power loss, breaker trips, Cat 6 disconnects,
      switch port failures.
      5-min threshold is short enough to surface real outages quickly
      while tolerating single missed ping cycles. When this fires, the
      class-1 wedge alert will also fire ~5 min later (because the
      integration will time out and entities will go unavailable);
      seeing both together is the canonical class-3 signature.
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.pool_controller_reachable
        to: "off"
        for: "00:05:00"
    action:
      - service: notify.scott_and_ha
        data:
          title: "Pool: OmniLogic controller unreachable (class 3)"
          message: >
            binary_sensor.pool_controller_reachable has been off for
            5+ min — controller is off the network. Physical triage
            (ADR-019): check OmniLogic display (lit vs dark), pool
            sub-panel breaker, RJ45 at controller end (reseated
            2026-05-17 evening after the in-wall pass — recurrence
            indicates re-crimp needed, not just reseat).
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_controller_unreachable

  # ===================================================================
  # Chemistry + equipment-health watchers (class-C).
  # Added 2026-05-22 to close the absence-mode gap. See header for
  # rationale.
  #
  # Entity inventory check 2026-05-22 revealed this install does NOT
  # have ORP or pH probes — only the chlorinator's salt sensors are
  # exposed via cloud (`sensor.pool_pool_chlorinator_*_salt_level`).
  # ORP and pH are optional OmniLogic Pro add-ons not installed at LRD.
  # Watchers scoped accordingly:
  #   - Salt-based chemistry monitoring (the one we have)
  #   - Per-equipment Hayward alarm sensors (already-tuned by Hayward —
  #     no thresholds for us to invent, just OR-of-five binary_sensors)
  #   - Flow loss detection (mechanical failure catcher — pump claims
  #     on but `binary_sensor.omnilogic_pool_pool_flow` is off)
  # ===================================================================

  - alias: "Pool: Alert on salt out of band"
    id: pool_alert_on_salt_out_of_band
    description: >
      Chemistry — salt level outside chlorinator's operating window.
      Target band 2700-3400 ppm typical for saltwater pools; thresholds
      set to 2500 (low) and 3800 (high) to give margin against polling
      noise. Uses the chlorinator's AVERAGE (smoothed) salt reading
      rather than instant — average is what the chlorinator itself uses
      to regulate behavior, and it's the more stable signal for a
      30-min sustained-threshold check.
      Below 2500 ppm: chlorinator cannot produce hypochlorite
      efficiently — pool sanitation degrades regardless of chlorinator
      percent setpoint. Add salt.
      Above 3800 ppm: corrosion risk on metal hardware (heater heat
      exchanger, ladder, lights, deck-level metalwork). Partial drain +
      refill needed.
      Gated by pool_service_lockout (ADR-011). Single automation with
      two trigger thresholds; message branches on which fired.
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.pool_pool_chlorinator_average_salt_level
        below: 2500
        for: "00:30:00"
        id: salt_low
      - platform: numeric_state
        entity_id: sensor.pool_pool_chlorinator_average_salt_level
        above: 3800
        for: "00:30:00"
        id: salt_high
    condition:
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "off"
    action:
      - service: notify.scott_and_ha
        data:
          title: >
            Pool: salt {{ 'LOW' if trigger.id == 'salt_low' else 'HIGH' }}
            ({{ states('sensor.pool_pool_chlorinator_average_salt_level') }} ppm)
          message: >
            {% if trigger.id == 'salt_low' %}
            Salt level has been below 2500 ppm for 30+ min — chlorinator
            cannot produce. Instant reading:
            {{ states('sensor.pool_pool_chlorinator_instant_salt_level') }} ppm.
            Add salt; target 2700-3400 ppm.
            {% else %}
            Salt level has been above 3800 ppm for 30+ min — corrosion
            risk on metal hardware. Instant reading:
            {{ states('sensor.pool_pool_chlorinator_instant_salt_level') }} ppm.
            Partial drain and refill to bring back into 2700-3400 target.
            {% endif %}
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_chem_salt_oob

  - alias: "Pool: Alert on Hayward equipment alarm"
    id: pool_alert_on_hayward_equipment_alarm
    description: >
      Hayward-side equipment alarm — fires when any of the five per-
      equipment alarm binary sensors transitions to `on` and stays on
      for 5+ min. These alarms are surfaced by the OmniLogic controller
      itself when it detects equipment-specific faults (chlorinator
      no-flow, pump overcurrent, heater fault, light circuit issue,
      waterfall actuator stall, etc.). The 5-min threshold absorbs
      brief alarm flickers during state transitions (e.g. chlorinator
      momentarily alarms during pump startup).
      No threshold to invent — Hayward has already tuned these per
      device. Our job is to surface them quickly.
      Single automation watching all five sensors via OR-of-states.
      Message identifies which equipment.
      Gated by pool_service_lockout (ADR-011) — T&D may intentionally
      trip an alarm during diagnostic work.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.pool_pool_chlorinator_alarm
          - binary_sensor.pool_pool_filter_pump_alarm
          - binary_sensor.pool_pool_heater_heater_alarm
          - binary_sensor.pool_pool_light_alarm
          - binary_sensor.pool_pool_waterfall_alarm
        to: "on"
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "off"
    action:
      - service: notify.scott_and_ha
        data:
          title: >
            Pool: Hayward equipment alarm —
            {{ trigger.entity_id.split('.')[1]
              | replace('pool_pool_', '')
              | replace('_alarm', '')
              | replace('_', ' ')
              | title }}
          message: >
            {{ trigger.entity_id }} has been ON for 5+ min. Check the
            OmniLogic UI alarms panel for the specific alarm code and
            recommended action. Common causes by equipment: chlorinator
            (no flow / cell fault), filter_pump (overcurrent / dry
            run), heater (no flow / low refrigerant), light (circuit
            fault), waterfall (actuator stall).
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_hayward_alarm

  - alias: "Pool: Alert on flow loss with pump on"
    id: pool_alert_on_flow_loss_with_pump_on
    description: >
      Mechanical/plumbing — fires when the filter pump is reporting
      ON but `binary_sensor.omnilogic_pool_pool_flow` shows no flow
      for 5+ min. Catches: clogged impeller, closed valve in the suction
      line, dropped water level below skimmer intake, broken impeller,
      airlock. Distinct from class-2 MSP↔peripheral comm-loss because
      class 2 surfaces "pump reports on but power=0" — this one is
      "pump reports on AND drawing power AND no flow downstream."
      No power check in the trigger because a dry-running pump still
      draws power; the diagnostic signal is absence of water movement.
      Flow binary_sensor is from the LOCAL integration (note the
      `omnilogic_pool_pool_flow` naming — the integration's prefix on
      cloud-style entities). Verify periodically that this entity stays
      available; if the local integration changes naming, this watcher
      goes silent.
      Gated by pool_service_lockout (ADR-011).
    mode: single
    trigger:
      - platform: template
        value_template: >
          {% set pump = states('switch.omnilogic_pool_filter_pump') %}
          {% set flow = states('binary_sensor.omnilogic_pool_pool_flow') %}
          {{ pump == 'on' and flow == 'off' }}
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "off"
    action:
      - service: notify.scott_and_ha
        data:
          title: "Pool: pump on but no flow"
          message: >
            Filter pump reports ON but flow sensor is OFF for 5+ min.
            Mechanical failure suspected: clogged impeller, closed
            suction valve, low water level below skimmer, broken
            impeller, airlock, or flow-sensor failure. Pump running
            without flow = damage to seals and impeller. Investigate
            urgently.
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_flow_loss

  # ===================================================================
  # Class-3c watcher — MSP IP drift.
  # Added 2026-05-22 (evening) after the class-3c outage validated that
  # UDM Pro UniFi OS auto-update can cascade-reboot the controller stack
  # and reset switch port profiles to Trusted-LRD default. MSP then
  # DHCPs onto the wrong subnet (.0.x) and the OmniLogic Local
  # integration loses its API path. See ADR-019 addendum.
  # This watcher is the early-warning signal that catches IP drift
  # BEFORE the integration wedges out — gives 2-7 min head start over
  # the class-1 / class-3 watchers above.
  # ===================================================================

  - alias: "Pool: Alert on MSP IP drift"
    id: pool_alert_on_msp_ip_drift
    description: >
      Class 3c (network-layer drift) — fires when the OmniLogic MSP's
      UniFi-tracked IP moves away from its expected 192.168.11.19.
      Early-warning signal that catches port-VLAN drift or DHCP
      reassignment BEFORE the OmniLogic Local integration wedges out.
      Source: device_tracker.unifi_default_00_23_62_04_f4_d9 — the
      UniFi Network integration's tracker for the MSP's hardwired MAC
      00:23:62:04:f4:d9. The `ip` attribute reflects the IP UniFi sees
      the device using, independent of any HA-side ping or integration
      polling. If the UniFi integration is ever reconfigured to stop
      tracking this MAC, this watcher silently goes blind.
      Trigger pair:
        - `drift` fires when the IP is set, not equal to .11.19, and
          not in the transient unavailable/unknown/empty states, held
          for 2+ min. The 2-min `for:` suppresses DHCP renewal flicker
          (the brief window between lease release and reacquisition)
          without meaningfully delaying real drift events.
        - `restored` fires immediately on return to .11.19. Reuses the
          same iOS `tag:` so the push thread updates in place rather
          than stacking a second notification.
      `mode: restart` so a recovery cleanly supersedes any in-flight
      drift action.
      NOT gated by pool_integration_recovering — IP drift is a
      network-layer signal independent of integration recovery state.
      Gated by pool_service_lockout (ADR-011) so deliberate network
      moves during service work don't false-positive.
    mode: restart
    trigger:
      - platform: template
        value_template: >
          {% set ip = state_attr('device_tracker.unifi_default_00_23_62_04_f4_d9', 'ip') %}
          {{ ip is not none and ip not in ['192.168.11.19', 'unavailable', 'unknown', ''] }}
        for: "00:02:00"
        id: drift
      - platform: template
        value_template: >
          {% set ip = state_attr('device_tracker.unifi_default_00_23_62_04_f4_d9', 'ip') %}
          {{ ip == '192.168.11.19' }}
        id: restored
    condition:
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: drift
            sequence:
              - service: notify.scott_and_ha
                data:
                  title: "Pool: MSP on wrong IP (class 3c)"
                  message: >
                    OmniLogic MSP is at
                    {{ state_attr('device_tracker.unifi_default_00_23_62_04_f4_d9', 'ip') }}
                    (expected 192.168.11.19). UniFi-side IP drift —
                    likely port-VLAN revert (ADR-019 class-3c) or DHCP
                    reassignment. Local API will be unreachable until
                    MSP returns to .11.19. Check UniFi port 12 native
                    VLAN (should be IoT(4)) and clear stale dnsmasq
                    lease on UDM if needed.
                  data:
                    push:
                      interruption-level: time-sensitive
                    tag: pool_msp_ip_drift
          - conditions:
              - condition: trigger
                id: restored
            sequence:
              - service: notify.scott_and_ha
                data:
                  title: "Pool: MSP back on .11.19"
                  message: >
                    MSP IP restored to 192.168.11.19. OmniLogic Local
                    integration should recover within ~5 min once the
                    coordinator next polls.
                  data:
                    push:
                      interruption-level: active
                    tag: pool_msp_ip_drift

  - alias: "Pool: Alert on cloud salt feed stale"
    id: pool_alert_on_cloud_salt_feed_stale
    description: >
      Cloud feed health — fires when the salt sensor has been
      unavailable for 60+ min. This is the meta-watcher for the salt
      out-of-band automation above: if the cloud feed is down, salt
      threshold checks aren't meaningful and we want to know about the
      FEED outage rather than miss the upstream signal entirely.
      Possible causes: Nabu Casa cloud lost, Hayward cloud outage,
      cloud integration coordinator wedge, controller lost its outbound
      cloud channel (independent of the local-network classes above —
      controller's cloud path goes WAN-out, not via the IoT VLAN UDP
      path that classes 1-3 cover).
      60-min threshold absorbs normal cloud polling jitter without
      firing on transient drops.
      Gated by pool_service_lockout (ADR-011).
    mode: single
    trigger:
      - platform: template
        value_template: >
          {{ states('sensor.pool_pool_chlorinator_average_salt_level')
             in ['unavailable', 'unknown'] }}
        for: "01:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "off"
    action:
      - service: notify.scott_and_ha
        data:
          title: "Pool: cloud salt feed stale"
          message: >
            Cloud chlorinator salt sensor has been unavailable for 60+
            min — chemistry watcher is blind. Possible causes: Nabu
            Casa cloud lost, Hayward cloud outage, cloud integration
            coordinator wedge. Investigate cloud integration status
            (Settings → Devices & Services → OmniLogic Cloud). Local
            integration may still be healthy — this is independent.
          data:
            push:
              interruption-level: time-sensitive
            tag: pool_chem_feed_stale
