# Pool modes — service lockout + vacation mode
#
# Helpers, detection automations, and notifications for the pool blueprint's
# pause/modify gates. Lives in a package (not automations.yaml) so HA UI's
# YAML re-normalization on save doesn't fight git.
#
# Related ADRs:
#  - docs/decisions/011-pool-service-mode.md
#  - docs/decisions/012-vacation-mode.md

# ---------- Helpers ----------

input_boolean:
  pool_service_lockout:
    name: Pool Service Lockout
    icon: mdi:tools
    # Engaged automatically when the tech toggles pump off via the Hayward
    # panel (no HA context). Cleared when she toggles pump back on, OR
    # manually via mobile notify, OR auto-clear at midnight.
    # See blueprints/automation/LRD/pool_automation/pool_automation.yaml
    # service_active variable.
  vacation:
    name: Vacation Mode
    icon: mdi:airplane
    # Cross-cutting: any automation can check this. Pool blueprint uses it
    # to switch from swim-day logic to filter-only logic.
  pool_swim_day_today:
    name: Pool Swim Day Today
    icon: mdi:pool
    # ADR-017: locked-in swim_day decision for today, set at 05:55 daily
    # by automation.pool_lock_swim_day_at_morning. Blueprint reads from
    # this boolean instead of recomputing forecast_high >= min_swim_temp
    # each poll. Mid-day forecast updates can still flip the underlying
    # sensor.pool_swimming_day, but this boolean stays put for the day.
    # Worst case: HA restart spans 05:55, missed lock → boolean retains
    # yesterday's value and pool runs on yesterday's decision until
    # tomorrow's lock fires. One mismatched day, no equipment damage.
  pool_integration_recovering:
    name: Pool Integration Recovering
    icon: mdi:timer-sand
    # ADR-016: gates the service-lockout detection automations during the
    # 5-minute window after the OmniLogic Local integration recovers from
    # an unavailable state (HA restart, network blip, controller restart).
    # During recovery, the controller's autonomous state reconciliation can
    # produce equipment state changes (pump off/on, waterfall close/open,
    # heater off/on) that look like tech-initiated panel toggles to HA's
    # logbook but aren't. Without this gate, those phantom changes engage
    # service lockout, fire false-positive mobile pushes, and pause the
    # blueprint until the next external transition clears the lockout.
    # Set ON automatically by automation.pool_integration_recovery_debounce
    # when the pump entity transitions out of 'unavailable'. Auto-clears
    # 5 minutes later. See ADR-016.

# ---------- Service lockout: detection automations ----------

automation:
  - alias: "Pool: Detect External Pump-Off (engage service lockout)"
    id: pool_detect_external_pump_off
    description: >
      Pool tech (or anyone) toggles pump off via Hayward panel — change
      arrives via the integration coordinator with no HA context. Set
      lockout, notify Scott. Per ADR-011.
      HOTFIX 2026-05-02 (within ADR-011): added last_triggered window
      check. The OmniLogic Local integration's coordinator updates state
      AFTER the blueprint's action, with its own coordinator context (no
      parent_id from the original action). Without this check, every
      blueprint-initiated pump on/off triggers a false-positive lockout.
      The last_triggered check suppresses detection if the Pool Automation
      blueprint fired within the last 30 seconds — that's the window where
      coordinator updates legitimately propagate from blueprint actions.
      NOTE: entity_id is `automation.pool_automation_v1_7_0` because HA
      sticks entity IDs to the alias-at-creation-time (originally
      v1.7.0). Alias is now v1.10.0 but entity_id never updated. If
      automation is ever deleted and recreated, this reference needs an
      update to match the new entity_id.
    trigger:
      - platform: state
        entity_id: switch.omnilogic_pool_filter_pump
        from: "on"
        to: "off"
    condition:
      - condition: template
        value_template: >
          {{ trigger.to_state.context.user_id is none
             and trigger.to_state.context.parent_id is none }}
      - condition: template
        value_template: >
          {% set last = state_attr('automation.pool_automation_v1_7_0', 'last_triggered') %}
          {% set elapsed = (now() - last).total_seconds() if last else 999 %}
          {{ elapsed > 30 }}
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "off"
      # ADR-016: integration-recovery debounce. Suppresses detection during
      # the 5-min window after the OmniLogic Local integration recovers from
      # unavailable, when controller-side state reconciliation can produce
      # phantom transitions that look like panel-toggle events.
      - condition: state
        entity_id: input_boolean.pool_integration_recovering
        state: "off"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.pool_service_lockout
      - action: notify.scott_and_ha
        data:
          title: Pool Service Lockout Engaged
          message: >
            Pump turned off externally (likely tech at panel). Pool blueprint
            paused for service. Will auto-resume when pump turns back on, OR
            tap action to resume manually, OR auto-clears at midnight.
          data:
            push:
              interruption-level: time-sensitive
            actions:
              - action: pool_resume_now
                title: Resume Pool Automation Now
    mode: single

  - alias: "Pool: Detect External Pump-On (clear service lockout)"
    id: pool_detect_external_pump_on
    description: >
      Pool tech finishes work, toggles pump back on via Hayward panel.
      Symmetric to the off detection — clear the lockout, notify. Per ADR-011.
      HOTFIX 2026-05-02: same last_triggered window check as the off
      detection, for the same reason.
    trigger:
      - platform: state
        entity_id: switch.omnilogic_pool_filter_pump
        from: "off"
        to: "on"
    condition:
      - condition: template
        value_template: >
          {{ trigger.to_state.context.user_id is none
             and trigger.to_state.context.parent_id is none }}
      - condition: template
        value_template: >
          {% set last = state_attr('automation.pool_automation_v1_7_0', 'last_triggered') %}
          {% set elapsed = (now() - last).total_seconds() if last else 999 %}
          {{ elapsed > 30 }}
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "on"
      # ADR-016: same integration-recovery debounce as the off-detection.
      # Without this, controller-side pump-on during recovery would clear a
      # legitimate prior lockout (or its absence is fine but symmetric is
      # safer — both detections gate on the same window).
      - condition: state
        entity_id: input_boolean.pool_integration_recovering
        state: "off"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.pool_service_lockout
      - action: notify.scott_and_ha
        data:
          title: Pool Service Lockout Cleared
          message: >
            Pump turned back on externally — service appears complete. Pool
            blueprint resumed.
    mode: single

  - alias: "Pool: Mobile Notification Action - Resume"
    id: pool_mobile_resume_action
    description: >
      Listens for the "Resume Pool Automation Now" button tap on the lockout
      notification. Manual override path.
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: pool_resume_now
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.pool_service_lockout
      - action: notify.scott_and_ha
        data:
          title: Pool Lockout Cleared (Manual)
          message: Pool blueprint resumed via mobile notification action.
    mode: single

  - alias: "Pool: Lock swim_day decision at 05:55"
    id: pool_lock_swim_day_at_morning
    description: >
      ADR-017: capture today's swim_day decision into
      input_boolean.pool_swim_day_today before any blueprint activity.
      Blueprint reads from this boolean instead of re-evaluating
      forecast_high vs min_swim_temp every poll.

      Reason: on 2026-05-03 the WeatherFlow forecast updated at 19:00
      from 81°F to 77°F; live swim_day flipped Yes→No; blueprint's
      NOT-A-SWIM-DAY branch fired at 19:10 and shut down the pool 50
      min before normal end-of-window. Forecasts wiggle; pools shouldn't.

      05:55 chosen to land before any morning blueprint activity. Pool
      Automation polls every 10 min on /10 boundaries, so 06:00 is the
      next potential evaluation after this lock fires.
    trigger:
      - platform: time
        at: "05:55:00"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.pool_swimming_day
                state: "Yes"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.pool_swim_day_today
        default:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.pool_swim_day_today
      - action: notify.scott_and_ha
        data:
          title: Pool Swim Day Locked
          message: >
            {{ 'Today IS a swim day' if is_state('sensor.pool_swimming_day', 'Yes')
               else 'Today is NOT a swim day' }} (forecast high
            {{ states('sensor.pool_forecast_high') }}°F vs min 78°F).
    mode: single

  - alias: "Pool: Auto-Clear Service Lockout at Midnight"
    id: pool_lockout_midnight_autoclear
    description: >
      Safety backstop. If the lockout was set during the day and never
      explicitly cleared (tech forgot to toggle pump back on, mobile push
      was dismissed without tap), clear at midnight so pool isn't disabled
      indefinitely. Per ADR-011.
    trigger:
      - platform: time
        at: "00:01:00"
    condition:
      - condition: state
        entity_id: input_boolean.pool_service_lockout
        state: "on"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.pool_service_lockout
      - action: notify.scott_and_ha
        data:
          title: Pool Service Lockout Auto-Cleared
          message: >
            Lockout was still set at midnight — auto-cleared as safety
            backstop. Pool blueprint resumed. If service work was actually
            ongoing, re-engage manually.
    mode: single

  - alias: "Pool: Integration Recovery Debounce"
    id: pool_integration_recovery_debounce
    description: >
      ADR-016: when the OmniLogic Local integration recovers from an
      unavailable state (HA restart, network blip, controller restart),
      the controller's autonomous state reconciliation can briefly cycle
      pump/heater/waterfall in ways that look like external panel toggles
      to the lockout detection automations. This automation sets
      input_boolean.pool_integration_recovering ON for 5 minutes after
      every recovery, gating the detection automations during that window.

      Trigger: pump entity transitions OUT of 'unavailable' (any new
      state). Watching the pump entity is sufficient — all OmniLogic Local
      entities go unavailable together (they share the integration's
      coordinator), so the pump's recovery is a faithful proxy for the
      integration's overall recovery.

      mode: restart so a flapping integration (recover, drop, recover
      again within 5 min) keeps the gate held until things stabilize.

      5 min based on the 2026-05-02 incident: controller cycled pump
      off at 10:26:45 (within seconds of recovery) then back on at
      10:30:11 (3m26s after recovery). 5 min comfortably brackets
      both transitions with margin.
    trigger:
      - platform: state
        entity_id: switch.omnilogic_pool_filter_pump
        from: "unavailable"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.pool_integration_recovering
      - delay: "00:05:00"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.pool_integration_recovering
    mode: restart
