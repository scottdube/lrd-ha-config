# Living room Fire TV photo-frame slideshow (simplified design)
#
# Original design (see ADR-018 original section) tracked launcher-idle
# state and auto-relaunched FKB after 10 min idle outside a 2 h
# post-exit cooldown. In practice, "Fire TV sitting on the launcher
# for 10 min" is a thin edge case -- the device is usually either
# foreground-app-busy or off. The relaunch path solved a problem
# that didn't really happen, and the launcher-idle trigger is fragile
# against Amazon's screensaver/rotation behavior anyway.
#
# Simplified to script-as-primitive + two thin time triggers:
#
#   script.photo_frame_start  Reusable action sequence: power on
#                             Fire TV, wait 10 s, ADB-launch FKB.
#                             Callable from automations, scripts,
#                             dashboards, Alexa routines (via HA
#                             Cloud), or any HA service call.
#
#   09:00 daily               Morning wake automation calls
#                             script.photo_frame_start -- starts the
#                             slideshow if no one's around to do it
#                             manually.
#
#   23:00 daily               Evening shutdown powers the Fire TV
#                             off ONLY if FKB is still foreground.
#                             If a show is playing past 23:00, the
#                             condition fails and HA does nothing.
#
# Entry points for ad-hoc starts:
#   - Dashboard button on HA Companion -> script.photo_frame_start
#   - Alexa (Echo device, NOT the Fire TV remote's mic):
#       expose script.photo_frame_start with friendly name "Photo
#       Frame", then "Alexa, turn on photo frame"
#   - The Fire TV remote's mic button is unreliable here -- Alexa on
#     Fire TV is content-search-biased and routes "open Fully Kiosk"
#     to Prime Video catalog search instead of the installed app.
#
# Entity references:
#   media_player.fire_tv_192_168_11_82
#     ADB-over-TCP Fire TV (Android Debug Bridge integration), IoT
#     VLAN at 192.168.11.82
#
# Slideshow source: http://192.168.50.10:8000/slideshow
#   Mac Mini at LRD on the LRD-Servers VLAN, port 8000. UDM Pro
#   firewall rule allows IoT VLAN -> 192.168.50.10:8000.
#
# Related projects / sources of truth:
#   scottdube/photo-frame    canonical YAML at
#                            ha/photo-frame-automations.yaml.
#                            *Drifted* from this file -- this file
#                            represents the simplified design; the
#                            upstream still has the original 4-automation
#                            + helper structure. Reconcile when ready.
#   scottdube/network-docs   firewall rule (IoT -> 192.168.50.10:8000)
#
# Notes worth knowing later:
#   - YAML uses the older `service:` keyword (still accepted by HA);
#     other packages in this repo use the newer `action:` form.
#     Preserved here to match the canonical source style.
#   - `androidtv.adb_command` is the current documented action on the
#     Android Debug Bridge integration (HA docs 2026.3.x). Known
#     quirk (GitHub home-assistant/core #125579): the service can
#     vanish if the integration's only device is unreachable at HA
#     start. Fire TVs typically stay on the network when off so this
#     shouldn't bite, but watch for it on the first 09:00 cold-start.
#   - The FKB launch component
#     `de.ozerov.fully/de.ozerov.fully.MainActivity` is standard per
#     Fully Kiosk community docs. If `am start` errors after deploy:
#       adb shell dumpsys package de.ozerov.fully | grep -A1 -E "Activity|filter"

script:
  photo_frame_start:
    alias: "Photo Frame: Start slideshow"
    description: >
      Power on the living room Fire TV (if off) and launch Fully Kiosk
      Browser to display the slideshow. Reusable from automations,
      dashboards, Alexa routines, or any HA service call.
    sequence:
      - service: media_player.turn_on
        target:
          entity_id: media_player.fire_tv_192_168_11_82
      - delay: "00:00:10"
      - service: androidtv.adb_command
        target:
          entity_id: media_player.fire_tv_192_168_11_82
        data:
          command: "am start -n de.ozerov.fully/de.ozerov.fully.MainActivity"

automation:
  - id: photo_frame_morning_wake
    alias: "Photo Frame - morning wake and start slideshow"
    trigger:
      - platform: time
        at: "09:00:00"
    action:
      - service: script.photo_frame_start

  - id: photo_frame_end_of_day_shutdown
    alias: "Photo Frame - end of day shutdown"
    trigger:
      - platform: time
        at: "23:00:00"
    condition:
      - condition: state
        entity_id: media_player.fire_tv_192_168_11_82
        attribute: current_app
        state: "de.ozerov.fully"
    action:
      - service: media_player.turn_off
        target:
          entity_id: media_player.fire_tv_192_168_11_82
