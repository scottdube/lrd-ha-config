# Photo-frame slideshow package (multi-TV)
#
# Two display clients, same FKB-renders-slideshow pattern:
#
#   media_player.fire_tv_192_168_11_82      Living room Fire TV
#                                           Production. Scheduled
#                                           morning wake + evening
#                                           shutdown. Dashboard
#                                           button on LRD-Test.
#
#   media_player.android_tv_192_168_11_108  Bedroom Hisense Google TV
#                                           Dev/test surface. No
#                                           schedule wired. Dashboard
#                                           button only -- used when
#                                           the living room TV is in
#                                           active use and Scott wants
#                                           to verify slideshow.html
#                                           changes on a second
#                                           platform (Chrome on Google
#                                           TV vs Silk on Fire TV).
#
# Original design (see ADR-018 original section) tracked launcher-idle
# state and auto-relaunched FKB after 10 min idle outside a 2 h
# post-exit cooldown. In practice, "Fire TV sitting on the launcher
# for 10 min" is a thin edge case -- the device is usually either
# foreground-app-busy or off. The relaunch path solved a problem
# that didn't really happen, and the launcher-idle trigger is fragile
# against Amazon's screensaver/rotation behavior anyway.
#
# Simplified to script-as-primitive + two thin time triggers (living
# room only); bedroom mirrors the start script but no time triggers:
#
#   script.photo_frame_start          Reusable action sequence:
#                                     power on living room Fire TV,
#                                     wait 10 s, ADB-launch FKB.
#                                     Callable from automations,
#                                     scripts, dashboards, Alexa
#                                     routines (via HA Cloud), or
#                                     any HA service call.
#
#   script.photo_frame_start_bedroom  Same action chain targeting
#                                     bedroom Google TV. Same FKB
#                                     activity name (verified working
#                                     on both Fire TV and Google TV).
#                                     Manual invocation only.
#
#   09:00 daily                       Morning wake automation calls
#                                     script.photo_frame_start (living
#                                     room) -- starts the slideshow if
#                                     no one's around to do it
#                                     manually. No bedroom equivalent.
#
#   23:00 daily                       Evening shutdown powers the
#                                     living room Fire TV off ONLY if
#                                     FKB is still foreground. If a
#                                     show is playing past 23:00, the
#                                     condition fails and HA does
#                                     nothing. No bedroom equivalent.
#
# If bedroom is ever promoted to a production slideshow surface,
# adding parallel morning_wake + end_of_day_shutdown automations is a
# 5-minute copy with the entity ID swapped. Don't preemptively add
# the schedule.
#
# Entry points for ad-hoc starts:
#   - Dashboard button on HA Companion -> the appropriate start script
#   - Alexa (Echo device, NOT the Fire TV remote's mic):
#       expose the start script(s) with friendly name "Photo Frame
#       [Room]", then "Alexa, turn on photo frame [room]"
#   - The Fire TV remote's mic button is unreliable here -- Alexa on
#     Fire TV is content-search-biased and routes "open Fully Kiosk"
#     to Prime Video catalog search instead of the installed app.
#
# Slideshow source: http://192.168.50.10:8000/slideshow
#   Mac Mini at LRD on the LRD-Servers VLAN, port 8000. UDM Pro
#   firewall rule allows IoT VLAN -> 192.168.50.10:8000.
#
# Related projects / sources of truth:
#   scottdube/photo-frame    canonical YAML at
#                            ha/photo-frame-automations.yaml.
#                            Bedroom script added there alongside
#                            this addition (per 2026-05-16 hand-off);
#                            the original 4-automation + helper
#                            structure upstream remains drifted vs
#                            this file's simplified design.
#   scottdube/network-docs   firewall rule (IoT -> 192.168.50.10:8000)
#
# Notes worth knowing later:
#   - YAML uses the older `service:` keyword (still accepted by HA);
#     other packages in this repo use the newer `action:` form.
#     Preserved here to match the canonical source style.
#   - `androidtv.adb_command` is the current documented action on the
#     Android Debug Bridge integration (HA docs 2026.3.x). Known
#     quirk (GitHub home-assistant/core #125579): the service can
#     vanish if the integration's only device is unreachable at HA
#     start. With two devices on the integration the all-unreachable
#     failure surface is slightly smaller than with one. Watch for it
#     on the first 09:00 cold-start after a HA restart.
#   - The FKB launch component
#     `de.ozerov.fully/de.ozerov.fully.MainActivity` is standard per
#     Fully Kiosk community docs and confirmed working on both Fire
#     TV (Silk) and Hisense Google TV (Chrome) installs. If `am start`
#     errors after deploy:
#       adb shell dumpsys package de.ozerov.fully | grep -A1 -E "Activity|filter"
#   - Generalize the start script when a 3rd TV is added. Refactor
#     `photo_frame_start` into a script that takes a target
#     parameter (HA scripts support `fields`). Living room +
#     bedroom can stay duplicated for two TVs -- the lift isn't
#     worth it yet.

script:
  photo_frame_start:
    alias: "Photo Frame: Living Room"
    description: >
      Powers on the living room Fire TV (no-op if already on), waits
      for it to settle, then launches Fully Kiosk Browser via ADB.
      Production photo-frame surface: called by the 09:00 morning
      wake automation, the 23:00 foreground-gated shutdown's
      counterpart, and the LRD-Test dashboard button.
    sequence:
      - service: media_player.turn_on
        target:
          entity_id: media_player.fire_tv_192_168_11_82
      - delay: "00:00:10"
      - service: androidtv.adb_command
        target:
          entity_id: media_player.fire_tv_192_168_11_82
        data:
          command: "am start -n de.ozerov.fully/de.ozerov.fully.MainActivity"

  photo_frame_start_bedroom:
    alias: "Photo Frame: Bedroom"
    description: >
      Powers on the bedroom Hisense Google TV (no-op if already on),
      waits for it to settle, then launches Fully Kiosk Browser via
      ADB. Used as a dev/test surface when the living room TV is in
      active use; no scheduled automation wired to this script
      (manual dashboard button only).
    sequence:
      - service: media_player.turn_on
        target:
          entity_id: media_player.android_tv_192_168_11_108
      - delay: "00:00:10"
      - service: androidtv.adb_command
        target:
          entity_id: media_player.android_tv_192_168_11_108
        data:
          command: "am start -n de.ozerov.fully/de.ozerov.fully.MainActivity"

automation:
  - id: photo_frame_morning_wake
    alias: "Photo Frame - morning wake and start slideshow"
    trigger:
      - platform: time
        at: "09:00:00"
    action:
      - service: script.photo_frame_start

  - id: photo_frame_end_of_day_shutdown
    alias: "Photo Frame - end of day shutdown"
    trigger:
      - platform: time
        at: "23:00:00"
    condition:
      - condition: state
        entity_id: media_player.fire_tv_192_168_11_82
        attribute: current_app
        state: "de.ozerov.fully"
    action:
      - service: media_player.turn_off
        target:
          entity_id: media_player.fire_tv_192_168_11_82
