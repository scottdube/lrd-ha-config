# Energy Detail dashboard view (reference YAML, matches the Detail tab of the
# 'Energy +' storage-mode dashboard installed via WS API on 2026-05-18).
#
# This file is NOT auto-loaded. It mirrors what HA serves at /energy-plus/detail
# so the configuration is visible in git review. If the storage-mode dashboard
# is rebuilt from scratch, paste this into the raw config editor and re-add the
# second view via `strategy: type: energy` for the Energy tab.
#
# Live dashboard: Settings → Dashboards → Energy + → Detail (default view)
#                 + a secondary 'Energy' tab using HA's built-in energy strategy.

title: Energy +
views:
  - title: Detail
    icon: mdi:chart-line
    path: detail
    cards:
      - type: horizontal-stack
        cards:
          - type: gauge
            name: Whole Home
            entity: sensor.whole_home_power
            unit: W
            min: 0
            max: 20000
            severity: { green: 0, yellow: 8000, red: 14000 }
          - type: gauge
            name: HVAC
            entity: sensor.hvac_power
            unit: W
            min: 0
            max: 12000
            severity: { green: 0, yellow: 6000, red: 9000 }
          - type: gauge
            name: Pool Subpanel
            entity: sensor.pool_subpanel_power
            unit: W
            min: 0
            max: 5000
            severity: { green: 0, yellow: 2000, red: 4000 }

      # Air 1 / Air 2 are SYSTEM totals (condenser + handler combined) via the
      # Carrier-Infinity-style template sensors in config/templates.yaml. They
      # were silently reading 0 until 2026-05-18 — the templates referenced
      # emporiavue_panel_… (no underscore) instead of emporia_vue_panel_…
      - type: glance
        title: Major loads (live W) — Air 1/2 are condenser + handler combined
        columns: 4
        entities:
          - entity: sensor.air_1_total_power
            name: Air 1
          - entity: sensor.air_2_total_power
            name: Air 2
          - entity: sensor.emporia_vue_panel_a_circuit_10_garage_mini_split_power
            name: Garage MS
          - entity: sensor.emporia_vue_panel_a_circuit_3_water_heater_power
            name: Water Htr
          - entity: sensor.emporia_vue_panel_a_circuit_14_network_rack_power
            name: Network
          - entity: sensor.hot_water_recirc_pump_power
            name: Recirc
          - entity: sensor.emporia_vue_panel_a_circuit_2_refrigerator_power
            name: Fridge
          - entity: sensor.always_on_power
            name: Always On

      - type: entities
        title: Today so far (kWh)
        entities:
          - entity: sensor.whole_home_daily_energy
            name: Whole home
          - entity: sensor.hvac_daily_energy
            name: HVAC (all 3 systems)
          - entity: sensor.air_1_total_daily_energy
            name: "  └ Air 1 (Wh)"
          - entity: sensor.air_2_total_daily_energy
            name: "  └ Air 2 (Wh)"
          - entity: sensor.emporia_vue_panel_a_circuit_10_garage_mini_split_daily_energy
            name: "  └ Garage MS (Wh)"
          - entity: sensor.pool_subpanel_daily_energy_kwh
            name: Pool subpanel
          - entity: sensor.always_on_daily_energy
            name: Always-on
          - entity: sensor.emporia_vue_panel_a_circuit_3_water_heater_daily_energy
            name: Water heater (Wh)
          - entity: sensor.emporia_vue_panel_b_circuit_1_dryer_daily_energy
            name: Dryer (Wh)

      - type: statistics-graph
        title: Daily total — whole home (last 14 days)
        chart_type: bar
        period: day
        days_to_show: 14
        stat_types: [change]
        entities:
          - sensor.emporia_vue_panel_a_total_daily_energy
          - sensor.emporia_vue_panel_b_total_daily_energy

      - type: statistics-graph
        title: HVAC daily by system (last 14 days)
        chart_type: bar
        period: day
        days_to_show: 14
        stat_types: [change]
        entities:
          - sensor.air_1_total_daily_energy
          - sensor.air_2_total_daily_energy
          - sensor.emporia_vue_panel_a_circuit_10_garage_mini_split_daily_energy

      - type: statistics-graph
        title: Pool subpanel daily (last 14 days)
        chart_type: bar
        period: day
        days_to_show: 14
        stat_types: [change]
        entities:
          - sensor.emporia_vue_panel_a_circuit_1_pool_subpanel_daily_energy

      - type: statistics-graph
        title: Baseload trend (03:30 nightly samples — populates after first 03:30)
        chart_type: line
        period: day
        days_to_show: 30
        stat_types: [mean]
        entities:
          - sensor.whole_home_baseload
          - sensor.always_on_baseload

      - type: entities
        title: Calibration — unmonitored & voltages
        entities:
          - entity: sensor.emporia_vue_panel_a_unmonitored_power
            name: Panel A unmonitored (W)
          - entity: sensor.emporia_vue_panel_b_unmonitored_power
            name: Panel B unmonitored (W)
          - entity: sensor.emporia_vue_panel_a_unmonitored_daily_energy
            name: Panel A unmonitored today (Wh)
          - entity: sensor.emporia_vue_panel_b_unmonitored_daily_energy
            name: Panel B unmonitored today (Wh)
          - entity: sensor.emporia_vue_panel_a_l1_voltage
            name: A L1 voltage
          - entity: sensor.emporia_vue_panel_a_l2_voltage
            name: A L2 voltage
          - entity: sensor.emporia_vue_panel_b_l1_voltage
            name: B L1 voltage
          - entity: sensor.emporia_vue_panel_b_l2_voltage
            name: B L2 voltage

      - type: entities
        title: Cross-validation sources
        entities:
          - entity: sensor.emporia_vue_panel_a_circuit_1_pool_subpanel_power
            name: Vue pool subpanel (truth)
          - entity: sensor.omnilogic_pool_filter_pump_power
            name: OmniLogic filter pump
          - entity: sensor.air_1_total_power
            name: Air 1 system (Vue-derived)
          - entity: sensor.air_2_total_power
            name: Air 2 system (Vue-derived)
          - entity: sensor.living_room_cooling_energy_yesterday_2
            name: Carrier zone — Living Rm cooling yesterday
          - entity: sensor.master_br_cooling_energy_yesterday
            name: Carrier zone — Master BR cooling yesterday
          - entity: sensor.master_suite_cooling_energy_yesterday
            name: Carrier zone — Master Suite cooling yesterday
          - entity: sensor.emporia_vue_panel_a_circuit_10_garage_mini_split_power
            name: Vue garage MS (truth)
          - entity: sensor.garage_ms_power_realtime
            name: Midea — reads 0, accepted limit

  - title: Energy
    icon: mdi:lightning-bolt
    strategy:
      type: energy
