substitutions:
  device_name: pool-water-temp-external
  friendly_name: "Pool Water Temp External"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Floating pool water temp sensor per ADR-015. Deep sleep diagnostic config — verbose logging to find where script blocks."
  on_boot:
    priority: -100
    then:
      - logger.log:
          level: WARN
          format: "BOOT_DIAG: on_boot priority -100 fired"
      - script.execute: take_reading_and_sleep
      - logger.log:
          level: WARN
          format: "BOOT_DIAG: on_boot completed (script.execute returned)"

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret legacy_iot_ssid
  password: !secret legacy_iot_password
  power_save_mode: NONE
  fast_connect: false
  ap:
    ssid: "Pool Float Fallback"
    password: !secret fallback_password

deep_sleep:
  id: deep_sleep_main
  run_duration: 90s
  sleep_duration: 1min

script:
  - id: take_reading_and_sleep
    then:
      - logger.log:
          level: WARN
          format: "SCRIPT_DIAG: started"
      - component.update: pool_temp_voltage
      - delay: 500ms
      - logger.log:
          level: WARN
          format: "SCRIPT_DIAG: ADC sampled, waiting for api.connected"
      - wait_until:
          condition:
            api.connected:
          timeout: 25s
      - logger.log:
          level: WARN
          format: "SCRIPT_DIAG: api.connected wait done (connected or timed out)"
      - delay: 2s
      - logger.log:
          level: WARN
          format: "SCRIPT_DIAG: about to call deep_sleep.enter"
      - deep_sleep.enter:
          id: deep_sleep_main
      - logger.log:
          level: WARN
          format: "SCRIPT_DIAG: deep_sleep.enter returned (should NEVER print if sleep worked)"

sensor:
  - platform: adc
    pin: GPIO0
    id: pool_temp_voltage
    attenuation: 12db
    update_interval: 60s
    samples: 16

  - platform: resistance
    sensor: pool_temp_voltage
    configuration: DOWNSTREAM
    resistor: 47kOhm
    id: pool_temp_resistance

  - platform: ntc
    sensor: pool_temp_resistance
    calibration:
      - 153kOhm -> 0.0°C
      - 52.6kOhm -> 23.17°C
      - 22.8kOhm -> 43.06°C
    name: "Pool Water Temp External"
    id: pool_temp_external
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    filters:
      - lambda: return x * 9.0 / 5.0 + 32.0;

  - platform: wifi_signal
    name: "Pool Float WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Pool Float Uptime"
    update_interval: 60s
    entity_category: diagnostic
