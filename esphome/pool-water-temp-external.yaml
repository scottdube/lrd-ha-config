substitutions:
  device_name: pool-water-temp-external
  friendly_name: "Pool Water Temp External"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Pool float v2 (ADR-025): regulator bypassed (BAT+ direct to 3V3), NTC on GPIO1, battery voltage on GPIO0 onboard divider, external U.FL antenna via powered RF switch. OTA via input_boolean.pool_float_ota_mode."
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            gpio_reset_pin((gpio_num_t)3);
            gpio_set_direction((gpio_num_t)3, GPIO_MODE_OUTPUT);
            gpio_set_level((gpio_num_t)3, 0);
            gpio_reset_pin((gpio_num_t)14);
            gpio_set_direction((gpio_num_t)14, GPIO_MODE_OUTPUT);
            gpio_set_level((gpio_num_t)14, 1);
    - priority: 200
      then:
        - lambda: |-
            // ADR-032 Phase 1 wake bookkeeping. g_clean_sleep is set true only
            // just before deep_sleep.enter; if it's still false here, the
            // previous wake never reached a planned sleep (brownout / crash /
            // external reset) -> count it as UNCLEAN. esp_reset_reason() is
            // captured as a corroborating signal (it can misreport brownout).
            if (!id(g_clean_sleep)) {
              id(g_unclean_count) += 1;
            }
            id(g_clean_sleep) = false;
            id(g_boot_count) += 1;
            id(g_last_reset_reason) = (int) esp_reset_reason();
    - priority: -100
      then:
        - script.execute: take_reading_and_sleep

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_PM_ENABLE: y
      CONFIG_PM_DFS_INIT_AUTO: y
      CONFIG_FREERTOS_USE_TICKLESS_IDLE: y
      CONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP: "3"
      CONFIG_PM_SLP_IRAM_OPT: y
      CONFIG_PM_RTOS_IDLE_OPT: y

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
    - ssid: !secret legacy_iot_ssid
      password: !secret legacy_iot_password
      bssid: 66:D6:1F:AE:47:69
  power_save_mode: NONE
  fast_connect: true
  output_power: 20.0
  manual_ip:
    static_ip: 192.168.11.111
    gateway: 192.168.11.1
    subnet: 255.255.255.0
    dns1: 192.168.11.1
  ap:
    ssid: "Pool Float Fallback"
    password: !secret fallback_password

# safe_mode default boot_is_good_after of 60s silently blocks deep_sleep on
# every wake (both script-triggered deep_sleep.enter and run_duration).
# 5s allows the ~6s wake-publish-sleep cycle to actually enter sleep.
# num_attempts=100 effectively disables boot-loop detection.
safe_mode:
  boot_is_good_after: 5s
  num_attempts: 100

deep_sleep:
  id: deep_sleep_main
  run_duration: 40s
  sleep_duration: 30min

# ADR-032 Phase 1 wake-outcome ledger. restore_value globals persist across
# deep sleep via NVS (flash; survive power loss too), coalesced by
# flash_write_interval and flushed on deep_sleep.enter. Counters accumulate
# since the last successful publish and are zeroed on the next good connect, so
# every successful row carries "what happened since I last reported."
globals:
  - id: g_clean_sleep
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: g_boot_count
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_connect_fail_count
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_wifi_noassoc_count
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_unclean_count
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_last_reset_reason
    type: int
    restore_value: yes
    initial_value: '0'

binary_sensor:
  - platform: homeassistant
    id: ota_mode_flag
    entity_id: input_boolean.pool_float_ota_mode
    on_release:
      then:
        - logger.log: "OTA mode flag cleared - resuming sleep cycle"
        - deep_sleep.allow: deep_sleep_main
        # Mark a clean planned sleep here too (ADR-032) — without this, sleeping
        # out of OTA mode reads as an unclean reset on the next boot.
        - lambda: 'id(g_clean_sleep) = true;'
        - deep_sleep.enter:
            id: deep_sleep_main

sensor:
  - platform: adc
    pin: GPIO1
    id: pool_temp_voltage
    attenuation: 12db
    update_interval: never
    samples: 16

  - platform: adc
    pin: GPIO0
    id: pool_float_battery_voltage_raw
    name: "Pool Float Battery Voltage"
    attenuation: 12db
    update_interval: never
    samples: 16
    accuracy_decimals: 2
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    filters:
      - calibrate_linear:
          method: least_squares
          datapoints:
            - 0.379 -> 3.000
            - 0.530 -> 3.600

  - platform: resistance
    sensor: pool_temp_voltage
    configuration: DOWNSTREAM
    resistor: 47kOhm
    id: pool_temp_resistance

  - platform: ntc
    sensor: pool_temp_resistance
    calibration:
      - 153kOhm -> 0.0°C
      - 52.6kOhm -> 23.17°C
      - 22.8kOhm -> 43.06°C
    name: "Pool Water Temp External"
    id: pool_temp_external
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    filters:
      - lambda: return x * 9.0 / 5.0 + 32.0;
      - median:
          window_size: 3
          send_every: 3

  - platform: wifi_signal
    name: "Pool Float WiFi Signal"
    id: pool_float_wifi
    update_interval: never
    entity_category: diagnostic

  - platform: uptime
    name: "Pool Float Uptime"
    id: pool_float_uptime
    update_interval: never
    entity_category: diagnostic

  # ADR-032 wake-outcome ledger (published only on a connected wake).
  - platform: template
    name: "Pool Float Boot Count"
    id: pool_float_boot_count
    lambda: 'return id(g_boot_count);'
    update_interval: never
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic

  - platform: template
    name: "Pool Float Connect ms"
    id: pool_float_connect_ms
    lambda: 'return (float) millis();'
    update_interval: never
    accuracy_decimals: 0
    unit_of_measurement: "ms"
    state_class: measurement
    entity_category: diagnostic

  - platform: template
    name: "Pool Float Fails Since Last"
    id: pool_float_fails_since_last
    lambda: 'return id(g_connect_fail_count);'
    update_interval: never
    accuracy_decimals: 0
    state_class: measurement
    entity_category: diagnostic

  - platform: template
    name: "Pool Float WiFi NoAssoc Since Last"
    id: pool_float_wifi_noassoc_since_last
    lambda: 'return id(g_wifi_noassoc_count);'
    update_interval: never
    accuracy_decimals: 0
    state_class: measurement
    entity_category: diagnostic

  - platform: template
    name: "Pool Float Unclean Since Last"
    id: pool_float_unclean_since_last
    lambda: 'return id(g_unclean_count);'
    update_interval: never
    accuracy_decimals: 0
    state_class: measurement
    entity_category: diagnostic

text_sensor:
  - platform: template
    name: "Pool Float Wake Diag"
    id: pool_float_wake_diag
    update_interval: never
    entity_category: diagnostic
    lambda: |-
      char buf[96];
      snprintf(buf, sizeof(buf),
               "ok boot=%d fails=%d noassoc=%d unclean=%d connms=%lu reset=%d",
               (int) id(g_boot_count), (int) id(g_connect_fail_count),
               (int) id(g_wifi_noassoc_count), (int) id(g_unclean_count),
               (unsigned long) millis(), (int) id(g_last_reset_reason));
      return std::string(buf);

script:
  - id: take_reading_and_sleep
    then:
      - component.update: pool_temp_voltage
      - delay: 250ms
      - component.update: pool_temp_voltage
      - delay: 250ms
      - component.update: pool_temp_voltage
      - delay: 250ms
      - component.update: pool_float_battery_voltage_raw
      - wait_until:
          condition:
            api.connected:
          timeout: 35s
      - if:
          condition:
            api.connected:
          then:
            # Connected: publish the reading + the wake-outcome ledger, THEN
            # zero the since-last-success counters (ADR-032 Phase 1).
            - component.update: pool_float_uptime
            - component.update: pool_float_wifi
            - component.update: pool_float_boot_count
            - component.update: pool_float_connect_ms
            - component.update: pool_float_fails_since_last
            - component.update: pool_float_wifi_noassoc_since_last
            - component.update: pool_float_unclean_since_last
            - component.update: pool_float_wake_diag
            - lambda: |-
                id(g_connect_fail_count) = 0;
                id(g_wifi_noassoc_count) = 0;
                id(g_unclean_count) = 0;
          else:
            # Connect budget blown: classify and buffer across sleep (no link,
            # so it ships on the next successful wake). wifi up => API_TIMEOUT;
            # wifi down => WIFI_NO_ASSOC.
            - lambda: 'id(g_connect_fail_count) += 1;'
            - if:
                condition:
                  not:
                    - wifi.connected:
                then:
                  - lambda: 'id(g_wifi_noassoc_count) += 1;'
      - wait_until:
          condition:
            lambda: 'return id(ota_mode_flag).has_state();'
          timeout: 5s
      - if:
          condition:
            binary_sensor.is_on: ota_mode_flag
          then:
            - logger.log: "OTA mode active - sleep prevented"
            - deep_sleep.prevent: deep_sleep_main
          else:
            # Mark a clean planned sleep so the next boot doesn't read this wake
            # as an unclean reset. Preferences flush on deep_sleep.enter.
            - lambda: 'id(g_clean_sleep) = true;'
            - deep_sleep.enter:
                id: deep_sleep_main