substitutions:
  device_name: pool-water-temp-external
  friendly_name: "Pool Water Temp External"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Floating pool water temp sensor per ADR-015. Production: 30-min cadence, ~6s wake. OTA mode via input_boolean.pool_float_ota_mode for maintenance pushes. safe_mode boot_is_good_after fix is critical for deep_sleep on subsequent wakes."
  on_boot:
    priority: -100
    then:
      - script.execute: take_reading_and_sleep

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret legacy_iot_ssid
  password: !secret legacy_iot_password
  power_save_mode: NONE
  fast_connect: false
  ap:
    ssid: "Pool Float Fallback"
    password: !secret fallback_password

# safe_mode default boot_is_good_after of 60s silently blocks deep_sleep on
# every wake (both script-triggered deep_sleep.enter and run_duration).
# 5s allows the ~6s wake-publish-sleep cycle to actually enter sleep.
# num_attempts=100 effectively disables boot-loop detection.
safe_mode:
  boot_is_good_after: 5s
  num_attempts: 100

deep_sleep:
  id: deep_sleep_main
  run_duration: 30s
  sleep_duration: 30min

binary_sensor:
  - platform: homeassistant
    id: ota_mode_flag
    entity_id: input_boolean.pool_float_ota_mode

sensor:
  - platform: adc
    pin: GPIO0
    id: pool_temp_voltage
    attenuation: 12db
    update_interval: never
    samples: 16

  - platform: resistance
    sensor: pool_temp_voltage
    configuration: DOWNSTREAM
    resistor: 47kOhm
    id: pool_temp_resistance

  - platform: ntc
    sensor: pool_temp_resistance
    calibration:
      - 153kOhm -> 0.0°C
      - 52.6kOhm -> 23.17°C
      - 22.8kOhm -> 43.06°C
    name: "Pool Water Temp External"
    id: pool_temp_external
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    filters:
      - lambda: return x * 9.0 / 5.0 + 32.0;

  - platform: wifi_signal
    name: "Pool Float WiFi Signal"
    id: pool_float_wifi
    update_interval: never
    entity_category: diagnostic

  - platform: uptime
    name: "Pool Float Uptime"
    id: pool_float_uptime
    update_interval: never
    entity_category: diagnostic

script:
  - id: take_reading_and_sleep
    then:
      - component.update: pool_temp_voltage
      - component.update: pool_float_uptime
      - component.update: pool_float_wifi
      - delay: 500ms
      - wait_until:
          condition:
            api.connected:
          timeout: 25s
      - delay: 2s
      - if:
          condition:
            binary_sensor.is_on: ota_mode_flag
          then:
            - logger.log: "OTA mode active - sleep prevented"
            - deep_sleep.prevent: deep_sleep_main
          else:
            - deep_sleep.enter:
                id: deep_sleep_main
