esphome:
  name: voice-garage
  friendly_name: "Voice Garage"

# LED Status Colors
# WiFi connecting:      Orange 100% Slow Pulse
# Idle/Ready:           Green 50%   Solid
# Client disconnected:  Orange 100% Slow Pulse
# Wake word detected:   Cyan 100%   Pulse
# Back to idle:         Green 50%   Solid
# Error:                Red 100%    Solid

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.11.229

api:

ota:
  - platform: esphome

logger:

i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO5
    i2s_bclk_pin: GPIO4

  - id: i2s_out
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO9

microphone:
  - platform: i2s_audio
    id: garage_mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO2
    adc_type: external
    pdm: false
    channel: left

speaker:
  - platform: i2s_audio
    id: garage_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO8
    dac_type: external
    buffer_duration: 500ms
    timeout: 500ms

voice_assistant:
  id: va
  microphone: garage_mic
  speaker: garage_speaker
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 1.0
  use_wake_word: true
  on_client_connected:
    - voice_assistant.start_continuous:
    - light.turn_on:
        id: voice_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 50%
  on_client_disconnected:
    - voice_assistant.stop:
    - light.turn_on:
        id: voice_led
        red: 100%
        green: 50%
        blue: 0%
        brightness: 100%
        effect: "Slow Pulse"
  on_wake_word_detected:
    - light.turn_on:
        id: voice_led
        red: 0%
        green: 100%
        blue: 100%
        brightness: 100%
        effect: "Pulse"
  on_tts_end:
    - light.turn_on:
        id: voice_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 50%
        effect: none
  on_error:
    - light.turn_on:
        id: voice_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 100%
    - logger.log: "VA Error"

light:
  - platform: esp32_rmt_led_strip
    id: voice_led
    pin: GPIO48
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    name: "Garage VA LED"
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1500ms
          update_interval: 1500ms
      - pulse:
          name: "Pulse"
          transition_length: 500ms
          update_interval: 500ms