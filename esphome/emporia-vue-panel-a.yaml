# Emporia Vue 3 — Panel A
#
# First-flash YAML: mains + slot 1 (Pool Subpanel, 240V) + slot 14 (Irrigation/Network Rack, 120V).
# Two slots cover the ×2 240V math + the no-multiply 120V path. Remaining 14 slots added via OTA
# after first-boot validation, using the post-remap allocation in
# energy/docs/install-checklist-panel-a.md.
#
# Hardware: Emporia Vue Gen 3 (Unit #2), ESP32-D0WD-V3, 8 MB flash.
# Mounted in Panel A rotated 180° from Panel B (antenna on LEFT side of device,
# silkscreen "1" on FAR RIGHT end of top edge).
#
# Stock firmware code-region reference: Unit #1 backup
# (emporia_vue3_unit1_9454C56E6E38_stock_backup_*.bin,
# MD5 dc3ef5c186b5338f261bb1bfeefb85f0). Per-device backup for Unit #2 skipped
# 2026-05-12 per discussion — only NVS differs between units.
#
# Upstream reference: https://emporia-vue-local.github.io/docs/tutorial/configuration/
# Vue 3 specifics from Discussion #367.

esphome:
  name: emporiavue-panel-a
  friendly_name: Emporia Vue Panel A

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

external_components:
  - source: github://emporia-vue-local/esphome@dev
    components:
      - emporia_vue

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  logs:
    sensor: INFO

preferences:
  flash_write_interval: "48h"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "EmporiaVuePanelA Fallback"
    password: !secret fallback_password
  on_connect:
    - light.turn_on: wifi_led
  on_disconnect:
    - light.turn_off: wifi_led

captive_portal:

time:
  - platform: homeassistant

switch:
  - platform: restart
    name: Restart

light:
  - platform: status_led
    id: wifi_led
    pin:
      number: 2
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: status_led
    id: ethernet_led
    pin: 4
    restore_mode: ALWAYS_OFF

i2c:
  sda:
    number: 5
    ignore_strapping_warning: true
  scl: 18
  scan: false
  frequency: 400kHz
  timeout: 1ms
  id: i2c_a

.filters:
  - &throttle_avg
    throttle_average: 5s
  - &throttle_time
    throttle: 60s
  - &neg
    lambda: 'return max(-x, 0.0f);'
  - &pos
    lambda: 'return max(x, 0.0f);'
  - &abs
    lambda: 'return abs(x);'

sensor:
  - platform: emporia_vue
    variant: vue3
    i2c_id: i2c_a
    phases:
      - id: phase_a
        input: BLACK
        calibration: 0.01925
        voltage:
          name: "L1 Voltage"
          filters: [*throttle_avg, *pos]
        frequency:
          name: "L1 Frequency"
          filters: [*throttle_avg, *pos]
      - id: phase_b
        input: RED
        calibration: 0.01925
        voltage:
          name: "L2 Voltage"
          filters: [*throttle_avg, *pos]
        phase_angle:
          name: "L2 Phase Angle"
          filters: [*throttle_avg, *pos]

    ct_clamps:
      - phase_id: phase_a
        input: "A"
        power:
          id: phase_a_power
          device_class: power
          filters: [*pos]
      - phase_id: phase_b
        input: "B"
        power:
          id: phase_b_power
          device_class: power
          filters: [*pos]
      - { phase_id: phase_a, input:  "1", power: { id:  cir1_pool_subpanel,   device_class: power, filters: [ *neg, multiply: 2 ] } }
      - { phase_id: phase_b, input:  "2", power: { id:  cir2_refrigerator,    device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_a, input:  "3", power: { id:  cir3_water_heater,    device_class: power, filters: [ *neg, multiply: 2 ] } }
      - { phase_id: phase_a, input:  "4", power: { id:  cir4_kitchen_sink,    device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_a, input:  "5", power: { id:  cir5_air2_handler,    device_class: power, filters: [ *neg, multiply: 2 ] } }
      - { phase_id: phase_a, input:  "6", power: { id:  cir6_summer_kitchen1, device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_b, input:  "7", power: { id:  cir7_garage_side,     device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_a, input:  "8", power: { id:  cir8_guest_pool_bath, device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_b, input:  "9", power: { id:  cir9_air1_condenser,  device_class: power, filters: [ *neg, multiply: 2 ] } }
      - { phase_id: phase_b, input: "10", power: { id: cir10_mini_split,      device_class: power, filters: [ *neg, multiply: 2 ] } }
      - { phase_id: phase_a, input: "11", power: { id: cir11_microwave,       device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_b, input: "12", power: { id: cir12_wall_oven,       device_class: power, filters: [ *neg, multiply: 2 ] } }
      - { phase_id: phase_b, input: "13", power: { id: cir13_kitchen_stove,   device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_b, input: "14", power: { id: cir14_network_rack,    device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_a, input: "15", power: { id: cir15_guest_room_3,    device_class: power, filters: [ *neg ] } }
      - { phase_id: phase_b, input: "16", power: { id: cir16_guest_room_2,    device_class: power, filters: [ *neg ] } }

    on_update:
      then:
        - component.update: total_power
        - component.update: balance_power

  - { platform: copy, name: "L1 Power",          source_id: phase_a_power, filters: *throttle_avg }
  - { platform: copy, name: "L2 Power",          source_id: phase_b_power, filters: *throttle_avg }
  - { platform: copy, name: "Total Power",       source_id: total_power,   filters: *throttle_avg }
  - { platform: copy, name: "Unmonitored Power", source_id: balance_power, filters: *throttle_avg }

  - { platform: copy, name:  "Circuit 1 Pool Subpanel Power",          source_id:  cir1_pool_subpanel,   filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 2 Refrigerator Power",           source_id:  cir2_refrigerator,    filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 3 Water Heater Power",           source_id:  cir3_water_heater,    filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 4 Kitchen Sink Power",           source_id:  cir4_kitchen_sink,    filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 5 Air 2 Handler Power",          source_id:  cir5_air2_handler,    filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 6 Summer Kitchen 1 Power",       source_id:  cir6_summer_kitchen1, filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 7 Garage Side Power",            source_id:  cir7_garage_side,     filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 8 Guest Pool Bath Power",        source_id:  cir8_guest_pool_bath, filters: *throttle_avg }
  - { platform: copy, name:  "Circuit 9 Air 1 Condenser Power",        source_id:  cir9_air1_condenser,  filters: *throttle_avg }
  - { platform: copy, name: "Circuit 10 Garage Mini Split Power",      source_id: cir10_mini_split,      filters: *throttle_avg }
  - { platform: copy, name: "Circuit 11 Microwave Power",              source_id: cir11_microwave,       filters: *throttle_avg }
  - { platform: copy, name: "Circuit 12 Wall Oven Power",              source_id: cir12_wall_oven,       filters: *throttle_avg }
  - { platform: copy, name: "Circuit 13 Kitchen Stove Power",          source_id: cir13_kitchen_stove,   filters: *throttle_avg }
  - { platform: copy, name: "Circuit 14 Network Rack Power",           source_id: cir14_network_rack,    filters: *throttle_avg }
  - { platform: copy, name: "Circuit 15 Guest Room 3 Power",           source_id: cir15_guest_room_3,    filters: *throttle_avg }
  - { platform: copy, name: "Circuit 16 Guest Room 2 Power",           source_id: cir16_guest_room_2,    filters: *throttle_avg }

  - platform: template
    lambda: return id(phase_a_power).state + id(phase_b_power).state;
    update_interval: never
    id: total_power
    device_class: power
    state_class: measurement
    unit_of_measurement: "W"

  - platform: template
    lambda: !lambda |-
      return max(0.0f, id(total_power).state -
        id( cir1_pool_subpanel).state -
        id( cir2_refrigerator).state -
        id( cir3_water_heater).state -
        id( cir4_kitchen_sink).state -
        id( cir5_air2_handler).state -
        id( cir6_summer_kitchen1).state -
        id( cir7_garage_side).state -
        id( cir8_guest_pool_bath).state -
        id( cir9_air1_condenser).state -
        id(cir10_mini_split).state -
        id(cir11_microwave).state -
        id(cir12_wall_oven).state -
        id(cir13_kitchen_stove).state -
        id(cir14_network_rack).state -
        id(cir15_guest_room_3).state -
        id(cir16_guest_room_2).state);
    update_interval: never
    id: balance_power
    device_class: power
    state_class: measurement
    unit_of_measurement: "W"

  - platform: total_daily_energy
    name: "Total Daily Energy"
    power_id: total_power
    accuracy_decimals: 0
    restore: false
    filters: *throttle_time

  - platform: total_daily_energy
    name: "Unmonitored Daily Energy"
    power_id: balance_power
    accuracy_decimals: 0
    restore: false
    filters: *throttle_time

  - { power_id:  cir1_pool_subpanel,   platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 1 Pool Subpanel Daily Energy",     filters: *throttle_time }
  - { power_id:  cir2_refrigerator,    platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 2 Refrigerator Daily Energy",      filters: *throttle_time }
  - { power_id:  cir3_water_heater,    platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 3 Water Heater Daily Energy",      filters: *throttle_time }
  - { power_id:  cir4_kitchen_sink,    platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 4 Kitchen Sink Daily Energy",      filters: *throttle_time }
  - { power_id:  cir5_air2_handler,    platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 5 Air 2 Handler Daily Energy",     filters: *throttle_time }
  - { power_id:  cir6_summer_kitchen1, platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 6 Summer Kitchen 1 Daily Energy",  filters: *throttle_time }
  - { power_id:  cir7_garage_side,     platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 7 Garage Side Daily Energy",       filters: *throttle_time }
  - { power_id:  cir8_guest_pool_bath, platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 8 Guest Pool Bath Daily Energy",   filters: *throttle_time }
  - { power_id:  cir9_air1_condenser,  platform: total_daily_energy, accuracy_decimals: 0, restore: false, name:  "Circuit 9 Air 1 Condenser Daily Energy",   filters: *throttle_time }
  - { power_id: cir10_mini_split,      platform: total_daily_energy, accuracy_decimals: 0, restore: false, name: "Circuit 10 Garage Mini Split Daily Energy", filters: *throttle_time }
  - { power_id: cir11_microwave,       platform: total_daily_energy, accuracy_decimals: 0, restore: false, name: "Circuit 11 Microwave Daily Energy",         filters: *throttle_time }
  - { power_id: cir12_wall_oven,       platform: total_daily_energy, accuracy_decimals: 0, restore: false, name: "Circuit 12 Wall Oven Daily Energy",         filters: *throttle_time }
  - { power_id: cir13_kitchen_stove,   platform: total_daily_energy, accuracy_decimals: 0, restore: false, name: "Circuit 13 Kitchen Stove Daily Energy",     filters: *throttle_time }
  - { power_id: cir14_network_rack,    platform: total_daily_energy, accuracy_decimals: 0, restore: false, name: "Circuit 14 Network Rack Daily Energy",      filters: *throttle_time }
  - { power_id: cir15_guest_room_3,    platform: total_daily_energy, accuracy_decimals: 0, restore: false, name: "Circuit 15 Guest Room 3 Daily Energy",      filters: *throttle_time }
  - { power_id: cir16_guest_room_2,    platform: total_daily_energy, accuracy_decimals: 0, restore: false, name: "Circuit 16 Guest Room 2 Daily Energy",      filters: *throttle_time }
