- id: '1775590492419'
  alias: OmniLogic API Watchdog
  description: Notify when Hayward OmniLogic API becomes unavailable
  triggers:
  - trigger: state
    entity_id: switch.pool_pool_filter_pump
    to: unavailable
    for:
      minutes: 5
  conditions: []
  actions:
  - action: notify.mobile_app_iphone_sd
    data:
      title: Pool API Down
      message: Hayward OmniLogic API has been unavailable for 5 minutes. Pool automation
        is not running.
      data:
        push:
          interruption-level: time-sensitive
  - action: notify.alexa_media
    data:
      message: Warning, the Hayward pool API is down. Pool automation is not running.
      target:
      - media_player.great_room_2
      data:
        type: announce
  mode: single
  max_exceeded: silent
- id: '1775590532666'
  alias: OmniLogic API Watchdog
  description: Notify when Hayward OmniLogic API becomes unavailable or recovers
  triggers:
  - trigger: state
    entity_id: switch.pool_pool_filter_pump
    to: unavailable
    for:
      minutes: 5
    id: api_down
  - trigger: state
    entity_id: switch.pool_pool_filter_pump
    from: unavailable
    to: 'on'
    id: api_recovered
  - trigger: state
    entity_id: switch.pool_pool_filter_pump
    from: unavailable
    to: 'off'
    id: api_recovered_off
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: api_down
      sequence:
      - action: notify.mobile_app_iphone_sd
        data:
          title: Pool API Down
          message: Hayward OmniLogic API has been unavailable for 5 minutes. Pool
            automation is not running.
          data:
            push:
              interruption-level: time-sensitive
      - action: notify.alexa_media
        data:
          message: Warning, the Hayward pool API is down. Pool automation is not running.
          target:
          - media_player.great_room_2
          data:
            type: announce
    - conditions:
      - condition: trigger
        id: api_recovered
      sequence:
      - action: notify.mobile_app_iphone_sd
        data:
          title: Pool API Restored
          message: Hayward OmniLogic API is back online. Pool automation resuming.
          data:
            push:
              interruption-level: time-sensitive
    - conditions:
      - condition: trigger
        id: api_recovered_off
      sequence:
      - action: notify.mobile_app_iphone_sd
        data:
          title: Pool API Restored
          message: Hayward OmniLogic API is back online. Pool automation resuming.
          data:
            push:
              interruption-level: time-sensitive
  mode: single
  max_exceeded: silent
