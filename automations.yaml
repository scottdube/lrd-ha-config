  alias: Front Door - Doorbell Person/Animal Alert
  description:
    Send notification when person or animal detected, suppress if front
    door recently opened
  triggers:
    - entity_id: binary_sensor.g4_doorbell_pro_person_detected
      from: "off"
      to: "on"
      id: person_detected
      trigger: state
    - entity_id: binary_sensor.g4_doorbell_pro_animal_detected
      from: "off"
      to: "on"
      id: animal_detected
      trigger: state
  conditions:
    - condition: state
      entity_id: input_boolean.front_door_notification_suppression
      state: "off"
  actions:
    - variables:
        detection_type:
          "{% if trigger.id == 'person_detected' %}\n  Person\n{% else
          %}\n  Animal\n{% endif %}\n"
    - action: notify.mobile_app_iphone_sd
      data:
        title: Front Door Alert
        message: "{{ detection_type }} detected near front door"
  mode: parallel
  max_exceeded: silent
