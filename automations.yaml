- id: "1775487019530"
  alias: Kitchen Cans Sync to Kitchen 4 Cans
  description: Syncs Kitchen Cans state and brightness to Kitchen 4 Cans
  triggers:
    - trigger: state
      entity_id: light.kit_cans_wall_dimmer_switch
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: light.kit_cans_wall_dimmer_switch
              state: "on"
            - condition: template
              value_template:
                "{{ states('light.wall_dimmer_switch_kitche_4') != 'on' or\n
                \  state_attr('light.kit_cans_wall_dimmer_switch', 'brightness') !=\n   state_attr('light.wall_dimmer_switch_kitche_4',
                'brightness') }}\n"
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.wall_dimmer_switch_kitche_4
              data:
                brightness:
                  "{{ state_attr('light.kit_cans_wall_dimmer_switch', 'brightness')
                  | int(255) }}

                  "
        - conditions:
            - condition: state
              entity_id: light.kit_cans_wall_dimmer_switch
              state: "off"
            - condition: template
              value_template:
                "{{ states('light.wall_dimmer_switch_kitche_4') != 'off'
                }}

                "
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.wall_dimmer_switch_kitche_4
  mode: restart
  max_exceeded: silent
