- id: "1775153373574"
  alias: Hot Water Recirc Pump ON
  description:
    Turns on recirc pump at 7:30am if someone is home, or when someone
    arrives home
  triggers:
    - trigger: time
      at: 07:30:00
      id: scheduled
    - trigger: state
      entity_id:
        - person.scott
        - person.mary
      to: home
      id: arrived_home
  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: person.scott
          state: home
        - condition: state
          entity_id: person.mary
          state: home
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: arrived_home
            - condition: time
              after: 07:30:00
              before: "23:30:00"
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.hot_water_recirc_pump
              data: {}
        - conditions:
            - condition: trigger
              id: scheduled
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.hot_water_recirc_pump
              data: {}
  mode: single
- id: "1775153481762"
  alias: Hot Water Recirc Pump OFF
  description: Turns off recirc pump at 11:30pm or when both people leave home
  triggers:
    - trigger: time
      at: "23:30:00"
      id: scheduled
    - trigger: state
      entity_id:
        - person.scott
        - person.mary
      to: not_home
      id: departed_home
  conditions:
    - condition: or
      conditions:
        - condition: trigger
          id: scheduled
        - condition: and
          conditions:
            - condition: state
              entity_id: person.scott
              state: not_home
            - condition: state
              entity_id: person.mary
              state: not_home
  actions:
    - action: switch.turn_off
      metadata: {}
      target:
        entity_id: switch.hot_water_recirc_pump
      data: {}
  mode: single
