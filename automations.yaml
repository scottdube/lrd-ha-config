- id: "1775590492419"
  alias: OmniLogic API Watchdog
  description: Notify when Hayward OmniLogic API becomes unavailable
  triggers:
    - trigger: state
      entity_id: switch.pool_pool_filter_pump
      to: unavailable
      for:
        minutes: 5
  conditions: []
  actions:
    - action: notify.mobile_app_iphone_sd
      data:
        title: Pool API Down
        message:
          Hayward OmniLogic API has been unavailable for 5 minutes. Pool automation
          is not running.
        data:
          push:
            interruption-level: time-sensitive
    - action: notify.alexa_media
      data:
        message: Warning, the Hayward pool API is down. Pool automation is not running.
        target:
          - media_player.great_room_2
        data:
          type: announce
  mode: single
  max_exceeded: silent
- id: "1775590532666"
  alias: OmniLogic API Watchdog
  description: Notify when Hayward OmniLogic API becomes unavailable or recovers
  triggers:
    - trigger: state
      entity_id: switch.pool_pool_filter_pump
      to: unavailable
      for:
        minutes: 5
      id: api_down
    - trigger: state
      entity_id: switch.pool_pool_filter_pump
      from: unavailable
      to: "on"
      id: api_recovered
    - trigger: state
      entity_id: switch.pool_pool_filter_pump
      from: unavailable
      to: "off"
      id: api_recovered_off
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: api_down
          sequence:
            - action: notify.mobile_app_iphone_sd
              data:
                title: Pool API Down
                message:
                  Hayward OmniLogic API has been unavailable for 5 minutes. Pool
                  automation is not running.
                data:
                  push:
                    interruption-level: time-sensitive
            - action: notify.alexa_media
              data:
                message: Warning, the Hayward pool API is down. Pool automation is not running.
                target:
                  - media_player.great_room_2
                data:
                  type: announce
        - conditions:
            - condition: trigger
              id: api_recovered
          sequence:
            - action: notify.mobile_app_iphone_sd
              data:
                title: Pool API Restored
                message: Hayward OmniLogic API is back online. Pool automation resuming.
                data:
                  push:
                    interruption-level: time-sensitive
        - conditions:
            - condition: trigger
              id: api_recovered_off
          sequence:
            - action: notify.mobile_app_iphone_sd
              data:
                title: Pool API Restored
                message: Hayward OmniLogic API is back online. Pool automation resuming.
                data:
                  push:
                    interruption-level: time-sensitive
  mode: single
  max_exceeded: silent
- alias: Pool Temp Logger
  id: pool_temp_logger
  description: >
    v1 logger — runs every 10 min while pump is on. Retained during logger v2
    phase 1 parallel-run period. Will be retired once v2 is validated.
  trigger:
    - platform: time_pattern
      minutes: /10
  condition:
    - condition: state
      entity_id: switch.omnilogic_pool_filter_pump
      state: "on"
  action:
    - action: shell_command.pool_log
- alias: Pool State Logger v2
  id: pool_state_logger_v2
  description: >
    Logger v2 phase 1 — always-on. Writes ~30 columns of local OmniLogic +
    environmental state to /config/pool_state_log.csv every 10 min regardless
    of pump state. Phase 1.5 will add state-change triggers; phase 2 adds
    cloud columns and computed expected_state. See pool/docs/logger-v2.md.
  trigger:
    - platform: time_pattern
      minutes: /10
  action:
    - action: shell_command.pool_state_log
      data:
        row_type: time_pattern
        trigger_entity: ""
  mode: single
  max_exceeded: silent
- id: "1775827717239"
  alias: Pool Automation v1.10.0
  description: ""
  use_blueprint:
    path: LRD/pool_automation/pool_automation.yaml
    input:
      min_swim_temp: 78
      # Pump speeds: validated empirically as Scott's preferred values
      # (returns flow above HeatPro 30 GPM minimum at his plumbing).
      # Energy: 65→55% normal idle is ~39% pump-power reduction (cube law);
      # 77→65% during heating is also ~40%. See conversation 2026-05-02 +
      # bill analysis. heater_pump_speed validated against HeatPro spec —
      # if low-flow faults appear during heating, raise it.
      normal_pump_speed: 55
      heater_pump_speed: 65
      waterfall_start_time: 08:00:00
      waterfall_switch: valve.omnilogic_pool_waterfall
      heater_active_binary_sensor: binary_sensor.omnilogic_pool_heater_heater_equipment_status
      # v1.10.0: mode helpers from packages/pool/pool_modes.yaml
      service_lockout_boolean: input_boolean.pool_service_lockout
      vacation_boolean: input_boolean.vacation
