- id: "ha_config_auto_pull"
  alias: HA Config Auto-Pull from Git
  description: Pulls latest config from GitHub every 15 min via shell_command.git_pull_config. Notifies on actual changes or on failure (e.g., divergent local edits blocking ff-only) via both mobile push (immediate) and HA persistent notification (durable, viewable in bell icon).
  triggers:
    - trigger: time_pattern
      minutes: "/15"
  conditions: []
  actions:
    - action: shell_command.git_pull_config
      response_variable: pull_result
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pull_result.returncode != 0 }}"
          sequence:
            - action: notify.mobile_app_iphone_sd
              data:
                title: HA config pull FAILED
                message: "{{ (pull_result.stdout ~ ' / ' ~ pull_result.stderr)[:500] }}"
                data:
                  push:
                    interruption-level: time-sensitive
            - action: persistent_notification.create
              data:
                notification_id: ha_config_auto_pull_last_failure
                title: HA config pull FAILED
                message: "{{ (pull_result.stdout ~ ' / ' ~ pull_result.stderr)[:500] }}"
        - conditions:
            - condition: template
              value_template: "{{ 'Already up to date' not in (pull_result.stdout | string) }}"
          sequence:
            - action: notify.mobile_app_iphone_sd
              data:
                title: HA config updated from git
                message: "{{ (pull_result.stdout | string)[:500] }}"
            - action: persistent_notification.create
              data:
                notification_id: ha_config_auto_pull_last_change
                title: HA config updated from git
                message: "{{ (pull_result.stdout | string)[:500] }}"
  mode: single
  max_exceeded: silent
