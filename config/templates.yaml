- trigger:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      hours: "/1"
  action:
    - action: weather.get_forecasts
      target:
        entity_id: weather.lake_ridge_dr
      data:
        type: daily
      response_variable: forecast_data
  sensor:
    - name: Pool Forecast High
      unique_id: pool_forecast_high
      state: >
        {% set forecast = forecast_data['weather.lake_ridge_dr'].forecast %}
        {% if forecast and forecast | length > 0 %}
          {{ forecast[0].temperature | float(70) }}
        {% else %}
          70
        {% endif %}
      unit_of_measurement: "°F"
      device_class: temperature
      icon: mdi:thermometer-high

    - name: Pool Swimming Day
      unique_id: pool_swimming_day
      state: >
        {% set forecast = forecast_data['weather.lake_ridge_dr'].forecast %}
        {% if forecast and forecast | length > 0 %}
          {% set high = forecast[0].temperature | float(70) %}
          {% if high >= 78 %}
            Yes
          {% else %}
            No
          {% endif %}
        {% else %}
          Unknown
        {% endif %}
      icon: mdi:swim

    - name: Pool Heater Needed
      unique_id: pool_heater_needed
      state: >
        {% set forecast = forecast_data['weather.lake_ridge_dr'].forecast %}
        {% set air_temp = state_attr('weather.lake_ridge_dr', 'temperature') | float(70) %}
        {% if forecast and forecast | length > 0 %}
          {% set high = forecast[0].temperature | float(70) %}
          {% set swimming = high >= 78 %}
          {% set heatpump_ok = air_temp >= 55 %}
          {% if swimming and heatpump_ok %}
            Yes
          {% elif not swimming %}
            No - Cold day {{ high }}°F forecast
          {% elif not heatpump_ok %}
            No - Air temp too low {{ air_temp }}°F
          {% endif %}
        {% else %}
          Unknown
        {% endif %}
      icon: mdi:heat-wave

- sensor:
    # HVAC system totals — combine handler + condenser per Carrier Infinity unit
    # so each system reads as one logical load for Energy Dashboard + bill decomposition.
    # Component circuits remain individually queryable for diagnostics (fan-only vs
    # condenser-active, strip-heat detection on Air #1 handler).
    - name: "Air #1 Total Power"
      unique_id: air_1_total_power
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {{ (states('sensor.emporia_vue_panel_a_circuit_9_air_1_condenser_power') | float(0)
            + states('sensor.emporia_vue_panel_b_circuit_9_air_1_handler_power') | float(0)) }}

    - name: "Air #1 Total Daily Energy"
      unique_id: air_1_total_daily_energy
      unit_of_measurement: "Wh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('sensor.emporia_vue_panel_a_circuit_9_air_1_condenser_daily_energy') | float(0)
            + states('sensor.emporia_vue_panel_b_circuit_9_air_1_handler_daily_energy') | float(0)) }}

    - name: "Air #2 Total Power"
      unique_id: air_2_total_power
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {{ (states('sensor.emporia_vue_panel_b_circuit_10_air_2_condenser_power') | float(0)
            + states('sensor.emporia_vue_panel_a_circuit_5_air_2_handler_power') | float(0)) }}

    - name: "Air #2 Total Daily Energy"
      unique_id: air_2_total_daily_energy
      unit_of_measurement: "Wh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('sensor.emporia_vue_panel_b_circuit_10_air_2_condenser_daily_energy') | float(0)
            + states('sensor.emporia_vue_panel_a_circuit_5_air_2_handler_daily_energy') | float(0)) }}

    - name: Pool Rain Status
      unique_id: pool_rain_status
      state: >
        {% set today = (states('sensor.lake_ridge_dr_precipitation_today') | float(0)) / 25.4 %}
        {% set yesterday = (states('sensor.lake_ridge_dr_precipitation_yesterday') | float(0)) / 25.4 %}
        {% if today >= 1.0 or yesterday >= 1.0 %}
          Boost - {{ today | round(2) }}" today {{ yesterday | round(2) }}" yesterday
        {% else %}
          Normal - {{ today | round(2) }}" today {{ yesterday | round(2) }}" yesterday
        {% endif %}
      icon: mdi:weather-rainy

    - name: Pool Automation Status
      unique_id: pool_automation_status
      state: >
        {% set pump = states('switch.omnilogic_pool_filter_pump') %}
        {% set heater = states('water_heater.omnilogic_pool_heater') %}
        {% set waterfall = states('valve.omnilogic_pool_waterfall') %}
        {% set light = states('switch.omnilogic_pool_light') %}
        Pump:{{ pump }} Heater:{{ heater }} Waterfall:{{ waterfall }} Light:{{ light }}
      icon: mdi:pool

    # Cascading water-temp fallback per ADR-015 — mirrors
    # compute_water_temp_authoritative() in pool/scripts/state_logger.py
    # so the live HA value matches what the logger records as
    # `water_temp_authoritative` in the CSV.
    #
    # Tier 1: external_water_temp if fresh (<= 35 min since last_changed).
    #         Works during pump-off intervals because the external probe
    #         doesn't depend on flow.
    # Tier 2: local_water_temp if pump-on for >= 60 sec (in-line probe
    #         settled with flow).
    # Tier 3: heater target temp (ADR-013 tactical fallback).
    #
    # State updates on any referenced-entity change AND on time tick
    # (because now() is referenced — HA auto-triggers periodic
    # re-evaluation for time-sensitive templates).
    #
    # Phase 2 prep — Phase 1 (logger collection) is shipping data since
    # 2026-05-18. This template sensor goes live for observation +
    # dashboard use. Phase 2 blueprint integration (replacing direct
    # local_water_temp reads in pool_automation v1.11.0 with this
    # authoritative sensor) lands after gate C completes (~2026-05-23).
    - name: Pool Water Temp Authoritative
      unique_id: pool_water_temp_authoritative
      unit_of_measurement: "°F"
      device_class: temperature
      state_class: measurement
      icon: mdi:thermometer-water
      state: >
        {%- set ext = states.sensor.pool_water_temp_external -%}
        {%- set ext_val = states('sensor.pool_water_temp_external') | float(none) -%}
        {%- set ext_age = ((now() - ext.last_changed).total_seconds() / 60) if ext else 9999 -%}
        {%- set ext_fresh = ext_age <= 35 and ext_val is not none -%}
        {%- set local_val = states('sensor.omnilogic_pool_watersensor') | float(none) -%}
        {%- set pump = states.switch.omnilogic_pool_filter_pump -%}
        {%- set pump_on = is_state('switch.omnilogic_pool_filter_pump', 'on') -%}
        {%- set pump_sec = ((now() - pump.last_changed).total_seconds()) if (pump and pump_on) else 0 -%}
        {%- set local_reliable = pump_on and pump_sec >= 60 and local_val is not none -%}
        {%- set target = state_attr('water_heater.omnilogic_pool_heater', 'temperature') | float(none) -%}
        {%- if ext_fresh -%}{{ ext_val | round(1) }}
        {%- elif local_reliable -%}{{ local_val | round(1) }}
        {%- elif target is not none -%}{{ target | round(1) }}
        {%- else -%}{{ none }}{%- endif -%}
      attributes:
        source: >
          {%- set ext = states.sensor.pool_water_temp_external -%}
          {%- set ext_val = states('sensor.pool_water_temp_external') | float(none) -%}
          {%- set ext_age = ((now() - ext.last_changed).total_seconds() / 60) if ext else 9999 -%}
          {%- set ext_fresh = ext_age <= 35 and ext_val is not none -%}
          {%- set local_val = states('sensor.omnilogic_pool_watersensor') | float(none) -%}
          {%- set pump = states.switch.omnilogic_pool_filter_pump -%}
          {%- set pump_on = is_state('switch.omnilogic_pool_filter_pump', 'on') -%}
          {%- set pump_sec = ((now() - pump.last_changed).total_seconds()) if (pump and pump_on) else 0 -%}
          {%- set local_reliable = pump_on and pump_sec >= 60 and local_val is not none -%}
          {%- if ext_fresh -%}external
          {%- elif local_reliable -%}local
          {%- else -%}target{%- endif -%}
        external_age_min: >
          {%- set ext = states.sensor.pool_water_temp_external -%}
          {%- if ext -%}{{ ((now() - ext.last_changed).total_seconds() / 60) | round(1) }}
          {%- else -%}unknown{%- endif -%}
        external_fresh: >
          {%- set ext = states.sensor.pool_water_temp_external -%}
          {%- set ext_val = states('sensor.pool_water_temp_external') | float(none) -%}
          {%- set ext_age = ((now() - ext.last_changed).total_seconds() / 60) if ext else 9999 -%}
          {{ ext_age <= 35 and ext_val is not none }}
